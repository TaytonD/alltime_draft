<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>All-Time Draft — NBA GM Simulator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@400;500;600;700;800;900&display=swap" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@400;500;600;700;800;900&display=swap"></noscript>
<style>
/* Google Font is loaded via a non-blocking <link> in the document head (see
   head_pre_style.html) instead of a CSS @import here. @import is
   render-blocking and, in a sandboxed/restricted-network environment, can
   hang rather than fail fast — stalling the entire page. The head's <link>
   uses the standard async-load pattern (media="print" swapped to "all" on
   load), so if the font loads it applies normally; if it hangs or fails,
   the page is completely unaffected and just uses the system-ui/sans-serif
   fallback already set on every font-family declaration below. */
:root{
  /* Dark mode — deep navy dashboard, orange as the primary active color */
  --ink:#111827; --ink2:#161f30; --panel:#1a2540; --panel2:#1f2c4780;
  --line:#2a3650; --line2:#3a4a68;
  --wood:#f97316; --wood-dim:#c2560f;             /* primary/active accent (orange in dark mode) */
  --cost:#f97316; --cost-dim:#c2560f;             /* fixed accent for cost/on-the-clock — stays orange in both modes */
  --gold:#eab308; --gold-dim:#a17d06;
  --cyan:#06b6d4; --cyan-dim:#0a8ba3;
  --purple:#8b5cf6; --purple-dim:#6d3fd1;
  --crimson:#e11d48; --crimson-dim:#a51139;
  --emerald:#10b981; --emerald-dim:#0a8a63;
  --clock:#f97316; --chalk:#f8fafc; --chalk-dim:#94a3b8; --chalk-dimmer:#647089;
  --win:#22c55e; --loss:#ef4444; --warn:#f59e0b;
  --glow1:rgba(249,115,22,.10); --glow2:rgba(6,182,212,.12);
  --r:12px;
  --accent: var(--wood); /* mode accent — Classic's default identity; overridden per mode below */
  --accent-dim: var(--wood-dim);
}
/* Each mode gets its own accent, carried through its actual gameplay
   screens (buttons, on-the-clock, hero glow) — not just the index card icon.
   Classic Draft keeps the default orange/navy wood identity untouched. */
html[data-mode-accent="cap"]{ --accent: var(--cyan); --accent-dim: var(--cyan-dim); }
html[data-mode-accent="season"]{ --accent: var(--purple); --accent-dim: var(--purple-dim); }
html[data-mode-accent="auction"]{ --accent: var(--gold); --accent-dim: var(--gold-dim); }
html[data-mode-accent="dynasty"]{ --accent: var(--crimson); --accent-dim: var(--crimson-dim); }
html[data-mode-accent="career"]{ --accent: var(--emerald); --accent-dim: var(--emerald-dim); }
[data-theme="light"]{
  /* Light mode — genuinely white, navy takes over as the primary active color */
  --ink:#f5f6f8; --ink2:#eceef2; --panel:#ffffff; --panel2:#eef0f4;
  --line:#dde1e8; --line2:#c5cbd6;
  --wood:#16305a; --wood-dim:#0f2140;             /* primary/active accent (navy in light mode) */
  --cost:#ea6a12; --cost-dim:#c2560f;
  --gold:#a8790a; --gold-dim:#8a6108;
  --cyan:#0e7490; --cyan-dim:#0a5c73;
  --purple:#7c3aed; --purple-dim:#6428c4;
  --crimson:#be123c; --crimson-dim:#9f1239;
  --emerald:#0d9668; --emerald-dim:#0a7a55;
  --clock:#ea6a12; --chalk:#0f1b2d; --chalk-dim:#5b6577; --chalk-dimmer:#8993a3;
  --win:#16a34a; --loss:#dc2626; --warn:#d97706;
  --glow1:rgba(22,48,90,.05); --glow2:rgba(6,182,212,.06);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
html{background:var(--ink);min-height:100%;}
body{
  background:
    radial-gradient(900px 500px at 15% -5%, var(--glow1) 0%, transparent 55%),
    radial-gradient(900px 500px at 85% 0%, var(--glow2) 0%, transparent 50%),
    var(--ink);
  color:var(--chalk);
  font-family:'Libre Franklin',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
  transition:background-color .25s ease,color .25s ease;
}
.wrap{max-width:1080px;margin:0 auto;padding:24px 18px 90px;background:var(--ink);}
h1,h2,h3,h4{margin:0;font-family:'Libre Franklin',sans-serif;font-weight:800;letter-spacing:.3px;}
.mono{font-family:'Libre Franklin',sans-serif;font-variant-numeric:tabular-nums;font-weight:700;}
.display{font-family:'Libre Franklin',sans-serif;font-weight:900;}

/* ---- theme toggle ---- */
.theme-toggle{background:var(--ink2);border:1px solid var(--line2);color:var(--chalk-dim);
  width:38px;height:38px;border-radius:9px;cursor:pointer;font-size:17px;display:grid;place-items:center;transition:.15s;flex:0 0 auto;}
.theme-toggle:hover{border-color:var(--accent);color:var(--accent);}


/* ---- top bar ---- */
.topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;
  padding-bottom:18px;margin-bottom:22px;border-bottom:1px solid var(--line);flex-wrap:wrap;}
.logo{display:flex;align-items:center;gap:12px;}
.logo .mark{width:44px;height:44px;border-radius:50%;flex:0 0 auto;
  background:radial-gradient(circle at 35% 30%, var(--gold), var(--cost) 78%);
  border:2px solid var(--chalk);
  display:grid;place-items:center;font-family:'Libre Franklin';font-weight:900;font-size:24px;color:#1a130d;letter-spacing:.5px;
  box-shadow:0 0 0 3px var(--ink), 0 4px 14px rgba(0,0,0,.4);}
.logo h1{font-family:'Libre Franklin';font-weight:900;font-size:25px;letter-spacing:1px;line-height:1;text-transform:uppercase;
  background:linear-gradient(90deg,var(--gold),var(--cost));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.logo .sub{font-size:11px;color:var(--chalk-dimmer);letter-spacing:2px;text-transform:uppercase;margin-top:3px;}
.ghost-btn{background:transparent;border:1px solid var(--line2);color:var(--chalk-dim);
  font-family:'Libre Franklin';letter-spacing:1px;text-transform:uppercase;font-size:12px;
  padding:9px 16px;border-radius:8px;cursor:pointer;transition:.15s;}
.ghost-btn:hover{border-color:var(--accent);color:var(--accent);}

/* ---- setup ---- */
.hero-sub{color:var(--chalk-dim);font-size:15px;line-height:1.55;max-width:620px;margin:2px 0 26px;}
.setup-grid{display:grid;gap:18px;}
.field{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:18px 20px;}
.field > label{display:block;font-family:'Libre Franklin';text-transform:uppercase;letter-spacing:1.5px;
  font-size:13px;color:var(--chalk);margin-bottom:4px;}
.hint{font-size:12.5px;color:var(--chalk-dimmer);margin-bottom:14px;line-height:1.4;}
.dice-btn{margin-left:8px;font-family:'Libre Franklin';text-transform:none;letter-spacing:0;font-size:12px;
  font-weight:700;color:var(--gold);background:rgba(234,179,8,.12);border:1px solid rgba(234,179,8,.35);
  padding:3px 10px;border-radius:20px;cursor:pointer;transition:.15s;vertical-align:middle;}
.dice-btn:hover{background:rgba(234,179,8,.2);}
.dice-btn:active{transform:scale(.94);}
.random-status{margin-top:10px;padding:9px 12px;background:rgba(234,179,8,.1);border:1px solid rgba(234,179,8,.3);
  border-radius:8px;font-size:12px;color:var(--gold);line-height:1.4;}

/* Champion confetti — fires once on the results reveal */
.confetti-container{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:60;}
.confetti-piece{position:absolute;top:-16px;width:8px;height:14px;border-radius:2px;opacity:.95;
  animation-name:confettiFall;animation-timing-function:cubic-bezier(.25,.46,.45,.94);animation-fill-mode:forwards;}
@keyframes confettiFall{
  0%{transform:translateY(0) translateX(0) rotate(0deg);opacity:1;}
  100%{transform:translateY(100vh) translateX(var(--drift)) rotate(var(--rot));opacity:0;}
}
.seg{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
.seg button{flex:1 1 auto;min-width:64px;background:var(--ink2);border:1px solid var(--line);
  color:var(--chalk-dim);font-family:'Libre Franklin';letter-spacing:1px;font-size:15px;
  padding:11px 8px;border-radius:8px;cursor:pointer;transition:.12s;}
.seg button:hover{border-color:var(--line2);color:var(--chalk);}
.seg button.on{background:var(--accent);
  border-color:var(--accent);color:#fff;font-weight:600;}
.assign-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-size:13px;color:var(--chalk-dim);}
.stepper{display:inline-flex;align-items:center;border:1px solid var(--line);border-radius:8px;overflow:hidden;}
.stepper button{background:var(--ink2);border:none;color:var(--chalk);width:38px;height:38px;font-size:20px;cursor:pointer;font-family:'Libre Franklin';}
.stepper button:hover{background:var(--panel2);color:var(--accent);}
.stepper button:disabled{opacity:.35;cursor:not-allowed;}
.stepper .val{width:46px;text-align:center;font-family:'Libre Franklin';font-size:16px;font-weight:700;}
.stepper-sm button{width:24px;height:28px;font-size:15px;padding:0;}
.stepper-sm button.wide{width:34px;font-size:12px;font-weight:700;}
.stat-alloc-row{display:flex;align-items:center;gap:6px;padding:7px 0;border-bottom:1px solid rgba(40,52,74,.5);flex-wrap:wrap;}
.stat-alloc-label{font-family:'Libre Franklin';font-size:13px;font-weight:600;width:88px;flex:0 0 auto;}
.stat-alloc-bar{flex:1 1 60px;min-width:40px;height:8px;background:var(--ink2);border-radius:4px;overflow:hidden;}
.stat-alloc-fill{height:100%;background:linear-gradient(90deg,var(--accent-dim),var(--accent));border-radius:4px;transition:width .15s;}
.stat-alloc-val{width:28px;text-align:right;font-size:14px;font-weight:700;}
.career-preview-row{display:flex;gap:10px;flex-wrap:wrap;}
.career-preview-stat{flex:1 1 auto;min-width:64px;text-align:center;background:var(--ink2);border:1px solid var(--line);
  border-radius:8px;padding:10px 6px;}
.career-preview-stat b{display:block;font-family:'Libre Franklin';font-size:22px;font-weight:800;color:var(--accent);}
.career-preview-stat i{font-style:normal;font-size:11px;letter-spacing:1px;color:var(--chalk-dimmer);}
.big-btn{width:100%;margin-top:6px;background:linear-gradient(135deg,var(--accent),var(--accent-dim));
  border:none;color:#fff;font-family:'Libre Franklin';font-weight:700;letter-spacing:2px;text-transform:uppercase;
  font-size:18px;padding:16px;border-radius:10px;cursor:pointer;transition:.15s;box-shadow:0 8px 30px rgba(200,120,60,.28);}
.big-btn:hover{transform:translateY(-1px);box-shadow:0 12px 38px rgba(200,120,60,.4);}
.big-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.warn{color:var(--loss);font-size:13px;margin-top:10px;text-align:center;min-height:18px;}
.afford-warn{color:var(--loss);font-size:12.5px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);
  border-radius:8px;padding:8px 12px;margin-bottom:12px;}

/* ---- draft screen ---- */
.clock-bar{display:flex;align-items:center;justify-content:space-between;gap:14px;
  background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:14px 18px;margin-bottom:18px;flex-wrap:wrap;}
.clock-left{display:flex;align-items:center;gap:14px;}
.onclock{font-family:'Libre Franklin';font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--clock);
  display:flex;align-items:center;gap:8px;}
.onclock .dot{width:9px;height:9px;border-radius:50%;background:var(--clock);box-shadow:0 0 10px var(--clock);animation:pulse 1.3s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.45;transform:scale(.8);}}
.clock-team{font-family:'Libre Franklin';font-size:24px;font-weight:700;letter-spacing:1px;line-height:1;}
.clock-team .who{font-size:12px;color:var(--chalk-dimmer);letter-spacing:1.5px;text-transform:uppercase;margin-top:3px;}
.clock-right{font-family:'Libre Franklin';font-size:13px;color:var(--chalk-dim);text-align:right;}
.clock-right b{color:var(--chalk);}

.board{display:grid;grid-template-columns:1fr;gap:14px;}
@media(min-width:720px){.board{grid-template-columns:1fr 1fr;}}
.team-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:14px 16px;transition:.2s;}
.team-card.active{border-color:var(--clock);box-shadow:0 0 0 1px var(--clock),0 0 26px rgba(245,197,66,.12);}
.team-card.you{border-left:3px solid var(--accent);}
.team-card h3{display:flex;align-items:center;justify-content:space-between;font-size:18px;letter-spacing:1px;margin-bottom:2px;}
.team-tag{font-family:'Libre Franklin';font-size:10px;letter-spacing:1.5px;text-transform:uppercase;padding:3px 8px;border-radius:5px;}
.team-badge{display:inline-block;font-family:'Libre Franklin';font-weight:800;font-size:9px;letter-spacing:.3px;
  color:#fff;padding:2px 6px;border-radius:4px;text-shadow:0 1px 2px rgba(0,0,0,.4);
  box-shadow:0 0 0 1px rgba(255,255,255,.15) inset;vertical-align:middle;}

/* Rating tiers: elite/great/good players get a visually distinct OVR treatment */
.ovr-num.tier-elite{color:var(--gold);text-shadow:0 0 6px rgba(234,179,8,.5);font-weight:900;}
.ovr-num.tier-great{color:var(--chalk);font-weight:800;}
.ovr-num.tier-good{color:#c68a4a;}
.team-nickname{font-size:11.5px;color:var(--chalk-dimmer);font-style:italic;margin-top:-4px;margin-bottom:6px;}
.tag-you{background:rgba(200,120,60,.18);color:var(--accent);}
.tag-cpu{background:rgba(159,176,200,.12);color:var(--chalk-dimmer);}
.team-rating{font-family:'Libre Franklin';font-size:12px;color:var(--chalk-dimmer);margin-bottom:10px;}
.slot-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid rgba(40,52,74,.5);}
.trade-columns{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:14px 0;}
.trade-col{background:var(--ink2);border:1px solid var(--line);border-radius:10px;padding:10px 12px;}
.trade-col-label{font-family:'Libre Franklin';font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--chalk-dim);margin-bottom:6px;}
@media(max-width:560px){.trade-columns{grid-template-columns:1fr;}}
.slot-row:last-child{border-bottom:none;}
.slot-pos{font-family:'Libre Franklin';font-weight:600;font-size:13px;letter-spacing:1px;color:var(--accent);width:34px;flex:0 0 auto;}
.slot-pos.res{color:var(--chalk-dimmer);}
.slot-name{flex:1;font-size:14px;font-weight:500;}
.slot-name.vacant{color:var(--chalk-dimmer);font-style:italic;font-weight:400;}
.slot-yr{font-family:'Libre Franklin';font-size:11px;color:var(--chalk-dimmer);}

/* ---- pick panel ---- */
.pick-panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:18px;margin-bottom:18px;}
.event-recap{background:var(--panel);border:1px solid var(--accent-dim);border-left:3px solid var(--accent);border-radius:var(--r);padding:16px 18px;margin-bottom:18px;}
.event-recap-cat{font-family:'Libre Franklin';font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);margin-bottom:4px;}
.event-recap-choice{font-size:14px;font-weight:600;margin-bottom:6px;}
.event-recap-outcome{font-size:13.5px;color:var(--chalk-dim);line-height:1.6;margin-bottom:8px;}
.event-recap-effect{font-family:'Libre Franklin';font-size:12px;font-weight:700;color:var(--win);}
.award-badges{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;}
.award-badge{display:inline-flex;align-items:center;gap:7px;background:linear-gradient(135deg,rgba(234,179,8,.16),rgba(234,179,8,.06));
  border:1px solid rgba(234,179,8,.4);border-radius:10px;padding:9px 14px;font-size:15px;font-weight:700;color:var(--gold);}
.award-badge.no-award{background:var(--ink2);border-color:var(--line);color:var(--chalk-dimmer);font-weight:600;font-size:14px;}
.milestone-badge{display:flex;align-items:center;gap:10px;background:linear-gradient(135deg,rgba(6,182,212,.14),rgba(6,182,212,.05));
  border:1px solid rgba(6,182,212,.4);border-radius:10px;padding:12px 16px;margin-top:10px;font-size:16px;font-weight:700;color:var(--cyan);}
.milestone-badge i{font-style:normal;font-weight:500;font-size:13px;color:var(--chalk-dim);display:block;margin-top:1px;}
.event-story-text{font-size:16px;line-height:1.6;color:var(--chalk);margin-bottom:18px;text-align:center;}
.event-choices{display:flex;flex-direction:column;gap:10px;}
.event-choice-btn{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:var(--ink2);
  border:1px solid var(--line);border-radius:10px;padding:14px 16px;font-size:14.5px;font-weight:600;color:var(--chalk);
  cursor:pointer;transition:.12s;font-family:inherit;}
.event-choice-btn:hover, .event-choice-btn:active{border-color:var(--accent);background:var(--panel2);}
.event-choice-arrow{color:var(--accent);font-weight:900;font-size:16px;flex:0 0 auto;}
.pick-panel h4{font-size:15px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;}
.pick-panel .psub{font-size:12.5px;color:var(--chalk-dimmer);margin-bottom:14px;}
.slot-overview{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;}
.slot-chip{font-family:'Libre Franklin';font-weight:700;font-size:10.5px;letter-spacing:.3px;
  padding:3px 8px;border-radius:6px;border:1.5px solid transparent;}
.slot-chip.slot-filled{background:rgba(34,197,94,.12);color:var(--win);border-color:var(--win);}
.slot-chip.slot-open{background:var(--panel2);color:var(--chalk-dim);border-color:var(--line2);}
.slot-chip.slot-res{background:rgba(6,182,212,.12);color:var(--cyan);border-color:var(--cyan);}
.pos-filter{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px;}
.pos-filter button{background:var(--ink2);border:1px solid var(--line);color:var(--chalk-dim);
  font-family:'Libre Franklin';letter-spacing:1px;font-size:13px;padding:7px 14px;border-radius:7px;cursor:pointer;transition:.12s;}
.pos-filter button:hover{border-color:var(--line2);color:var(--chalk);}
.pos-filter button.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;}
.search{width:100%;background:var(--ink2);border:1px solid var(--line);border-radius:8px;color:var(--chalk);
  font-family:'Libre Franklin';font-size:14px;padding:11px 13px;margin-bottom:12px;outline:none;}
.search:focus{border-color:var(--accent);}
.player-list{display:grid;gap:8px;max-height:340px;overflow-y:auto;padding-right:4px;}
.player-list::-webkit-scrollbar{width:8px;}
.player-list::-webkit-scrollbar-thumb{background:var(--line2);border-radius:4px;}
.p-row{display:flex;align-items:center;gap:12px;background:var(--ink2);border:1px solid var(--line);
  border-radius:9px;padding:10px 13px;cursor:pointer;transition:.12s;}
button.p-row{font:inherit;color:inherit;}
.p-row:hover{border-color:var(--accent);background:var(--panel2);}
.p-pos{font-family:'Libre Franklin';font-weight:600;font-size:12px;letter-spacing:1px;color:var(--accent);
  min-width:56px;flex:0 0 auto;}
.p-main{flex:1;min-width:0;}
.p-name{font-size:14.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.p-yr{font-family:'Libre Franklin';font-size:11px;color:var(--chalk-dimmer);}
.p-scout{font-size:11.5px;color:var(--chalk-dim);font-style:italic;margin-top:2px;}
.p-stats{font-family:'Libre Franklin';font-size:11.5px;color:var(--chalk-dim);text-align:right;flex:0 0 auto;line-height:1.5;}
.p-stats b{color:var(--chalk);}
.slot-choice{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
.slot-choice button{background:var(--accent);border:none;color:#fff;font-family:'Libre Franklin';letter-spacing:1px;
  font-size:13px;padding:8px 14px;border-radius:7px;cursor:pointer;font-weight:600;}
.slot-choice button:hover{filter:brightness(1.1);}
.slot-choice button.cancel{background:var(--ink2);color:var(--chalk-dim);border:1px solid var(--line);}
.flag{color:var(--loss);font-size:12.5px;margin-top:8px;}

.cpu-thinking{text-align:center;padding:26px;color:var(--chalk-dim);font-family:'Libre Franklin';letter-spacing:2px;text-transform:uppercase;font-size:14px;}

/* ---- Auction Mode ---- */
.auc-budget-strip{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.auc-budget-chip{background:var(--ink2);border:1px solid var(--line);border-radius:8px;padding:7px 12px;
  display:flex;flex-direction:column;gap:2px;min-width:84px;font-size:12px;}
.auc-budget-chip .auc-budget-name{color:var(--chalk-dim);font-size:10.5px;letter-spacing:.3px;}
.auc-budget-chip.auc-leading{border-color:var(--win);background:rgba(34,197,94,.1);}
.auc-budget-chip.auc-inbid{border-color:var(--gold);}
.auc-live{text-align:center;}
.auc-nominee{margin-bottom:16px;}
.auc-nominee-name{font-family:'Libre Franklin';font-weight:800;font-size:22px;color:var(--chalk);}
.auc-nominee-meta{color:var(--chalk-dim);font-size:13px;margin-top:4px;}
.auc-bid-display{margin-bottom:18px;}
.auc-bid-amount{font-family:'Libre Franklin';font-weight:900;font-size:44px;color:var(--gold);line-height:1;}
.auc-bid-leader{color:var(--chalk-dim);font-size:13px;margin-top:4px;text-transform:uppercase;letter-spacing:1px;}
.auc-actions{display:flex;gap:10px;justify-content:center;}
.auc-actions .big-btn{flex:0 1 220px;}
.cpu-thinking .spin{display:inline-block;width:16px;height:16px;border:2px solid var(--line2);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite;margin-right:10px;vertical-align:middle;}
@keyframes sp{to{transform:rotate(360deg);}}
.last-pick{background:linear-gradient(135deg,rgba(200,120,60,.14),transparent);border:1px solid var(--accent-dim);
  border-radius:9px;padding:11px 14px;margin-bottom:14px;font-size:13.5px;}
.last-pick b{color:var(--accent);}

/* ---- results ---- */
.result-hero{position:relative;text-align:center;padding:32px 0 16px;overflow:hidden;}
.hero-glow{position:absolute;top:-40px;left:50%;transform:translateX(-50%);width:340px;height:220px;
  background:radial-gradient(ellipse at center, rgba(249,115,22,.22) 0%, rgba(234,179,8,.1) 45%, transparent 72%);
  pointer-events:none;z-index:0;}
.champ-trophy-ico{position:relative;font-size:52px;line-height:1;margin-bottom:10px;
  filter:drop-shadow(0 0 18px rgba(234,179,8,.5));animation:trophyIn .55s cubic-bezier(.2,.9,.3,1.3) both;}
@keyframes trophyIn{from{opacity:0;transform:scale(.5) translateY(-8px);}to{opacity:1;transform:scale(1) translateY(0);}}
.result-hero .champ-label{position:relative;font-family:'Libre Franklin';letter-spacing:3px;text-transform:uppercase;
  font-size:14.5px;font-weight:800;color:var(--accent);animation:feedIn .4s ease .1s both;}
.result-hero .champ-name{position:relative;font-family:'Libre Franklin';font-weight:900;font-size:44px;letter-spacing:1px;margin:8px 0 14px;
  background:linear-gradient(135deg,#fff,var(--accent));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  animation:feedIn .45s ease .16s both;}
.champ-meta{position:relative;display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap;
  animation:feedIn .45s ease .22s both;}
.champ-grade-badge{font-family:'Libre Franklin';font-weight:700;font-size:18px;letter-spacing:.5px;
  padding:4px 14px;border-radius:8px;border:1.5px solid currentColor;}
.champ-grade-badge.grade-A{background:rgba(34,197,94,.14);}
.champ-grade-badge.grade-B{background:rgba(6,182,212,.14);}
.champ-grade-badge.grade-C{background:rgba(234,179,8,.14);}
.champ-grade-badge.grade-D{background:rgba(239,77,94,.14);}
.result-hero .champ-rating{font-family:'Libre Franklin';color:var(--chalk);font-weight:700;font-size:15px;letter-spacing:.3px;}
.standings{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin:20px 0;}
.standings h4{font-size:15px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px;}
.stand-row{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid rgba(40,52,74,.5);}
.stand-row.stand-you{background:rgba(249,115,22,.08);border-radius:6px;padding-left:6px;margin-left:-6px;}
.stand-row.stand-out{opacity:.55;}
.playoff-cutoff{text-align:center;font-size:10.5px;letter-spacing:1px;text-transform:uppercase;color:var(--chalk-dimmer);
  padding:6px 0;border-bottom:1px dashed var(--line2);}
.stand-row:last-child{border:none;}
.seed{font-family:'Libre Franklin';font-weight:700;font-size:16px;color:var(--accent);width:28px;}
.stand-name{flex:1;font-weight:600;font-size:15px;}
.stand-rating{font-family:'Libre Franklin';font-size:13px;color:var(--chalk);}
.bar-wrap{flex:1.4;height:8px;background:var(--ink2);border-radius:4px;overflow:hidden;max-width:220px;}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--accent-dim),var(--accent));border-radius:4px;}

.section-h{font-size:15px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:14px;color:var(--chalk);}
.stand-budget{font-family:'Libre Franklin';font-size:11px;color:var(--cyan);margin-right:10px;flex:0 0 auto;}

/* ---- visual bracket tree ---- */
.bracket-wrap{margin:24px 0;}
.bracket-scroll{overflow-x:auto;padding:6px 2px 14px;}
.bracket-scroll::-webkit-scrollbar{height:8px;}
.bracket-scroll::-webkit-scrollbar-thumb{background:var(--line2);border-radius:4px;}
.bracket-tree{display:flex;gap:0;align-items:stretch;min-width:min-content;}
.bkt-col{display:flex;flex-direction:column;justify-content:space-around;min-width:170px;padding:0 14px;position:relative;}
.bkt-round-label{font-family:'Libre Franklin';letter-spacing:2px;text-transform:uppercase;font-size:11px;
  color:var(--cyan);text-align:center;margin-bottom:14px;font-weight:600;}
.bkt-matches{display:flex;flex-direction:column;justify-content:space-around;flex:1;gap:16px;}
.bkt-match{background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden;
  position:relative;box-shadow:0 3px 10px rgba(0,0,0,.25);}
/* connector lines to the next round */
.bkt-col:not(:last-child) .bkt-match::after{content:"";position:absolute;top:50%;right:-14px;width:14px;
  height:1px;background:var(--line2);}
.bkt-col:not(:first-child) .bkt-match::before{content:"";position:absolute;top:50%;left:-14px;width:14px;
  height:1px;background:var(--line2);}
.bkt-team{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:9px 12px;font-size:13.5px;font-weight:600;}
.bkt-team+.bkt-team{border-top:1px solid var(--line);}
.bkt-team.win{color:var(--chalk);}
.bkt-team.win .bkt-score{color:var(--win);}
.bkt-team.lose{color:var(--chalk-dimmer);}
.bkt-team.lose .bkt-name{opacity:.7;}
.bkt-team.champ{background:linear-gradient(90deg,rgba(255,107,53,.18),rgba(34,211,238,.1));color:var(--accent);}
.bkt-team.adv{color:var(--chalk);}
.bkt-team.bkt-bye{color:var(--chalk-dimmer);font-style:italic;font-weight:400;}
.bkt-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bkt-name em{font-style:normal;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--accent);
  background:rgba(255,107,53,.15);padding:1px 5px;border-radius:4px;margin-left:4px;}
.bkt-score{font-family:'Libre Franklin';font-weight:700;font-size:15px;flex:0 0 auto;}
.bkt-seed{font-size:9px;color:var(--accent);}
/* champion trophy column */
.bkt-champ-col{justify-content:center;min-width:150px;}
.bkt-trophy{text-align:center;background:linear-gradient(160deg,rgba(255,107,53,.16),rgba(34,211,238,.12));
  border:1.5px solid var(--accent);border-radius:14px;padding:20px 14px;box-shadow:0 0 30px rgba(255,107,53,.25);}
.trophy-ico{font-size:40px;line-height:1;margin-bottom:8px;filter:drop-shadow(0 0 10px rgba(255,210,63,.5));}
.trophy-name{font-family:'Libre Franklin';font-weight:700;font-size:17px;letter-spacing:.5px;color:var(--chalk);line-height:1.15;}
.trophy-you{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);margin-top:5px;}

.footer-note{text-align:center;color:var(--chalk-dimmer);font-size:11.5px;margin-top:30px;line-height:1.6;}
/* ===== THEME SELECTOR ===== */
.theme-grid{display:flex;flex-wrap:wrap;gap:8px;}
.theme-btn{background:var(--ink2);border:1px solid var(--line);color:var(--chalk-dim);
  font-family:'Libre Franklin';letter-spacing:.5px;font-size:13px;padding:8px 13px;border-radius:8px;cursor:pointer;transition:.12s;}
.theme-btn:hover{border-color:var(--line2);color:var(--chalk);}
.theme-btn.on{background:linear-gradient(135deg,var(--cyan),var(--cyan-dim));border-color:var(--cyan);color:#fff;font-weight:600;}
.theme-btn.theme-dis{opacity:.4;text-decoration:line-through;}
.theme-desc{font-size:12.5px;color:var(--chalk-dimmer);margin-top:10px;font-style:italic;min-height:16px;}

/* ===== DRAFT LAYOUT + FEED ===== */
.topbar-btns{display:flex;gap:8px;}
.draft-layout{display:grid;grid-template-columns:1fr;gap:16px;}
@media(min-width:860px){.draft-layout{grid-template-columns:1fr 260px;}}
.feed-panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;height:fit-content;}
.feed-header{font-family:'Libre Franklin';letter-spacing:2px;text-transform:uppercase;font-size:12px;color:var(--cyan);
  padding:12px 14px;border-bottom:1px solid var(--line);background:var(--ink2);}
.feed-list{max-height:420px;overflow-y:auto;}
.season-stats-row{display:flex;gap:10px;flex-wrap:wrap;}
.season-stat{flex:1 1 auto;min-width:64px;text-align:center;background:var(--ink2);border:1px solid var(--line);
  border-radius:8px;padding:12px 8px;}
.season-stat b{display:block;font-family:'Libre Franklin';font-size:22px;font-weight:800;color:var(--cyan);}
.season-stat i{font-style:normal;font-size:11px;letter-spacing:1px;color:var(--chalk-dimmer);}
.stat-total{display:block;font-size:9.5px;color:var(--chalk-dimmer);margin-top:3px;font-weight:600;}
.trophy-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(84px,1fr));gap:10px;}
.trophy-item{text-align:center;background:var(--ink2);border:1px solid var(--line);border-radius:10px;padding:12px 6px;}
.trophy-icon{display:block;font-size:22px;margin-bottom:4px;}
.trophy-item b{display:block;font-family:'Libre Franklin';font-size:20px;font-weight:800;color:var(--gold);}
.trophy-item i{font-style:normal;font-size:10.5px;letter-spacing:.5px;color:var(--chalk-dimmer);}
.season-supers{margin-top:12px;padding-top:12px;border-top:1px solid var(--line);font-size:12.5px;color:var(--chalk-dim);line-height:1.7;}
.feed-list::-webkit-scrollbar{width:6px;}
.feed-list::-webkit-scrollbar-thumb{background:var(--line2);border-radius:3px;}
.feed-row{display:flex;align-items:center;gap:10px;padding:9px 13px;border-bottom:1px solid rgba(44,51,88,.4);animation:feedIn .3s ease;}
.feed-row.feed-new{animation:feedNewIn .6s ease;}
@keyframes feedNewIn{
  0%{opacity:0;transform:translateX(-14px);background:rgba(249,115,22,.22);}
  60%{background:rgba(249,115,22,.14);}
  100%{opacity:1;transform:translateX(0);background:transparent;}
}
.feed-row.feed-you{background:rgba(255,107,53,.08);}
@keyframes feedIn{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:none;}}
.feed-pick{font-size:11px;color:var(--chalk-dimmer);min-width:20px;flex:0 0 auto;}
.feed-main{flex:1;min-width:0;}
.feed-name{display:block;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.feed-meta{display:block;font-size:11px;color:var(--chalk-dimmer);}
.feed-cost{font-size:11px;font-weight:700;color:var(--cost);background:rgba(255,107,53,.14);border-radius:4px;padding:1px 6px;flex:0 0 auto;}
.feed-empty{padding:20px 14px;font-size:12.5px;color:var(--chalk-dimmer);text-align:center;font-style:italic;}
.run-banner{background:linear-gradient(90deg,rgba(255,107,53,.18),rgba(255,107,53,.04));border:1px solid var(--accent-dim);
  border-radius:9px;padding:10px 15px;margin-bottom:14px;font-size:13.5px;color:var(--chalk);}
.run-banner b{color:var(--accent);}

/* ===== STORY / MVP / SUPERLATIVES ===== */
.story-card{background:linear-gradient(135deg,rgba(34,211,238,.08),rgba(255,107,53,.06));
  border:1px solid var(--line);border-radius:var(--r);padding:18px 20px;margin:18px 0;}
.story-text{font-size:15px;line-height:1.55;color:var(--chalk);margin-bottom:12px;}
.mvp-line{font-size:14px;color:var(--chalk);display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.mvp-badge{font-family:'Libre Franklin';letter-spacing:1.5px;text-transform:uppercase;font-size:11px;
  background:linear-gradient(135deg,var(--clock),var(--cost-dim));color:#1a1208;padding:3px 9px;border-radius:5px;font-weight:600;}
.mvp-yr{color:var(--chalk-dimmer);font-size:12px;}
.supers{display:grid;gap:12px;margin:16px 0;}
@media(min-width:560px){.supers{grid-template-columns:1fr 1fr;}}
.super-card{border-radius:10px;padding:14px 16px;border:1px solid var(--line);background:var(--panel);}
.super-card.steal{border-color:var(--win);background:linear-gradient(135deg,rgba(52,232,158,.1),transparent);}
.super-card.reach{border-color:var(--loss);background:linear-gradient(135deg,rgba(255,77,109,.1),transparent);}
.super-card.offense{border-color:var(--accent);background:linear-gradient(135deg,rgba(249,115,22,.1),transparent);}
.super-card.defense{border-color:var(--cyan);background:linear-gradient(135deg,rgba(6,182,212,.1),transparent);}
.super-label{font-family:'Libre Franklin';letter-spacing:1px;text-transform:uppercase;font-size:11px;color:var(--chalk-dim);margin-bottom:6px;}
.super-name{font-size:17px;font-weight:700;color:var(--chalk);}
.super-detail{font-size:12px;color:var(--chalk-dimmer);margin-top:2px;}

/* ===== RESULT ACTIONS + RESIM ===== */
.result-actions{display:flex;gap:10px;flex-wrap:wrap;margin:18px 0;}
.action-btn{flex:1;min-width:180px;background:linear-gradient(135deg,var(--cyan),var(--cyan-dim));border:none;color:#fff;
  font-family:'Libre Franklin';letter-spacing:1px;text-transform:uppercase;font-weight:600;font-size:14px;
  padding:13px;border-radius:9px;cursor:pointer;transition:.14s;}
.action-btn:hover{transform:translateY(-1px);filter:brightness(1.08);}
.action-btn.alt{background:linear-gradient(135deg,var(--accent),var(--accent-dim));color:#fff;}
.resim-results{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-bottom:18px;}
.resim-title{font-family:'Libre Franklin';letter-spacing:1.5px;text-transform:uppercase;font-size:12px;color:var(--cyan);margin-bottom:12px;}
.odds-row{display:flex;align-items:center;gap:12px;padding:6px 0;}
.odds-name{flex:0 0 130px;font-size:13px;font-weight:600;}
.odds-bar{flex:1;height:10px;background:var(--ink2);border-radius:5px;overflow:hidden;}
.odds-fill{height:100%;background:linear-gradient(90deg,var(--cyan-dim),var(--cyan));border-radius:5px;transition:width .5s ease;}
.odds-pct{font-size:13px;color:var(--chalk);min-width:40px;text-align:right;}

/* ===== GRADES ===== */
.stand-grade{font-family:'Libre Franklin';font-weight:700;font-size:15px;width:34px;flex:0 0 auto;text-align:center;}
.grade-A{color:var(--win);} .grade-B{color:var(--cyan);} .grade-C{color:var(--clock);} .grade-D{color:var(--loss);}

/* ===== RECAP MODAL ===== */
.recap-overlay{position:fixed;inset:0;background:rgba(6,8,18,.88);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:16px;z-index:100;padding:20px;animation:feedIn .25s ease;}
.recap-card{width:100%;max-width:400px;background:var(--panel);color:var(--chalk);
  border:1.5px solid var(--accent);border-radius:16px;padding:20px;
  box-shadow:0 20px 60px rgba(0,0,0,.5);position:relative;}
.rc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.rc-logo{display:flex;align-items:center;gap:10px;}
.rc-mark{width:36px;height:36px;border-radius:50%;background:radial-gradient(circle at 35% 30%,var(--gold),var(--cost) 78%);
  border:2px solid var(--chalk);display:grid;place-items:center;font-family:'Libre Franklin';font-weight:900;font-size:15px;color:#111827;}
.rc-title{font-family:'Libre Franklin';font-weight:900;font-size:17px;letter-spacing:.5px;color:var(--chalk);}
.rc-sub{font-size:11px;color:var(--chalk-dimmer);letter-spacing:1px;text-transform:uppercase;}
.rc-grade{font-family:'Libre Franklin';font-weight:900;font-size:24px;line-height:1;color:#fff;
  background:var(--accent);border-radius:50%;width:50px;height:50px;display:grid;place-items:center;}
.rc-teamname{font-family:'Libre Franklin';font-weight:900;font-size:23px;letter-spacing:.5px;margin-bottom:14px;color:var(--chalk);}
.rc-roster{display:flex;flex-direction:column;gap:1px;background:var(--line);border-radius:10px;overflow:hidden;margin-bottom:14px;}
.rc-row{display:flex;align-items:center;gap:10px;background:var(--ink2);padding:9px 13px;}
.rc-row.res{background:var(--ink);}
.rc-pos{font-family:'Libre Franklin';font-weight:700;font-size:12px;color:var(--accent);width:26px;flex:0 0 auto;}
.rc-name{flex:1;font-size:14px;font-weight:600;color:var(--chalk);}
.rc-cost{font-size:11px;font-weight:700;color:var(--cost);flex:0 0 auto;}
.rc-scout{font-size:12.5px;color:var(--chalk-dim);font-style:italic;line-height:1.4;margin-bottom:14px;}
.rc-footer{display:flex;justify-content:space-between;align-items:center;font-family:'Libre Franklin';
  letter-spacing:1px;text-transform:uppercase;font-size:12px;font-weight:700;color:var(--accent);
  border-top:1px solid var(--line);padding-top:12px;}
.rc-footer .mono{color:var(--chalk-dim);font-size:11px;text-transform:none;letter-spacing:0;font-weight:400;}
.recap-close{background:var(--panel);border:1px solid var(--line2);color:var(--chalk-dim);
  font-family:'Libre Franklin';letter-spacing:1px;text-transform:uppercase;font-size:12px;padding:11px 20px;border-radius:8px;cursor:pointer;}
.recap-close:hover{border-color:var(--accent);color:var(--accent);}

/* ===== MOBILE PASS ===== */
@media(max-width:560px){
  .wrap{padding:16px 12px 70px;}
  .logo h1{font-size:21px;}
  .mode-card{padding:18px 16px;}
  .clock-team{font-size:20px;}
  .p-stats{display:none;}
  .p-row{padding:12px 13px;}
  .p-name{font-size:15px;}
  .team-card{padding:12px 13px;}
  .result-hero .champ-name{font-size:30px;}
  .champ-trophy-ico{font-size:40px;}
  .hero-glow{width:260px;height:170px;top:-24px;}
  .champ-grade-badge{font-size:15px;padding:3px 11px;}
  .story-text{font-size:14px;}
  .seg button{min-width:52px;font-size:14px;padding:10px 6px;}
  .action-btn{min-width:100%;}
  .bkt-col{min-width:150px;}
  .stat-chip{min-width:28px;padding:2px 5px;}
  .stat-chip b{font-size:12px;}
  .stat-chip i{font-size:7px;}
  .arch-tag{font-size:8.5px;padding:1px 5px;}
  .coach-seg{gap:6px;}
  .coach-seg button{font-size:11px;min-width:0;padding:8px 6px;flex:1 1 40%;}
}

/* ===== HOW-TO BLURB (index) ===== */
.howto-blurb{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);
  padding:20px 22px;margin:4px 0 20px;}
.howto-title{font-family:'Libre Franklin';letter-spacing:2px;text-transform:uppercase;font-size:12px;
  color:var(--cyan);margin-bottom:16px;font-weight:600;}
.howto-steps{display:grid;gap:16px;}
.howto-steps > div{display:flex;align-items:flex-start;gap:12px;font-size:14px;color:var(--chalk-dim);line-height:1.55;}
.hs-num{flex:0 0 auto;width:24px;height:24px;border-radius:50%;
  background:transparent;border:1.5px solid var(--gold);color:var(--gold);
  display:grid;place-items:center;font-family:'Libre Franklin';font-weight:700;font-size:13px;margin-top:1px;}
.hs-num-1{border-color:var(--cost);color:var(--cost);}
.hs-num-2{border-color:var(--purple);color:var(--purple);}
.hs-num-3{border-color:var(--cyan);color:var(--cyan);}
@media(min-width:640px){.howto-steps{grid-template-columns:repeat(3,1fr);gap:20px;}}

.hidden{display:none!important;}

/* ---- mode picker ---- */
.mode-cards{display:grid;gap:14px;margin:8px 0 20px;}
@media(min-width:640px){.mode-cards{grid-template-columns:1fr 1fr;}}
@media(min-width:900px){.mode-cards-3{grid-template-columns:1fr 1fr 1fr;}}
@media(min-width:1100px){.mode-cards-4{grid-template-columns:1fr 1fr 1fr 1fr;}}
@media(min-width:1300px){.mode-cards-5{grid-template-columns:1fr 1fr 1fr 1fr 1fr;}}
@media(min-width:900px) and (max-width:1299px){.mode-cards-5{grid-template-columns:1fr 1fr 1fr;}}
.mode-card-3{animation-delay:.16s;}
.mode-card-4{animation-delay:.24s;}
.mode-card-5{animation-delay:.30s;}
.mc-icon-purple{background:radial-gradient(circle at 35% 30%,var(--purple),#6d28d9 85%);}
.mc-icon-gold{background:radial-gradient(circle at 35% 30%,var(--gold),#b45309 85%);}
.mode-card{position:relative;text-align:left;background:var(--panel);border:1px solid var(--line);border-radius:var(--r);
  padding:20px 20px 20px 22px;cursor:pointer;transition:.16s;color:var(--chalk);overflow:hidden;
  animation:feedIn .4s ease both;}
.mode-card-2{animation-delay:.08s;}
.mode-card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--gold),var(--cost));opacity:.7;}
.mode-card:hover{border-color:var(--cyan);transform:translateY(-2px);box-shadow:0 12px 34px rgba(0,0,0,.35);}
.mode-card:active{transform:translateY(0) scale(.98);}
.mode-card .mc-icon{font-size:26px;margin-bottom:10px;width:48px;height:48px;border-radius:50%;
  display:grid;place-items:center;}
.mc-icon-wood{background:radial-gradient(circle at 35% 30%,var(--gold),var(--cost) 85%);}
.mc-icon-crimson{background:radial-gradient(circle at 35% 30%,var(--crimson),var(--crimson-dim) 85%);}
.mc-icon-emerald{background:radial-gradient(circle at 35% 30%,var(--emerald),var(--emerald-dim) 85%);}
.mode-card h3{font-size:21px;letter-spacing:.5px;margin-bottom:7px;color:var(--chalk);}
.mode-card p{font-size:13.5px;color:var(--chalk-dim);line-height:1.5;margin:0;}

/* live pulse dot on the Modern era button */
.live-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--win);
  box-shadow:0 0 6px var(--win);margin-right:5px;animation:pulse 1.3s infinite;vertical-align:middle;}

/* coaching style buttons — subtle colored identity even before selection */
.coach-btn-gold{border-color:rgba(234,179,8,.35)!important;}
.coach-btn-purple{border-color:rgba(139,92,246,.35)!important;}
.coach-btn-cyan{border-color:rgba(6,182,212,.35)!important;}
.coach-btn-wood{border-color:rgba(249,115,22,.35)!important;}

/* setup field cards: gentle entrance + press feedback */
.seg button:active, .mode-card button:active{transform:scale(.97);}
.seg button{transition:transform .1s ease, background .15s ease, border-color .15s ease;}
.seg button:active{transform:scale(.96);}



/* ---- sliders ---- */
.slider-block{margin:14px 0;}
.slider-top{display:flex;justify-content:space-between;align-items:baseline;font-size:13px;color:var(--chalk-dim);margin-bottom:7px;}
.slider-val{font-size:14px;color:var(--chalk);}
.diff-brutal{color:var(--loss);} .diff-normal{color:var(--accent);}
.diff-comfortable{color:#e5c34a;} .diff-superteam{color:var(--win);}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:6px;border-radius:3px;
  background:linear-gradient(90deg,var(--loss),var(--accent) 45%,var(--win));outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:20px;height:20px;
  border-radius:50%;background:var(--chalk);border:3px solid var(--accent);cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.4);}
input[type=range]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:var(--chalk);border:3px solid var(--accent);cursor:pointer;}
.cap-hint{font-size:11.5px;color:var(--chalk-dimmer);margin-top:12px;line-height:1.5;}

/* ---- cap displays ---- */
.team-budget{font-family:'Libre Franklin';font-size:11.5px;color:var(--chalk-dim);margin-bottom:10px;}
.team-budget b{color:var(--chalk);} .team-budget .low{color:var(--loss);}
.cost-pill{font-family:'Libre Franklin';font-size:11px;font-weight:700;color:var(--cost);
  background:rgba(200,120,60,.14);border-radius:5px;padding:1px 7px;margin-right:6px;flex:0 0 auto;}
.budget-header{background:var(--ink2);border:1px solid var(--line);border-radius:8px;padding:10px 13px;

.budget-header b{color:var(--accent);font-size:15px;} .budget-header b.low{color:var(--loss);}
.bh-hint{color:var(--chalk-dimmer);font-size:11px;}
.p-cost{flex:0 0 auto;text-align:center;font-weight:700;font-size:18px;color:var(--cost);min-width:42px;

.p-cost .p-cost-lbl{font-size:9px;color:var(--chalk-dimmer);letter-spacing:1px;font-weight:400;margin-top:2px;}
.p-cost.unaff{color:var(--loss);}
.p-row.disabled{opacity:.4;cursor:not-allowed;}
.p-row.disabled:hover{border-color:var(--line);background:var(--ink2);}

/* Phase 3: advanced sub-rating chips shown in Complex mode (cyan = analytics accent) */
.p-adv{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;}
.stat-chip{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;

.stat-chip b{font-family:'Libre Franklin';font-variant-numeric:tabular-nums;color:var(--cyan);font-size:13px;font-weight:700;line-height:1.15;}
.stat-chip i{color:var(--chalk-dimmer);font-size:8px;font-style:normal;font-weight:600;letter-spacing:.5px;line-height:1.3;}
.fit-tag{margin-left:8px;font-size:11px;color:var(--cyan);}

/* Team Fit breakdown panel — bidirectional bars, center = neutral */
.fit-breakdown{margin-top:12px;padding-top:12px;border-top:1px solid var(--line);}
.fit-row{display:flex;align-items:center;gap:8px;padding:3px 0;}
.fit-label{font-size:11px;color:var(--chalk-dim);width:72px;flex:0 0 auto;}
.fit-bar{flex:1;display:flex;align-items:center;height:8px;}
.fit-bar-half{flex:1;display:flex;height:100%;}
.fit-bar-neg{justify-content:flex-end;}
.fit-bar-pos{justify-content:flex-start;}
.fit-bar-center{width:1px;height:100%;background:var(--line2);flex:0 0 auto;}
.fit-bar-fill{height:5px;border-radius:3px;}
.fit-bar-fill.pos{background:var(--win);}
.fit-bar-fill.neg{background:var(--loss);}
.fit-val{font-family:'Libre Franklin';font-variant-numeric:tabular-nums;font-weight:700;font-size:11px;width:32px;text-align:right;flex:0 0 auto;}
.fit-val.pos{color:var(--win);}
.fit-val.neg{color:var(--loss);}
.fit-notes{margin-top:8px;font-size:11px;color:var(--chalk-dimmer);font-style:italic;line-height:1.5;}

/* Phase 5: archetype scouting tags (gold = premium accent) */
.p-arch{display:flex;gap:5px;margin-top:3px;flex-wrap:wrap;}
.arch-tag{font-size:9.5px;font-weight:600;padding:1px 6px;border-radius:4px;letter-spacing:.2px;border:1px solid transparent;}
.arch-tag.gold.primary{background:rgba(234,179,8,.16);color:var(--gold);border-color:rgba(234,179,8,.35);}
.arch-tag.gold.secondary{background:rgba(234,179,8,.07);color:var(--gold);opacity:.75;border-color:rgba(234,179,8,.18);}
.arch-tag.cyan.primary{background:rgba(6,182,212,.16);color:var(--cyan);border-color:rgba(6,182,212,.35);}
.arch-tag.cyan.secondary{background:rgba(6,182,212,.07);color:var(--cyan);opacity:.75;border-color:rgba(6,182,212,.18);}
.arch-tag.purple.primary{background:rgba(139,92,246,.16);color:var(--purple);border-color:rgba(139,92,246,.35);}
.arch-tag.purple.secondary{background:rgba(139,92,246,.07);color:var(--purple);opacity:.75;border-color:rgba(139,92,246,.18);}

/* Phase 5: coaching style picker + info card */
.coach-seg button{font-size:12.5px;min-width:auto;padding:9px 10px;}
.coach-card{margin-top:10px;padding:12px 13px;background:var(--ink2);border:1px solid var(--line);border-radius:10px;}
.coach-desc{font-size:12.5px;color:var(--chalk-dimmer);font-style:italic;}
.coach-str,.coach-weak{display:flex;flex-wrap:wrap;gap:6px 10px;align-items:center;margin-top:8px;font-size:11.5px;}
.coach-str b,.coach-weak b{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--chalk-dimmer);width:100%;margin-bottom:2px;}
.coach-str span{color:var(--win);}
.coach-weak span{color:var(--loss);}
.coach-req{margin-top:8px;font-size:11px;color:var(--gold);font-style:italic;}

</style>

// Builds a valid starting five from a real team's 8-man roster using each
// player's actual position eligibility (not just their listed primary
// position — several real rosters have zero *primary* players at a spot,
// e.g. Boston has no primary SG, but Derrick White/Jaylen Brown cover it via
// secondary eligibility). Backtracking search guarantees a valid assignment
// whenever one exists; the fallback (fill whatever's left, ignoring
// eligibility) only triggers for genuine data gaps — verified empirically
// that exactly one team (PHI, zero PF-eligible players) needs it, all other
// 29 resolve validly on eligibility alone.
function assignStarters(players){
  const withR = players.map(p=>({p, r:playerRating(p)}));
  const sorted = [...withR].sort((a,b)=>b.r-a.r);
  const assigned = {}; const used = new Set();
  function backtrack(posIdx){
    if(posIdx===POS_LIST.length) return true;
    const pos = POS_LIST[posIdx];
    const candidates = sorted.filter(x=>!used.has(x.p.id) && x.p.elig.includes(pos));
    for(const cand of candidates){
      used.add(cand.p.id); assigned[pos]=cand.p;
      if(backtrack(posIdx+1)) return true;
      used.delete(cand.p.id); delete assigned[pos];
    }
    return false;
  }
  const ok = backtrack(0);
  if(!ok){
    const remaining = sorted.filter(x=>!used.has(x.p.id));
    POS_LIST.forEach(pos=>{ if(!assigned[pos] && remaining.length) assigned[pos]=remaining.shift().p; });
  }
  return assigned;
}

// Builds a full team-shaped object (same shape teamRating() expects) for one
// of the 30 real Modern teams, using their actual current 8-man roster.
// Cached per season (real rosters don't change mid-season).
function realTeamRoster(teamAbbr){
  const players = CURRENT_POOL.filter(p=>p.team===teamAbbr);
  const assigned = assignStarters(players);
  const usedIds = new Set(POS_LIST.map(pos=>assigned[pos]?assigned[pos].id:null));
  const slots = {
    PG:assigned.PG||null, SG:assigned.SG||null, SF:assigned.SF||null, PF:assigned.PF||null, C:assigned.C||null,
    RES: players.filter(p=>!usedIds.has(p.id)),
  };
  return { _id:'real_'+teamAbbr, name:(TEAM_NAMES[teamAbbr]||teamAbbr), abbr:teamAbbr, slots, isUser:false,
    coachStyle:'balanced', personality:null, resCap:slots.RES.length, budget:Infinity, spent:0, _rating:0 };
}

//  ENGINE v2 — talent-leaning ratings + situational AI draft
// ============================================================
const BENCH_DISCOUNT = 0.55;
const W = { pts:1.15, reb:0.6, ast:1.05, stl:1.7, blk:1.6, tpm:0.85 };
const BLEND_STATS = 0.58, BLEND_INTG = 0.42;

function statScore(p){
  const raw = p.pts*W.pts + p.reb*W.reb + p.ast*W.ast + p.stl*W.stl + p.blk*W.blk + p.tpm*W.tpm;
  return Math.min(100, 28 + raw*0.92);
}
function intgAdj(intg){ return 55 + (intg-66)*(52/34); }
function playerRating(p){ return BLEND_STATS*statScore(p) + BLEND_INTG*intgAdj(p.intg); }

// ---------- CAREER MODE: point-buy character + stats-from-ratings engine ----------
// Build a character by hand: name, position, height, and a Fallout-style
// point-buy across the same 9 sub-ratings every other player in the game
// already has. Nothing downstream needs to know a player was hand-built —
// once the allocation produces an adv profile and a derived box score, the
// character is shaped exactly like any generated or hand-authored player,
// so archetypesOf(), playerRating(), aging, everything just works.

const CAREER_SUBSTATS = ['sco','sho','ply','pdef','idef','reb','ath','iq','vers'];
const CAREER_STAT_FLOOR = 25;     // no sub-rating can start below this — a weakness, not a zero
const CAREER_STAT_CEILING = 80;   // creation-time ceiling per stat — yearly points can push past this later, toward 99
const CAREER_CREATION_POINTS = 230; // must be fully spent — meaningfully less than what would max every stat,
                                     // so specializing in 3-4 things and neglecting the rest is the real choice

function newCareerAllocation(){
  const alloc = {};
  CAREER_SUBSTATS.forEach(k=>alloc[k]=CAREER_STAT_FLOOR);
  return alloc;
}
function careerPointsUsed(alloc){ return CAREER_SUBSTATS.reduce((s,k)=>s+(alloc[k]-CAREER_STAT_FLOOR), 0); }
function careerPointsRemaining(alloc){ return CAREER_CREATION_POINTS - careerPointsUsed(alloc); }
// Spends (or refunds, if delta<0) points on one stat, respecting the floor,
// the creation ceiling, and the total pool. Returns false with no change if
// the requested move isn't legal (e.g. would go over the pool or ceiling).
function adjustCareerStat(alloc, key, delta){
  if(delta>0){
    const maxByPool = careerPointsRemaining(alloc);
    const maxByCeiling = CAREER_STAT_CEILING - alloc[key];
    const actual = Math.min(delta, maxByPool, maxByCeiling);
    if(actual<=0) return false;
    alloc[key] += actual;
    return true;
  }
  const maxByFloor = alloc[key] - CAREER_STAT_FLOOR;
  const actual = Math.min(-delta, maxByFloor);
  if(actual<=0) return false;
  alloc[key] -= actual;
  return true;
}

// Position-appropriate height ranges (inches) and each position's "typical"
// center point, used only to apply a modest, bounded nudge to related
// sub-ratings — an unusually tall guard or short center is allowed and can
// be fun to build around, but it has a real, capped cost/benefit rather
// than being pure flavor.
const CAREER_HEIGHT_RANGES = {
  PG:{min:69,max:76,typical:72}, SG:{min:72,max:78,typical:75},
  SF:{min:75,max:81,typical:78}, PF:{min:78,max:84,typical:81},
  C:{min:80,max:87,typical:83},
};
function heightLabel(inches){ return Math.floor(inches/12)+"'"+(inches%12)+'"'; }
// Deviation from the position's typical height nudges size-related stats up
// and mobility-related stats down (or vice versa for unusually short),
// capped at a modest total swing so it's a real tradeoff, never a build-
// breaking one.
function heightAdvNudge(pos, heightIn){
  const range = CAREER_HEIGHT_RANGES[pos] || CAREER_HEIGHT_RANGES.SF;
  const dev = Math.max(-6, Math.min(6, heightIn - range.typical));
  const swing = dev * 0.9; // up to ±5.4 at the extremes
  return { reb: swing, idef: swing*0.8, ath: -swing*0.7, ply: -swing*0.4 };
}

// Converts a 9-part sub-rating profile into a realistic per-game box score
// — the same weighted-combination-per-stat approach used for generated
// rookies, and critically the SAME hard realism caps (a min-maxed scoring
// build shouldn't be able to produce an absurd stat line any more than a
// generated prospect should have produced the 47-rebound bug this fixed).
// Pass ROOKIE_ENTRY_CAPS for a rookie-year projection, ROOKIE_STAT_CAPS for
// a developed veteran season — same distinction already used elsewhere.
function statsFromAdv(adv, caps){
  const c = caps || ROOKIE_STAT_CAPS;
  const pct = v => Math.max(0, Math.min(1, v/99));
  const rawPts = pct(adv.sco*0.8 + adv.sho*0.2);
  const rawReb = pct(adv.reb*0.85 + adv.ath*0.15);
  const rawAst = pct(adv.ply*0.85 + adv.iq*0.15);
  // Usage tax: a real team only has so many possessions and touches to go
  // around. Being elite at scoring alone, or scoring-and-playmaking
  // together, stays untaxed — that's a real, if rare, archetype. But
  // maxing scoring AND rebounding AND playmaking all at once (which the
  // sub-ratings alone don't prevent) isn't something any real player has
  // ever actually done, so it gets scaled back toward believable
  // territory rather than staying at full, simultaneous elite output.
  const volumeSum = rawPts + rawReb + rawAst;
  const excess = Math.max(0, volumeSum - 1.6);
  const volumeTax = Math.max(0.76, 1 - excess*0.28);
  return {
    pts: round1(rawPts*volumeTax * c.pts),
    reb: round1(rawReb*volumeTax * c.reb),
    ast: round1(rawAst*volumeTax * c.ast),
    stl: round1(pct(adv.pdef*0.7 + adv.ath*0.2 + adv.iq*0.1) * c.stl),
    blk: round1(pct(adv.idef*0.75 + adv.ath*0.25) * c.blk),
    tpm: round1(pct(adv.sho*0.85 + adv.vers*0.15) * c.tpm),
  };
}

// Builds the actual character object from a finished allocation — shaped
// exactly like any other player in the game (elig, adv, pts/reb/ast/etc,
// intg), so every existing system (rating, archetype, aging) just works on
// it unmodified. Intangibles aren't part of the point-buy pool; they start
// modest and are meant to grow with career experience later, representing
// accumulated leadership and reputation rather than a stat you can min-max
// on day one.
// A career's TRUE ceiling isn't fully known at creation — same spirit as
// real prospects: some "can't miss" guys plateau, some late bloomers turn
// into legends. Rolled once, hidden as a soft scouting hint rather than a
// hard number, and enforced as the real cap on how far yearly points can
// push a stat. This is the actual mechanism that makes two playthroughs
// with identical allocation choices diverge — one career might cap out a
// solid role player, another might have the acceleration to reach a true
// 90s+ peak.
const CAREER_POTENTIAL_TIERS = {
  bustRisk:   { label:'Limited Upside',  weight:12, ceiling:70 },
  solid:      { label:'Solid Potential', weight:30, ceiling:85 },
  highUpside: { label:'High Upside',     weight:33, ceiling:94 },
  rareTalent: { label:'Rare Talent',     weight:25, ceiling:99 },
};
function rollCareerPotentialTier(){
  const entries = Object.entries(CAREER_POTENTIAL_TIERS);
  const total = entries.reduce((s,[,t])=>s+t.weight,0);
  let roll = Math.random()*total;
  for(const [key,tier] of entries){
    if(roll < tier.weight) return key;
    roll -= tier.weight;
  }
  return entries[entries.length-1][0];
}
// A plateau doesn't have to be the end of the story — real careers have
// late bloomers, guys who put in extra work and find another gear nobody
// expected. When every stat is maxed at the current ceiling, there's a
// real (not guaranteed) chance of a genuine breakthrough that raises the
// ceiling itself, so hitting a wall feels like a real moment in a career
// arc rather than a permanent dead end.
function careerBreakthroughCheck(player){
  if(player._potentialCeiling >= 99) return 0; // already at the true absolute ceiling
  if(Math.random() >= 0.3) return 0;
  const raise = 6 + Math.floor(Math.random()*10);
  const before = player._potentialCeiling;
  player._potentialCeiling = Math.min(99, before + raise);
  return player._potentialCeiling - before;
}
function buildCareerPlayer(name, pos, heightIn, alloc){
  const nudge = heightAdvNudge(pos, heightIn);
  const adv = {};
  CAREER_SUBSTATS.forEach(k=>{ adv[k] = Math.round(Math.max(15, Math.min(99, alloc[k] + (nudge[k]||0)))); });
  const stats = statsFromAdv(adv, ROOKIE_ENTRY_CAPS);
  const intg = Math.round(45 + adv.iq*0.35);
  const potentialTier = rollCareerPotentialTier();
  return {
    id: 'CAREER_'+Math.random().toString(36).slice(2,10),
    n: name, yr:'Rookie', pos, team:null, elig:[pos],
    heightIn,
    ...stats,
    intg, adv,
    _isCareerPlayer: true,
    _careerYear: 0, // years of pro experience — grows intg over a career
    _potentialTier: potentialTier,
    _potentialCeiling: CAREER_POTENTIAL_TIERS[potentialTier].ceiling,
  };
}

// Maps a freshly-built character's rating to a draft slot across a full
// two-round draft (1-60), with real variance — draft stock correlates with
// talent but isn't perfectly deterministic, same spirit as real draft-night
// risers and sliders. Calibrated against the same rating range generated
// rookies land in (see ROOKIE_ENTRY_CAPS-based generation), so a hand-built
// character and a generated prospect of similar quality land in a similar
// range of the draft.
function careerDraftPosition(rating){
  const normalized = Math.max(0, Math.min(1, (rating-32)/38));
  const expected = 60 - normalized*59;
  const luck = (Math.random()-0.5)*60*0.3;
  return Math.max(1, Math.min(60, Math.round(expected+luck)));
}
// Lands the character on a real Modern NBA team — weighted so an early
// pick genuinely lands on a currently weaker team and a late pick on a
// stronger one (like the real draft, worse records pick first), with
// enough shuffle that it isn't a rigid lookup table.
function careerDraftTeam(pickNumber){
  const rated = CURRENT_TEAMS.map(ab=>{ const rt=realTeamRoster(ab); return {ab, rating:teamRating(rt).rating}; })
    .sort((a,b)=>a.rating-b.rating); // worst first
  const idx = Math.max(0, Math.min(rated.length-1, Math.floor((pickNumber-1)/60*rated.length) + Math.round((Math.random()-0.5)*4)));
  return rated[idx].ab;
}

// Whether a trade demand is even a reasonable thing to consider — you need
// real standing (a star or starter, not a bench piece nobody would trade
// for) and a real reason (your team's been losing), not just a whim.
function careerCanDemandTrade(role, lastSeasonWins){
  return (role==='star' || role==='starter') && lastSeasonWins < 41;
}
// Finds a trade destination — weighted toward contenders (a real reason to
// demand out), using a skewed distribution rather than a flat one so most
// outcomes land on genuinely better teams without guaranteeing the single
// best team in the league every time; real trade demands don't always get
// you exactly where you'd pick.
function careerTradeDemandTeam(currentTeamAbbr){
  const candidates = CURRENT_TEAMS.filter(ab=>ab!==currentTeamAbbr)
    .map(ab=>{ const rt=realTeamRoster(ab); return {ab, rating:teamRating(rt).rating}; })
    .sort((a,b)=>b.rating-a.rating); // best first
  const idx = Math.max(0, Math.min(candidates.length-1, Math.floor(Math.random()*Math.random()*candidates.length)));
  return candidates[idx].ab;
}

// Off-season random events — real narrative texture between seasons, in
// the spirit of a BitLife-style life path. Deliberately a large, varied
// pool (32 events, 3 choices each) rather than a small one: a 15-20 year
// career sees 10+ of these, and a small pool would repeat constantly —
// the exact mistake the rookie scouting blurbs made early on, learned the
// hard way once already. Each choice has a genuinely different outcome —
// a small points bonus, a stat nudge (positive or negative), or pure
// flavor with no mechanical effect — so choices reflect who you want your
