// Picks a random unseen event for this career (tracked on C.seenEventIds),
// falling back to allowing repeats only once the whole pool's been used —
// which shouldn't realistically happen within one career given the size
// of the pool relative to how many years a career actually runs.
function pickCareerEvent(seenEventIds){
  const seen = new Set(seenEventIds||[]);
  const unseen = CAREER_EVENTS.filter(e=>!seen.has(e.id));
  const pool = unseen.length ? unseen : CAREER_EVENTS;
  return pool[Math.floor(Math.random()*pool.length)];
}
// Applies a chosen event outcome to the player and/or the pending
// off-season point pool. Stat nudges go straight to adv AND regenerate
// the box score from it — same rule as everywhere else in this mode,
// learned the hard way once already.
function applyCareerEventChoice(player, choice, currentPointsPool){
  let pointsDelta = 0;
  if(choice.effect.type==='points'){
    pointsDelta = choice.effect.value;
  } else if(choice.effect.type==='stat'){
    player.adv[choice.effect.key] = Math.max(15, Math.min(99, player.adv[choice.effect.key] + choice.effect.value));
    const newStats = statsFromAdv(player.adv, ROOKIE_STAT_CAPS);
    Object.assign(player, newStats);
  }
  return Math.max(0, currentPointsPool + pointsDelta);
}

// How big a role you win this year, based on your rating against the real
// incumbent starter at your position — clearly better and you take the
// job outright, clearly worse and you're buried on the bench. This drives
// both which team roster you're folded into as (starter vs bench) and how
// much of your true ability actually shows up in a season's stats — a
// talented player who can't get on the floor doesn't put up star numbers.
const CAREER_ROLE_MULT = { star:1.05, starter:0.9, rotation:0.65, bench:0.4 };
function careerDetermineRole(player, teamRoster){
  const myR = playerRating(player);
  const incumbent = teamRoster.slots[player.pos];
  const incumbentR = incumbent ? playerRating(incumbent) : 50;
  if(myR >= incumbentR+3) return 'star';
  if(myR >= incumbentR-5) return 'starter';
  if(myR >= incumbentR-15) return 'rotation';
  return 'bench';
}
// Folds the career player into a real team roster: takes the job at their
// position if their role is star/starter (the incumbent moves to the
// bench rather than vanishing — a real team doesn't just cut a starter),
// otherwise joins as a bench piece with the incumbent left in place.
function careerFoldIntoRoster(player, teamAbbr){
  const team = realTeamRoster(teamAbbr);
  const role = careerDetermineRole(player, team);
  const incumbent = team.slots[player.pos];
  if((role==='star' || role==='starter') && incumbent){
    team.slots[player.pos] = player;
    team.slots.RES = [incumbent, ...(team.slots.RES||[])];
  } else {
    team.slots.RES = [player, ...(team.slots.RES||[])];
  }
  team._rating = teamRating(team).rating;
  return { team, role };
}
// Real front offices invest in complementary talent around a genuine
// franchise player — a team doesn't stay frozen around a legitimate star
// forever. A modest, occasional upgrade to your weakest bench spot once
// you're clearly a star, never guaranteed (some organizations are just
// better run than others), and always a believable step up rather than a
// superstar-caliber handout.
function careerTeamInvestment(team, role, rating){
  if(role!=='star' || rating<74 || Math.random()>=0.35) return null;
  const bench = team.slots.RES||[];
  if(!bench.length) return null;
  let weakestIdx = 0;
  bench.forEach((p,i)=>{ if(playerRating(p)<playerRating(bench[weakestIdx])) weakestIdx=i; });
  const weakest = bench[weakestIdx];
  const usedIds = new Set([...POS_LIST.map(pos=>team.slots[pos]?team.slots[pos].id:null), ...bench.map(p=>p.id)].filter(Boolean));
  const candidates = CURRENT_POOL.filter(p=>!usedIds.has(p.id) && playerRating(p)>playerRating(weakest)+8)
    .sort((a,b)=>playerRating(a)-playerRating(b));
  if(!candidates.length) return null;
  const upgrade = candidates[0]; // smallest meaningful upgrade available, not a superstar handout
  bench[weakestIdx] = upgrade;
  team._rating = teamRating(team).rating;
  return { out: weakest.n, in: upgrade.n };
}
// Real stakes for a stuck career: a bench player who never develops a real
// role is a roster spot a team could give to someone else. Risk grows the
// longer you're stuck there, capped so it's a real threat, never a
// guarantee — and a released player isn't guaranteed to land anywhere at
// all, same as real fringe-roster NBA careers.
function careerCutRisk(role, consecutiveBenchYears){
  if(role !== 'bench' || consecutiveBenchYears < 2) return 0;
  return Math.min(0.45, (consecutiveBenchYears-1)*0.16);
}
// After a release, most cut players DO catch on somewhere — usually a
// rebuilding team willing to take a flier on a cheap body — but real
// fringe NBA careers do sometimes just end here. Weighted toward weaker
// teams, since a contender has no use for a player who just got cut.
function careerFreeAgencyOutcome(currentTeamAbbr){
  if(Math.random() < 0.22) return null; // no team signs you — career-ending
  const candidates = CURRENT_TEAMS.filter(ab=>ab!==currentTeamAbbr)
    .map(ab=>{ const rt=realTeamRoster(ab); return {ab, rating:teamRating(rt).rating}; })
    .sort((a,b)=>a.rating-b.rating); // worst first — rebuilding teams take fliers
  const idx = Math.min(candidates.length-1, Math.floor(Math.random()*Math.random()*candidates.length));
  return candidates[idx].ab;
}
// Generates this year's season stat line — your true-ability box score
// (from the same statsFromAdv formula used everywhere else), scaled by how
// big a role you actually won. Uses the wider ROOKIE_STAT_CAPS ceiling
// rather than the tighter rookie-entry caps, since this represents a
// full NBA season, not a draft-day projection.
function careerSeasonStats(player, role){
  const mult = CAREER_ROLE_MULT[role] || 0.5;
  const base = statsFromAdv(player.adv, ROOKIE_STAT_CAPS);
  const scaled = {};
  Object.keys(base).forEach(k=>{ scaled[k] = round1(base[k]*mult); });
  return scaled;
}
// A per-game log with your season averages as the anchor and real game-to-
// game variance around them — reuses the team's actual game log (so wins/
// losses/opponents line up with the real simulated season) and layers your
// individual stat line on top, rather than simulating anyone else's box
// score.
function careerGameLog(seasonStats, teamGameLog){
  return teamGameLog.map(g=>{
    const jitter = () => 0.6 + Math.random()*0.8; // real game-to-game swing, not a flat average every night
    return {
      opponent: g.opponent, userWon: g.userWon, userScore: g.userScore, oppScore: g.oppScore,
      // Whole numbers — a real single-game box score can't show a
      // fraction of a point, rebound, or assist. Only season AVERAGES
      // (across 82 games) should ever carry a decimal.
      pts: Math.round(seasonStats.pts*jitter()), reb: Math.round(seasonStats.reb*jitter()),
      ast: Math.round(seasonStats.ast*jitter()), stl: Math.round(seasonStats.stl*jitter()),
      blk: Math.round(seasonStats.blk*jitter()), tpm: Math.round(seasonStats.tpm*jitter()),
    };
  });
}
// A simplified Game Score (in the spirit of the real NBA metric) — an
// overall "how good was this game" number that rewards more than just raw
// scoring, so a monster all-around game can outrank a pure volume-scoring
// night.
function careerGameScore(g){ return g.pts + g.reb*0.8 + g.ast*0.7 + g.stl*1.5 + g.blk*1.5; }
// Walks a season's game log and flags any game that beats the career-best
// so far, updating the running record in place as it goes — a real
// "signature moment" system rather than just a static stat line, since it
// makes a specific NIGHT memorable, not just the season average.
function markCareerHighs(gameLog, priorBest, priorGameCount){
  let best = priorBest || 0;
  let count = priorGameCount || 0;
  gameLog.forEach(g=>{
    const score = careerGameScore(g);
    // Only meaningful once there's a real baseline — the first handful of
    // games in a career would otherwise trivially all be a "career high"
    // just for existing, which isn't a real milestone.
    g.careerHigh = count >= 5 && score > best;
    if(score > best) best = score;
    count++;
  });
  return { best, count };
}
// Awards via a single "impact score" (individual rating, nudged by team
// success) rather than a full simulated league — modeling every other
// player's individual season just to rank yours against them is exactly
// the scope this mode is designed to avoid. A little randomness keeps it
// from being a hard, predictable cutoff, same as real voting has real
// variance even for deserving players.
// Five independent award tracks, each with its own scoring formula, so a
// season gets judged on what actually made it notable rather than every
// possible honor collapsing into one overall-value number. A defensive
// stopper, a valuable bench spark, a breakout year, and a go-to scorer in
// crunch time are all genuinely different stories — MVP and All-NBA
// shouldn't be the only shelf a player can ever fill.
function careerAwardsThisYear(player, role, seasonStats, teamWins, madePlayoffs, yearIdx, priorRating){
  const rating = playerRating(player);
  const awards = [];

  // Overall value track — unchanged core logic.
  const impact = rating + (madePlayoffs?3:0) + Math.max(0,teamWins-45)*0.1;
  const valueScore = impact + (Math.random()-0.5)*10;
  if(valueScore>=96) awards.push('MVP');
  if(valueScore>=88) awards.push('All-NBA First Team');
  else if(valueScore>=82) awards.push('All-NBA Second Team');
  else if(valueScore>=76) awards.push('All-NBA Third Team');
  if(valueScore>=68) awards.push('All-Star');

  // Defensive Player of the Year — rewards real defensive investment
  // (pdef/idef) on its own terms, completely independent of scoring.
  const defScore = (player.adv.pdef*0.55 + player.adv.idef*0.45) + (madePlayoffs?2:0) + Math.max(0,teamWins-45)*0.08 + (Math.random()-0.5)*10;
  if(defScore>=80) awards.push('Defensive Player of the Year');

  // Sixth Man of the Year — the one honor a rotation-role player can
  // actually chase; real 6MOY voting specifically goes to bench standouts,
  // not incumbent starters having a good year.
  if(role==='rotation'){
    const sixthScore = rating + Math.max(0,teamWins-41)*0.1 + (Math.random()-0.5)*8;
    if(sixthScore>=62) awards.push('Sixth Man of the Year');
  }

  // Rookie of the Year — only in year one, calibrated against the lower
  // range rookies actually produce rather than the full-career scale
  // everything else uses.
  if(yearIdx===1){
    const royScore = rating + Math.max(0,teamWins-38)*0.08 + (Math.random()-0.5)*8;
    if(royScore>=50) awards.push('Rookie of the Year');
  }

  // Most Improved Player — rewards the SIZE of the leap from last season,
  // not absolute quality, so a team's role player breaking out is exactly
  // the story this tells. Not eligible in year one, where there's no prior
  // season to have improved on.
  if(yearIdx>1){
    const delta = rating - priorRating;
    if(delta>=6){
      const mipScore = delta*3 + Math.max(0,teamWins-38)*0.1 + (Math.random()-0.5)*8;
      if(mipScore>=22) awards.push('Most Improved Player');
    }
  }

  // Clutch Player of the Year — a different spotlight than MVP: rewards
  // being the guy who takes the big shot on a competitive team, not just
  // overall value. Scoring-weighted, real team success required.
  if(role==='star' || role==='starter'){
    const clutchScore = seasonStats.pts*1.4 + Math.max(0,teamWins-44)*0.5 + (madePlayoffs?4:0) + (Math.random()-0.5)*10;
    if(clutchScore>=44) awards.push('Clutch Player of the Year');
  }

  return awards;
}

// Points earned in the off-season, based on how the season actually went —
// a standout, award-winning year on a winning team earns real room to
// grow; a quiet bench year still earns something, since even a role
// player keeps developing, just more slowly.
const CAREER_ROLE_BASE_POINTS = { bench:8, rotation:10, starter:13, star:16 };
function careerPointsEarned(role, awards, teamWins){
  const base = CAREER_ROLE_BASE_POINTS[role] || 8;
  const awardBonus = awards.length * 3;
  const winBonus = Math.max(0, teamWins-41) * 0.12;
  return Math.round(base + awardBonus + winBonus);
}
// Yearly off-season point-buy uses the same allocation mechanics as
// creation, but against the player's CURRENT ratings as the new floor
// (already-earned progress never resets) and a higher ceiling (99 instead
// of the creation-time 80), so a career spent specializing can genuinely
// approach true elite over many years.
const CAREER_YEARLY_CEILING = 99; // absolute hard cap — a player's own _potentialCeiling is usually the real limiting factor
function newCareerYearlyAllocation(player){
  const alloc = {};
  CAREER_SUBSTATS.forEach(k=>alloc[k]=player.adv[k]);
  return alloc;
}
function careerYearlyPointsUsed(alloc, player){ return Math.round(CAREER_SUBSTATS.reduce((s,k)=>s+(alloc[k]-player.adv[k]), 0)); }
function adjustCareerYearlyStat(alloc, player, key, delta, pointsPool){
  const ceiling = Math.min(CAREER_YEARLY_CEILING, player._potentialCeiling || CAREER_YEARLY_CEILING);
  if(delta>0){
    const maxByPool = pointsPool - careerYearlyPointsUsed(alloc, player);
    const maxByCeiling = ceiling - alloc[key];
    const actual = Math.min(delta, maxByPool, maxByCeiling);
    if(actual<=0) return false;
    alloc[key] += actual;
    return true;
  }
  const maxByFloor = alloc[key] - player.adv[key];
  const actual = Math.min(-delta, maxByFloor);
  if(actual<=0) return false;
  alloc[key] -= actual;
  return true;
}
// Applies a finished yearly allocation to the player permanently — critically,
// regenerates the actual box-score stats (pts/reb/ast/etc) and intangibles
// from the new adv profile, not just the adv numbers themselves. Skipping
// this was a real mistake caught in testing last session: updating adv
// alone leaves playerRating() reading stale box-score stats, silently
// undoing the whole point of spending the points.
function applyCareerYearlyAllocation(player, alloc){
  CAREER_SUBSTATS.forEach(k=>{ player.adv[k] = alloc[k]; });
  const newStats = statsFromAdv(player.adv, ROOKIE_STAT_CAPS);
  Object.assign(player, newStats);
  player.intg = Math.min(99, Math.round(player.intg + player.adv.iq*0.02 + 1)); // intangibles grow slowly with experience too
}
// A light, automatic aging pass — separate from and in addition to
// deliberate point spending. Physical tools erode a little past a certain
// age even if you keep investing elsewhere, the same real tension real NBA
// careers have: skill can offset decline, but it can't fully stop it.
function careerAgeDecline(player, age){
  if(age < 31) return;
  const athDecline = Math.min(8, (age-30)*0.9);
  player.adv.ath = Math.round(Math.max(15, player.adv.ath - athDecline));
  player.adv.reb = Math.round(Math.max(15, player.adv.reb - athDecline*0.5));
  if(age >= 35){
    const lateDecline = Math.min(6, (age-34)*0.7);
    player.adv.sco = Math.round(Math.max(15, player.adv.sco - lateDecline*0.5));
    player.adv.ply = Math.round(Math.max(15, player.adv.ply - lateDecline*0.4));
    player.adv.pdef = Math.round(Math.max(15, player.adv.pdef - lateDecline*0.6));
    player.adv.idef = Math.round(Math.max(15, player.adv.idef - lateDecline*0.6));
    player.adv.sho = Math.round(Math.max(15, player.adv.sho - lateDecline*0.2)); // shooting touch ages gracefully
    // iq is deliberately untouched — veteran IQ doesn't decline with age
  }
  const newStats = statsFromAdv(player.adv, ROOKIE_STAT_CAPS);
  Object.assign(player, newStats);
}

// =====================================================================
// DYNASTY MODE — rookie generation, potential, and aging/development.
// Generated rookies use the EXACT same data shape as every hand-authored
// player (pts/reb/ast/stl/blk/tpm/intg/adv/elig) and go through the exact
// same playerRating()/costOf()/archetypesOf()/fitScore() machinery —
// nothing downstream needs to know or care that a player was generated
// rather than curated. The only "extra" fields are a few underscore-
// prefixed ones (_age, _peakPotential, _potentialTier) that only Dynasty
// Mode's own aging logic reads.
// =====================================================================

const ROOKIE_FIRST_NAMES = [
  "Marcus","Jalen","Devin","Tyler","Cameron","Isaiah","Xavier","Elijah","Malik","Jaylen",
  "Andre","DeShawn","Terrence","Kobe","Trey","Darius","Amir","Josiah","Kendrick","Zion",
  "Chris","Dominic","Miles","Quentin","Reggie","Sean","Trevon","Wesley","Bryce","Cole",
  "Damian","Eli","Grant","Hunter","Ian","Jordan","Kyle","Lamar","Nate","Omar",
  "Preston","Rashad","Silas","Tobias","Vaughn","Adrian","Brandon","Corey","Dante","Emmett",
  "Jacob","Ethan","Ben",
];
const ROOKIE_LAST_NAMES = [
  "Barnett","Coleman","Dawson","Ellison","Fontaine","Grimes","Holloway","Ingram","Jarrett","Kessler",
  "Lattimore","Marsh","Nkemdi","Osei","Prescott","Quintero","Rourke","Sabatini","Tillman","Ubaka",
  "Vance","Whitfield","Yancey","Zeigler","Abernathy","Blackwood","Cotter","Delacroix","Ferris","Gantt",
  "Hargrove","Isley","Jernigan","Kirchner","Larkspur","Mabry","Norwood","Okafor","Peppers","Radcliffe",
  "Sheridan","Talbot","Underhill","Vasquez","Winslow","Ashby","Broussard","Castellan","Duquette","Everhart",
  "Hoffman","Santema","McCullough","Davenport","Hughes",
];
function generateRookieName(){
  const first = ROOKIE_FIRST_NAMES[Math.floor(Math.random()*ROOKIE_FIRST_NAMES.length)];
  const last = ROOKIE_LAST_NAMES[Math.floor(Math.random()*ROOKIE_LAST_NAMES.length)];
  return first+' '+last;
}

// Archetype shapes: a REALISTIC baseline box score for a decent
// rotation-caliber player of that type, plus a matching adv sub-rating
// profile — keeps generated players reading as a recognizable type (a
// "big" rebounds and blocks, not just posts a random stat blob) using
// numbers that actually look like basketball stats. This baseline gets
// scaled by quality and hard-capped per stat (see generateRookie) rather
// than derived backward through the rating formula — solving backward let
// any category with a small formula weight (rebounds especially) blow up
// into an absurd number for a good rating target.
const ROOKIE_SHAPES = {
  scorer:          { pts:17.0, reb:3.6, ast:3.2, stl:0.9, blk:0.3, tpm:1.7,
                      adv:{sco:88,sho:62,ply:42,pdef:38,idef:28,reb:32,ath:66,iq:52,vers:42} },
  playmaker:       { pts:11.5, reb:3.4, ast:6.8, stl:1.3, blk:0.2, tpm:1.2,
                      adv:{sco:52,sho:42,ply:88,pdef:44,idef:24,reb:28,ath:54,iq:70,vers:48} },
  big:             { pts:12.5, reb:8.2, ast:1.7, stl:0.6, blk:1.3, tpm:0.2,
                      adv:{sco:48,sho:22,ply:28,pdef:34,idef:78,reb:82,ath:58,iq:48,vers:32} },
  threeAndDefense: { pts:10.5, reb:4.2, ast:1.9, stl:1.1, blk:0.5, tpm:1.9,
                      adv:{sco:38,sho:72,ply:32,pdef:80,idef:56,reb:44,ath:70,iq:54,vers:58} },
  allAround:       { pts:13.5, reb:5.2, ast:4.3, stl:1.0, blk:0.5, tpm:1.4,
                      adv:{sco:58,sho:54,ply:58,pdef:54,idef:44,reb:48,ath:60,iq:58,vers:68} },
};
// Hard per-stat ceilings — no generated rookie's box score can exceed these
// regardless of archetype or target rating, keeping every stat line looking
// like something that could plausibly appear in a real box score.
// Tighter caps for a rookie's FIRST-year (draft-day) stat line specifically
// — a college draftee shouldn't project to near-elite-veteran assist or
// rebound totals before ever playing a pro game, even though a fully
// developed PEAK star years into their career reasonably can (that's what
// ROOKIE_STAT_CAPS below is for, used once a player has actually grown
// into their career via aging).
const ROOKIE_ENTRY_CAPS = { pts:29, reb:12.5, ast:8.2, stl:2.2, blk:2.5, tpm:4.0 };
// Wider caps for a fully-developed career (used during aging, once a
// player has had years to grow toward their peak) — still realistic, just
// allows genuine peak-level numbers a real star can reach.
const ROOKIE_STAT_CAPS = { pts:34, reb:15.5, ast:11.5, stl:2.6, blk:3.0, tpm:4.6 };
const ROOKIE_SHAPE_KEYS = Object.keys(ROOKIE_SHAPES);
// Which shapes make sense for which primary position — a "big" shape at PG
// would produce a nonsensical stat line, so nomination/generation only
// pulls from shapes that fit the rolled position.
const ROOKIE_SHAPES_BY_POS = {
  PG: ['playmaker','scorer','allAround'],
  SG: ['scorer','threeAndDefense','allAround'],
  SF: ['threeAndDefense','allAround','scorer'],
  PF: ['big','allAround','threeAndDefense'],
  C:  ['big','allAround'],
};

// Potential tiers: NOT a promise. The trajectory range is how much a
// rookie's rating could move (up OR down) from their entry level by the
// time their development plays out — every tier keeps real bust risk on
// the table, even the top one. A "Rare Talent" has the widest upside tail,
// but can still land at the bottom of that range and never pan out; a
// "Bust Risk" guy can still surprise on the high end of theirs. The tiers
// shift the ODDS, not the outcome.
const POTENTIAL_TIERS = {
  bustRisk:   { label:'Bust Risk',   trajRange:[-9, 7]  },
  solid:      { label:'Solid',       trajRange:[-3, 11] },
  highUpside: { label:'High Upside', trajRange:[-11, 21] },
  rareTalent: { label:'Rare Talent', trajRange:[-13, 30] },
};
// Odds of landing each tier, by round — round 1 skews toward the better
// tiers, round 2 is a real mixed bag (including occasional rare gems, the
// classic draft-steal story, and honest scrubs, the classic bust-of-a-lottery-
// -pick-that-slipped or just-plain-role-player story).
const POTENTIAL_ODDS_ROUND1 = [['bustRisk',0.12],['solid',0.38],['highUpside',0.33],['rareTalent',0.17]];
const POTENTIAL_ODDS_ROUND2 = [['bustRisk',0.34],['solid',0.42],['highUpside',0.19],['rareTalent',0.05]];
function rollPotentialTier(round){
  const odds = round===1 ? POTENTIAL_ODDS_ROUND1 : POTENTIAL_ODDS_ROUND2;
  const r = Math.random();
  let acc=0;
  for(const [key,p] of odds){ acc+=p; if(r<=acc) return key; }
  return odds[odds.length-1][0];
}

// Generates one fictional rookie prospect. `round` (1 or 2) skews the
// entry-rating distribution (round 1 meaningfully better on average, with
// its own long tail down; round 2 a wider spread including real sleepers)
// — the potential TIER is rolled independently per round odds above, so a
// round-2 prospect can still be a Rare Talent (the sleeper story), just
// less often than a round-1 prospect.
function generateRookie(round){
  const pos = POS_LIST[Math.floor(Math.random()*POS_LIST.length)];
  const shapeKey = ROOKIE_SHAPES_BY_POS[pos][Math.floor(Math.random()*ROOKIE_SHAPES_BY_POS[pos].length)];
  const shape = ROOKIE_SHAPES[shapeKey];

  // Entry rating target: round 1 centers higher with a tighter floor;
  // round 2 has a lower center and a wider, flatter spread. This is a
  // TARGET to scale toward — the actual entry rating below is derived from
  // the realistic, capped stat line that results, so it may land a little
  // off this target rather than hit it exactly. That's the point: realistic
  // stats first, rating derived from them, never the other way around.
  const base = round===1 ? 66 : 56;
  const spread = round===1 ? 14 : 18;
  const ratingTarget = Math.max(42, Math.min(84, base + (Math.random()+Math.random()+Math.random()-1.5)*spread/1.5));

  // Intangibles: correlated with the target with a meaningfully steep
  // slope (a real prospect billed as elite needs elite intangibles to
  // actually reach that rating, not just a token bump), plus independent
  // noise so it's not perfectly predictable from the target alone.
  const intg = Math.max(38, Math.min(93, 40 + (ratingTarget-42)*1.35 + (Math.random()-0.5)*16));

  // Scale the archetype's realistic baseline box score by how far the
  // target is from a "solid rotation player" reference point, then hard-cap
  // every individual stat — guarantees a plausible-looking line regardless
  // of archetype, instead of solving backward through the rating formula
  // (which could inflate any low-weight category, rebounds especially,
  // into an absurd number for a good rating target).
  const scale = Math.max(0.4, Math.min(2.3, 0.5 + (ratingTarget-42)/25));
  const jit = () => 0.85 + Math.random()*0.3; // independent per-stat texture, not a uniform scale
  const stats = {
    pts: round1(Math.min(ROOKIE_ENTRY_CAPS.pts, shape.pts*scale*jit())),
    reb: round1(Math.min(ROOKIE_ENTRY_CAPS.reb, shape.reb*scale*jit())),
    ast: round1(Math.min(ROOKIE_ENTRY_CAPS.ast, shape.ast*scale*jit())),
    stl: round1(Math.min(ROOKIE_ENTRY_CAPS.stl, shape.stl*scale*jit())),
    blk: round1(Math.min(ROOKIE_ENTRY_CAPS.blk, shape.blk*scale*jit())),
    tpm: round1(Math.min(ROOKIE_ENTRY_CAPS.tpm, shape.tpm*scale*jit())),
  };
  // The TRUE entry rating, computed from the actual (realistic, capped)
  // stats and intangibles — not forced to hit ratingTarget exactly.
  const entryRating = playerRating({...stats, intg});

  const tierKey = rollPotentialTier(round);
  const tier = POTENTIAL_TIERS[tierKey];
  const trajBonus = tier.trajRange[0] + Math.random()*(tier.trajRange[1]-tier.trajRange[0]);
  const peakPotential = Math.max(38, Math.min(99, entryRating + trajBonus));

  // adv sub-ratings: archetype shape's profile, scaled toward entry
  // quality, each with independent jitter for texture.
  const qualityScale = 0.55 + (entryRating/100)*0.7;
  const adv = {};
  for(const k in shape.adv){ adv[k] = Math.max(15, Math.min(99, Math.round(shape.adv[k]*qualityScale + (Math.random()-0.5)*10))); }

  // Secondary eligibility, like real players — sometimes just one
  // position, sometimes a natural neighbor position too.
  const posIdx = POS_LIST.indexOf(pos);
  const elig = [pos];
  if(Math.random()<0.4){
    const neighbor = POS_LIST[posIdx + (Math.random()<0.5?-1:1)];
    if(neighbor && !elig.includes(neighbor)) elig.push(neighbor);
  }

  return {
    id: 'ROOKIE_'+Math.random().toString(36).slice(2,10),
    n: generateRookieName(),
    yr: 'Rookie', pos, team: null, elig,
    pts: stats.pts, reb: stats.reb, ast: stats.ast, stl: Math.max(0,stats.stl), blk: Math.max(0,stats.blk), tpm: Math.max(0,stats.tpm),
    intg: Math.round(intg), adv,
    _age: 19 + Math.floor(Math.random()*3), // enters the league 19-21
    _peakPotential: peakPotential,
    _potentialTier: tierKey,
    _archShape: shapeKey,
  };
}
function round1(x){ return Math.round(x*10)/10; }

// Generates one round's prospect pool. Quality is tied to draft position —
// the earlier you're picking, the better the players still available in
// the pool, since (narratively) teams picking ahead of you have already
// taken the best names off the board. `pickPosition` is 1-indexed (1 =
// best possible slot in that round).
function generateProspectPool(round, pickPosition, poolSize){
  poolSize = poolSize||12;
  const prospects = [];
  for(let i=0;i<poolSize;i++) prospects.push(generateRookie(round));
  prospects.sort((a,b)=>b._peakPotential-a._peakPotential || playerRating(b)-playerRating(a));
  // Picking early: pool is presented as-is (best available). Picking late:
  // the very best 1-2 names in the pool are "already gone" — trimmed from
  // what you actually see, so your position genuinely changes your options,
  // not just a cosmetic label.
  const trimFromTop = Math.min(prospects.length-6, Math.floor((pickPosition-1)/3));
  return prospects.slice(trimFromTop);
}

// Adjusts a player's box-score stats — proportionally, preserving their
// archetype shape — so their computed rating moves toward a target value.
// This is how aging actually works: rather than regenerating a player from
// scratch each year, their existing stat line is scaled up or down to hit
// the new target, the same way a real player's box score shifts as their
// game evolves without becoming a different person.
function adjustPlayerRatingToward(player, targetRating){
  // If box-score stats alone — even maxed out (statScore=100) — still
  // couldn't reach the target given this player's CURRENT intangibles,
  // raise intangibles too. Leadership and feel for the game can grow with
  // experience the same way physical stats can; without this, a player
  // generated with modest intangibles could never reach a high peak no
  // matter how much their box score grew, since stats have a hard ceiling
  // (statScore caps at 100) that intangibles don't.
  const maxAchievableWithCurrentIntg = BLEND_STATS*100 + BLEND_INTG*intgAdj(player.intg);
  if(targetRating > maxAchievableWithCurrentIntg){
    const neededIntgAdjVal = (targetRating - BLEND_STATS*100) / BLEND_INTG;
    const neededIntg = 66 + (neededIntgAdjVal-55)*(34/52);
    player.intg = Math.round(Math.max(player.intg, Math.min(99, neededIntg)));
  }
  // Computed directly from the player's actual stats — NOT back-solved
  // from statScore()'s output, which caps at 100. Back-solving from a
  // capped value loses information about how far past the cap the
  // underlying stats actually are, which made this function blind once a
  // player's raw stats overshot the cap: it could no longer tell "exactly
  // at the ceiling" from "way past it," and further growth silently froze.
  const currentRaw = player.pts*W.pts + player.reb*W.reb + player.ast*W.ast + player.stl*W.stl + player.blk*W.blk + player.tpm*W.tpm;
  const neededSS = Math.max(28, Math.min(100, (targetRating - BLEND_INTG*intgAdj(player.intg)) / BLEND_STATS));
  const neededRaw = (neededSS-28)/0.92;
  if(currentRaw < 0.5){ // essentially floored — nudge everything up slightly rather than divide by ~0
    const bump = neededRaw>currentRaw ? 1.08 : 1;
    if(isDynastyRookie(player)){
      player.pts=round1(Math.min(ROOKIE_STAT_CAPS.pts, player.pts*bump));
      player.reb=round1(Math.min(ROOKIE_STAT_CAPS.reb, player.reb*bump));
      player.ast=round1(Math.min(ROOKIE_STAT_CAPS.ast, player.ast*bump));
    } else {
      player.pts=round1(player.pts*bump); player.reb=round1(player.reb*bump); player.ast=round1(player.ast*bump);
    }
    return;
  }
  const scale = Math.max(0.7, Math.min(1.3, neededRaw/currentRaw));
  // Hard-capped for generated rookies the same way initial generation is —
  // without this, growth compounding across many years of aging can still
  // drift a fictional player's stat into unrealistic territory even though
  // a fresh rookie is now generated realistically from the start. Legends
  // are explicitly EXEMPT: their stats are real historical numbers (Bill
  // Russell really did average 23.6 rebounds), and clamping them to a
  // rookie-realism ceiling would corrupt accurate history, not fix a bug.
  if(isDynastyRookie(player)){
    player.pts = round1(Math.min(ROOKIE_STAT_CAPS.pts, player.pts*scale));
    player.reb = round1(Math.min(ROOKIE_STAT_CAPS.reb, player.reb*scale));
    player.ast = round1(Math.min(ROOKIE_STAT_CAPS.ast, player.ast*scale));
    player.stl = round1(Math.max(0,Math.min(ROOKIE_STAT_CAPS.stl, player.stl*scale)));
    player.blk = round1(Math.max(0,Math.min(ROOKIE_STAT_CAPS.blk, player.blk*scale)));
    player.tpm = round1(Math.max(0,Math.min(ROOKIE_STAT_CAPS.tpm, player.tpm*scale)));
  } else {
    player.pts = round1(player.pts*scale);
    player.reb = round1(player.reb*scale);
    player.ast = round1(player.ast*scale);
    player.stl = round1(Math.max(0,player.stl*scale));
    player.blk = round1(Math.max(0,player.blk*scale));
    player.tpm = round1(Math.max(0,player.tpm*scale));
  }
}

// One dynasty-year of development for a generated (non-legend) player.
// Rising through their 20s toward their hidden peak potential, a handful
// of near-peak years, then decline after 32 — with real year-to-year
// variance layered on at every stage so it never reads as a spreadsheet.
function developRookieOneYear(player){
  player._age = (player._age||19) + 1;
  const age = player._age;
  const peak = player._peakPotential;
  const current = playerRating(player);
  let target;
  if(age<=26){
    const gap = peak-current;
    target = current + gap*(0.30+Math.random()*0.28) + (Math.random()-0.5)*3.5;
  } else if(age<=32){
    target = peak + (Math.random()-0.5)*4.5;
  } else {
    const declineYears = age-32;
    target = peak - declineYears*(2.2+Math.random()*2.2);
  }
  // Cap how much a rating can move in a single season — even a dramatic
  // breakout or decline year should read as gradual across a multi-year
  // arc, not an implausible one-year leap (and large single-year jumps
  // were also what pushed generated stat lines into unrealistic territory
  // in the first place).
  target = Math.max(current-7, Math.min(current+7, target));
  adjustPlayerRatingToward(player, Math.max(28, Math.min(99, target)));
  return { retiring: age>=37 || (age>32 && Math.random()<0.06*(age-32)) };
}

// Legends age gently rather than following the full rookie arc — the
// point of drafting peak Jordan is that it stays recognizably peak Jordan
// for most of the run, not a slow slide into a diminished version. A
// randomized career clock (different every playthrough) determines when
// they retire; a small annual dip is the only real cost of time passing.
function assignLegendCareerClock(){ return 3 + Math.floor(Math.random()*6); } // 3-8 dynasty-years remaining
function ageLegendOneYear(player){
  const current = playerRating(player);
  const target = current - (0.8 + Math.random()*1.4);
  adjustPlayerRatingToward(player, Math.max(45, target));
}

function teamRating(team){
  const st = ["PG","SG","SF","PF","C"].map(s=>team.slots[s]).filter(Boolean);
  const rs = (team.slots.RES||[]).filter(Boolean);
  let core=0; st.forEach(p=>core+=playerRating(p));
  rs.forEach(p=>core+=playerRating(p)*BENCH_DISCOUNT);
  const denom = st.length + rs.length*BENCH_DISCOUNT;
  const avg = denom>0 ? core/denom : 0;
  const cats={scoring:0,reb:0,playmaking:0,defense:0,shooting:0};
  st.forEach(p=>{cats.scoring+=p.pts;cats.reb+=p.reb;cats.playmaking+=p.ast;cats.defense+=(p.stl+p.blk);cats.shooting+=p.tpm;});
  const vals=Object.values(cats);
  const mean=vals.reduce((a,b)=>a+b,0)/vals.length;
  const minRatio=Math.min(...vals.map(v=>mean>0?v/mean:0));
  const balanceBonus=3*Math.max(0,minRatio-0.35)/0.65;
  const talent = avg+balanceBonus;
  // Complex Mode layers Team Fit on top of the same talent number Simple
  // Mode uses — talent still dominates the blend. Simple Mode is untouched.
  const coachKey = team.coachStyle || 'balanced';
  const fit = (typeof S!=='undefined' && S.complexity==='complex') ? computeTeamFit(st, coachKey) : 0;
  return { rating:talent+fit, avg, balanceBonus, fit, cats };
}

// =====================================================================
// DYNASTY MODE — roster cap, auto-reoptimizing bench, draft position from
// record, and CPU trade offers.
// =====================================================================

// Roster cap scales with how many players the dynasty started with — a
// bigger initial roster gets more room to carry through the years, always
// bounded to a believable range.
function dynastyRosterCap(startingRosterSize){
  return Math.max(8, Math.min(12, startingRosterSize+3));
}
// Total players currently on a dynasty roster (starting five + bench).
function dynastyRosterCount(team){
  return POS_LIST.filter(pos=>team.slots[pos]).length + (team.slots.RES||[]).length;
}
// Rebuilds a team's starting five + bench from its full flat player list.
// Called any time the roster changes — a retirement, a cut, a new
// rookie — so the best available five are always actually fielded,
// without needing a separate manual lineup-editor UI. Reuses the exact
// same optimal-assignment logic Season Mode already uses for the 30 real
// teams, so "who starts" is a solved, tested problem, not new logic.
function reoptimizeDynastyRoster(team){
  const flat = [...POS_LIST.map(pos=>team.slots[pos]).filter(Boolean), ...(team.slots.RES||[])];
  const assigned = assignStarters(flat);
  const usedIds = new Set(POS_LIST.map(pos=>assigned[pos]?assigned[pos].id:null));
  POS_LIST.forEach(pos=>{ team.slots[pos] = assigned[pos]||null; });
  team.slots.RES = flat.filter(p=>!usedIds.has(p.id));
  team._rating = teamRating(team).rating;
}
// Adds new players (e.g. this year's two rookies) to the roster and
// reoptimizes the lineup around them. Returns how many players, if any,
// now need to be cut to get back under the cap — the caller is
// responsible for actually presenting that choice; this just reports it.
function addPlayersToDynastyRoster(team, newPlayers, rosterCap){
  team.slots.RES = [...(team.slots.RES||[]), ...newPlayers];
  reoptimizeDynastyRoster(team);
  return Math.max(0, dynastyRosterCount(team) - rosterCap);
}
// Removes one player (by id) from wherever they are on the roster —
// starting five or bench — and reoptimizes. Used identically for a
// user-chosen cut and for a retirement; the removal mechanics are the
// same either way, only the reason differs.
function removePlayerFromDynastyRoster(team, playerId){
  POS_LIST.forEach(pos=>{ if(team.slots[pos] && team.slots[pos].id===playerId) team.slots[pos]=null; });
  team.slots.RES = (team.slots.RES||[]).filter(p=>p.id!==playerId);
  reoptimizeDynastyRoster(team);
}
// Flat list of every player currently on a dynasty roster, starters and
// bench together — the natural shape for cut screens, trade screens, and
// anywhere else the whole roster needs to be considered as one list.
function dynastyFlatRoster(team){
  return [...POS_LIST.map(pos=>team.slots[pos]).filter(Boolean), ...(team.slots.RES||[])];
}

// Maps last season's win percentage to a rookie-draft position (1 = best).
// Worse records get better ODDS at an early pick, not a guarantee — real
// lottery-style luck is layered on top of the expected relationship, so
// tanking is incentivized but never risk-free, and a good season can still
// occasionally sneak an earlier-than-deserved pick.
function dynastyDraftPosition(winPct, poolTeamCount){
  poolTeamCount = poolTeamCount||14;
  const expected = 1 + winPct*(poolTeamCount-1);
  const luck = (Math.random()-0.5)*poolTeamCount*0.35;
  return Math.max(1, Math.min(poolTeamCount, Math.round(expected+luck)));
}

// CPU trade offers — accept/decline only, no counter-negotiation, in the
// spirit of Retro Bowl-style trade blocks rather than a full negotiation
// system. Every offer includes at least one player somewhere in the
// package (either side) — a pure pick-for-pick swap has no real roster
// stakes and wouldn't be an interesting decision either way.

// Rough value for one trade asset — a player's rating directly, or a flat
// estimate for a pick (round 1 worth meaningfully more than round 2, and
// a future pick discounted slightly for the uncertainty of not knowing
// exactly what you're getting yet).
function tradeAssetValue(asset){
  if(asset.type==='player') return playerRating(asset.player);
  if(asset.type==='pick') return (asset.round===1 ? 62 : 46) * (asset.when==='next' ? 0.85 : 1);
  return 0;
}
function tradePackageValue(pieces){ return pieces.reduce((s,a)=>s+tradeAssetValue(a),0); }

// Weighted-random selection favoring better players — a real team would
// plausibly be more interested in your good players than your scrubs, but
// this still keeps genuine variance (not always your single best asset).
function weightedPickFromRoster(roster, count){
  const pool = [...roster].sort((a,b)=>playerRating(b)-playerRating(a));
  const picked = [];
  for(let i=0;i<count && pool.length;i++){
    const idx = Math.min(pool.length-1, Math.floor(Math.pow(Math.random(),1.8)*pool.length));
    picked.push(pool[idx]);
    pool.splice(idx,1);
  }
  return picked;
}
// Short "why do they want this guy" flavor, pattern-matched off a player's
// archetype signature — not deep team-need modeling, but enough that an
// ask reads as purposeful rather than arbitrary.
function tradeReasonFor(player){
  const a = player.adv;
  const pick = arr => arr[Math.floor(Math.random()*arr.length)];
  if(!a) return 'looking to add proven talent';
  if(a.reb>=65 && a.idef>=60) return pick(['looking to upgrade the frontcourt', 'in need of size and rebounding', 'trying to fix a leaky interior defense']);
  if(a.ply>=70) return pick(['in the market for a playmaker', 'looking for someone to run the offense', 'wants a better ball-handler in crunch time']);
  if(a.sho>=65) return pick(['needs shooting on the perimeter', 'trying to open up the floor with more spacing', 'chasing three-point shooting off the bench']);
  if(Math.max(a.pdef,a.idef)>=68) return pick(['wants to get tougher defensively', 'looking to shore up their perimeter defense', 'tired of getting torched on that end of the floor']);
  if(a.sco>=75) return pick(['chasing more scoring punch', 'looking for a bucket when the offense stalls', 'wants another shot-creator late in games']);
  return pick(['looking to add proven talent', 'trying to get younger and more athletic', 'shaking things up after a disappointing stretch']);
}

// Scouting-report flavor text for a draft prospect, based on their
// archetype shape — deterministic per player (hashed from their id) so
// re-rendering the same pool doesn't show a different blurb each time.
const SCOUTING_BLURBS = {

    "a bucket-getter who can create his own shot off the dribble",
    "an aggressive scorer who wants the ball in his hands late",

    "a natural killer instinct in isolation situations",
    "scores in bunches once he gets going, streaky but dangerous",
    "comfortable pulling up from anywhere on the floor",
    "relentless downhill driver who draws a lot of contact",
  ],
  playmaker: [
    "a pass-first floor general who sees the whole court",
    "a crafty ball-handler who sets up teammates first",
    "a high-IQ playmaker who controls the pace of a game",
    "elite court vision, the kind of passer who makes everyone around him better",
    "a steady hand who rarely turns the ball over under pressure",
    "reads defenses a step ahead and delivers the ball on time",
    "a true point guard in the traditional sense — pass first, shoot second",
    "orchestrates an offense with poise beyond his experience",
  ],
  big: [
    "a rugged rebounder who protects the rim",
    "a physical presence in the paint on both ends",
    "a true anchor who alters shots inside",
    "dominant on the offensive glass, always around the ball",
    "a load to handle in the post with a soft touch around the rim",
    "sets bone-crushing screens and finishes hard at the basket",
    "the kind of rim protector who changes an opponent's shot selection",
    "plays bigger than his height with great timing as a shot-blocker",
  ],
  threeAndDefense: [
    "a versatile wing who can guard multiple positions and stretch the floor",
    "a 3-and-D specialist with real defensive instincts",
    "a long, switchable defender whose jumper is coming along",
    "moves his feet well enough to guard 1 through 4",
    "a quick-trigger shooter who doesn't need much space to get his shot off",
    "disruptive hands on defense, generates a lot of deflections",
    "a glue guy who does the little things that don't show up in a box score",
    "athletic enough to guard up a position when it matters",
  ],
  allAround: [
    "a well-rounded player without a real hole in his game",
    "someone who does a little of everything without a standout weakness",
    "a versatile piece who should fit into any lineup",
    "no elite tool, but nothing he can't do at a solid level",
    "a smart, team-first player who impacts winning in quiet ways",
    "flexible enough to play multiple roles depending on the lineup around him",
    "steady and dependable, the kind of player coaches trust",
    "a jack-of-all-trades who just knows how to play the game",
  ],
};
function hashStr(s){ let h=0; for(let i=0;i<s.length;i++){ h=(h*31+s.charCodeAt(i))|0; } return Math.abs(h); }
function scoutingBlurbFor(rookie){
  const options = SCOUTING_BLURBS[rookie._archShape] || SCOUTING_BLURBS.allAround;
  return options[hashStr(rookie.id) % options.length];
}

// Generates one CPU trade offer for the user's dynasty team, or null if
// the roster's too thin to safely offer on (protects against a trade
// gutting a team that barely has enough bodies to field a lineup).
// `era` should be 'all' or 'modern', matching the dynasty's player pool —
// the player CPU teams offer back is a real name from that same pool who
// isn't currently on the user's roster, not a generic placeholder.
function generateTradeOffer(team, retiredIds, dynastyState){
  const myRoster = dynastyFlatRoster(team);
  if(myRoster.length<6) return null;

  // Trade partners are always real Modern NBA players — "the rest of the
  // league" is the actual current NBA regardless of which era your OWN
  // team was drafted from, same as how the season simulation itself always
  // plays you against real Modern opponents. An All-Time dynasty doesn't
  // trade with other legends; it trades with today's league.
  const pool = CURRENT_POOL;
  const myIds = new Set(myRoster.map(p=>p.id));
  const retiredSet = new Set(retiredIds||[]);
  const outside = pool.filter(p=>!myIds.has(p.id) && !retiredSet.has(p.id));
  if(!outside.length) return null;

  // Pick assets are only real, usable things if there's an actual rookie
  // draft left for them to apply to. In the dynasty's final year, there is
  // no draft at all (the whole rookie-draft phase is skipped), so neither
  // "this year's" nor "next year's" pick would ever be spendable — suppress
  // pick assets entirely rather than offering something that can never be
  // used. In any other year, "next" is fine; "this" is fine too since the
  // draft for the CURRENT year hasn't happened yet when trades are offered.
  const draftsRemain = dynastyState ? dynastyState.yearIdx < dynastyState.totalYears : true;
  function pickAsset(){ return {type:'pick', round: Math.random()<0.5?1:2, when: Math.random()<0.6?'next':'this'}; }

  // Determine the fairness tier FIRST — this decides which of your players
  // are even eligible to be asked for. A team offering a genuinely great
  // return can reasonably covet your best player; a team trying to lowball
  // you never would — no real front office asks for your franchise
  // cornerstone while offering a bench piece back, so the worst trades are
  // restricted to your lesser assets instead of your best ones.
  const roll = Math.random();
  const tier = roll<0.28 ? 'favorable' : roll<0.72 ? 'fair' : 'unfavorable';
  const targetRatio = tier==='favorable' ? 1.25+Math.random()*0.45
                     : tier==='fair'      ? 0.85+Math.random()*0.3
                     :                      0.65+Math.random()*0.2; // a real bad deal, not an insulting one

  const sortedByRating = [...myRoster].sort((a,b)=>playerRating(b)-playerRating(a));
  const eligibleForAsk = tier==='unfavorable' ? sortedByRating.slice(2) : myRoster; // roster is always >=6, so this never empties out

  const wantCount = Math.random()<0.7 ? 1 : 2;
  const wantsFromYou = weightedPickFromRoster(eligibleForAsk, Math.min(wantCount, eligibleForAsk.length)).map(p=>({type:'player', player:p}));
  if(!wantsFromYou.length) return null; // roster too thin to safely ask for anyone
  if(draftsRemain && Math.random()<0.25) wantsFromYou.push(pickAsset());
  const wantValue = tradePackageValue(wantsFromYou);
  const askedPlayer = wantsFromYou.find(a=>a.type==='player').player;
  const partnerAbbr = CURRENT_TEAMS[Math.floor(Math.random()*CURRENT_TEAMS.length)];

  const targetGiveValue = wantValue*targetRatio;

  // Pick randomly from a pool of reasonably-close candidates, not always
  // the single mathematically-closest match — the closest-match-only
  // approach collapsed onto the same few elite names constantly, since top
  // ratings cluster into a small pool (any target value in the "very good"
  // range has only a handful of real candidates near it, so always taking
  // the #1 closest means always getting the same one or two names).
  const byCloseness = [...outside].sort((a,b)=>Math.abs(playerRating(a)-targetGiveValue)-Math.abs(playerRating(b)-targetGiveValue));
  const candidatePool = byCloseness.slice(0, Math.min(10, byCloseness.length));
  const offerPlayer = candidatePool[Math.floor(Math.random()*candidatePool.length)];
  const theyGiveYou = [{type:'player', player: offerPlayer}];
  const gap = targetGiveValue - playerRating(offerPlayer);
  if(draftsRemain && (gap>25 || Math.random()<0.2)) theyGiveYou.push(pickAsset());

  return {
    id: 'trade_'+Math.random().toString(36).slice(2,9),
    theyGiveYou, wantsFromYou,
    theyGiveValue: tradePackageValue(theyGiveYou),
    wantValue,
    partnerAbbr, partnerName: TEAM_NAMES[partnerAbbr],
    reason: tradeReasonFor(askedPlayer),
  };
}

// Applies an accepted offer: removes what you gave up, adds what you
// received. Picks are tracked as a simple ledger against a resolved
// absolute year (dynastyState.yearIdx, +1 if "next") rather than staying
// symbolic, so the draft-year logic can directly check "do I still have my
// round 1 pick this year?" against concrete entries. Returns how many
// players (if any) now need to be cut to get back under the roster cap —
// same overflow contract as addPlayersToDynastyRoster, so the caller
// handles it the same way a rookie-draft overflow would be handled.
function applyTradeOffer(team, offer, dynastyState){
  offer.wantsFromYou.forEach(asset=>{
    if(asset.type==='player') removePlayerFromDynastyRoster(team, asset.player.id);
    else if(asset.type==='pick'){
      const yearIdx = dynastyState.yearIdx + (asset.when==='next'?1:0);
      dynastyState.tradedAwayPicks.push({round:asset.round, yearIdx});
    }
  });
  const incomingPlayers = offer.theyGiveYou.filter(a=>a.type==='player').map(a=>a.player);
  const cap = dynastyRosterCap(dynastyState.startingRosterSize);
  const overflow = incomingPlayers.length ? addPlayersToDynastyRoster(team, incomingPlayers, cap) : 0;
  offer.theyGiveYou.forEach(asset=>{
    if(asset.type==='pick'){
      const yearIdx = dynastyState.yearIdx + (asset.when==='next'?1:0);
      dynastyState.extraPicks.push({round:asset.round, yearIdx});
    }
  });
  return { overflow };
}
// Whether the user still holds their own round-`round` pick in a given
// dynasty year — false if it's been traded away. Used when building that
// year's draft rounds.
function hasOwnPick(dynastyState, round, yearIdx){
  return !dynastyState.tradedAwayPicks.some(p=>p.round===round && p.yearIdx===yearIdx);
}
// Any extra picks (acquired via trade) the user holds for a given round in
// a given dynasty year, beyond their own.
function extraPicksFor(dynastyState, round, yearIdx){
  return dynastyState.extraPicks.filter(p=>p.round===round && p.yearIdx===yearIdx).length;
}

// A generated rookie's id always starts with 'ROOKIE_' — everything else
// (All-Time legends, Modern real players) is treated as a "legend" for
// aging purposes: gentle decline on a randomized career clock, rather than
// the full rise/peak/decline arc a generated prospect goes through.
function isDynastyRookie(p){ return typeof p.id==='string' && p.id.indexOf('ROOKIE_')===0; }

// One year of aging for the whole roster. Rookies follow their full
// development arc; legends tick down their randomized career clock and
// decline gently. Returns the players who retired this year — already
// removed from the roster (with the lineup automatically reoptimized
// around their departure) by the time this returns.
function ageDynastyRoster(team, dynastyState){
  const retired = [];
  dynastyFlatRoster(team).forEach(p=>{
    if(isDynastyRookie(p)){
      const result = developRookieOneYear(p);
      if(result.retiring) retired.push(p);
    } else {
      if(dynastyState.legendClocks[p.id]==null) dynastyState.legendClocks[p.id] = assignLegendCareerClock();
      dynastyState.legendClocks[p.id]--;
      ageLegendOneYear(p);
      if(dynastyState.legendClocks[p.id]<=0) retired.push(p);
    }
  });
  retired.forEach(p=>{ removePlayerFromDynastyRoster(team, p.id); dynastyState.retiredPlayerIds.push(p.id); });
  return retired;
}

// How many picks the user actually holds in a given round this year — 1
// for their own pick unless it was traded away, plus however many extra
// picks in that round they've acquired via trade.
function dynastyRoundPickCounts(dynastyState, round){
  const own = hasOwnPick(dynastyState, round, dynastyState.yearIdx) ? 1 : 0;
  return own + extraPicksFor(dynastyState, round, dynastyState.yearIdx);
}

// Sets up a new dynasty from a freshly-drafted starting team. Assigns
// career clocks to every legend already on the roster (a dynasty starting
// with an All-Time team begins the clock immediately, same as any legend
// picked up later).
function initDynastyState(totalYears, startingTeam, era, conf){
  const startingRosterSize = dynastyRosterCount(startingTeam);
  const state = {
    active: true, totalYears, yearIdx: 1,
    startingRosterSize, rosterCap: dynastyRosterCap(startingRosterSize),
    era, conf,
    legendClocks: {}, tradedAwayPicks: [], extraPicks: [], history: [],
    retiredPlayerIds: [], // permanent — a retired player is done, never eligible to resurface via trade
    currentSeasonResult: null,
  };
  dynastyFlatRoster(startingTeam).forEach(p=>{
    if(!isDynastyRookie(p)) state.legendClocks[p.id] = assignLegendCareerClock();
  });
  return state;
}

// Team Fit (Complex Mode only): how well a starting five's advanced
// sub-ratings mesh — floor spacing, shot creation, defensive identity, and
// lineup versatility from raw sub-rating averages, PLUS a "Construction"
// signal that specifically rewards complementary pairing over just stacking
// good averages: does the roster have a real creator, enough shooting
// around its bigs, a mix of distinct roles, and a defense/offense division
// of labor — not five clones of the same skillset. Talent (teamRating's
// core avg) still dominates; this adds a modest ±4 swing on top, never a
// takeover. fitScore() is the shared math, usable on any non-empty list of
// players — computeTeamFit()/teamFitDetail() (final grading) only ever call
// it with a complete five; pickFitBonus() (live AI drafting) calls it with
// whatever starters exist so far, so CPU picks can lean toward complementary
// fits as the roster forms.
//
// Base weights below reproduce the original 5-factor formula exactly when
// coachKey is 'balanced' (all deltas 0) — Perimeter/Interior Defense split
// 0.55/0.55 sums to the old blended 1.1 defense weight. Rebounding,
// Athleticism, and Basketball IQ start at weight 0 (no effect) until a
// coaching style asks for them.
const FIT_BASE_WEIGHTS = {
  spacing:1.1, creation:1.1, perimeterDefense:0.55, interiorDefense:0.55,
  rebounding:0, athleticism:0, basketballIQ:0, versatility:0.6,
};
function fitScore(list, coachKey){
  if(!list.length) return {total:0, breakdown:null};
  const adv = p => p.adv || {sco:50,sho:50,ply:50,pdef:50,idef:50,reb:50,ath:50,iq:50};
  const style = COACH_STYLES[coachKey] || COACH_STYLES.balanced;
  const w = {}; for(const k in FIT_BASE_WEIGHTS) w[k] = FIT_BASE_WEIGHTS[k] + (style.weights[k]||0);

  const avg = fn => list.reduce((s,p)=>s+fn(adv(p)),0)/list.length;

  const spacingGate = style.requiresInteriorScorer
    ? list.some(p => (p.pos==='C'||p.pos==='PF') && adv(p).sco>=75)
    : true;

  const spacing = (avg(a=>a.sho)-55)/45;
  const plys = list.map(p=>adv(p).ply).sort((a,b)=>b-a);
  const secondPly = plys.length>1 ? plys[1] : 45;
  const creation = ((plys[0]-55) + (secondPly-50)*0.4)/60;
  const perimeterDefense = (avg(a=>a.pdef)-50)/40;
  const interiorDefense = (avg(a=>a.idef)-50)/40;
  const rebounding = (avg(a=>a.reb)-55)/45;
  const athleticism = (avg(a=>a.ath)-55)/45;
  const basketballIQ = (avg(a=>a.iq)-75)/20;
  const versatility = (list.reduce((s,p)=>s+p.elig.length,0)/list.length-1.4)/1.2;

  // ---- Construction: does this SPECIFIC combination work, not just averages ----
  // "Dominant" = anyone who needs the ball a lot to be effective — elite
  // scorers (sco>=83) regardless of whether they also pass, since two ball-
  // hungry stars can still clash even if one of them racks up assists too.
  const dominant = list.filter(p=>adv(p).sco>=83).length;
  const dominanceClash = (dominant>=3 ? -(dominant-2)*0.6 : 0) * (1+(style.dominanceMultDelta||0));

  const archs = list.map(p=>archetypesOf(p)).filter(Boolean);
  const synergy = archetypeSynergy(list);

  // Nobody who can create offense for others — a stack of scorers with no table-setter.
  const hasCreator = list.some(p=>adv(p).ply>=55);
  const noCreatorPenalty = (list.length>=3 && !hasCreator) ? -0.5 : 0;

  // Multiple non-shooters clog the floor for everyone else.
  const nonShooters = list.filter(p=>adv(p).sho<45).length;
  const shootingGapPenalty = nonShooters>=2 ? -(nonShooters-1)*0.35 : 0;

  // Five different strengths beats five clones — reward unique primary archetypes.
  const uniquePrimaries = archs.length ? new Set(archs.map(a=>a.primary)).size : 0;
  const roleDiversityBonus = archs.length>=3 ? (uniquePrimaries-2)*0.15 : 0;

  // A lockdown defender freeing up a shot creator to focus on offense — division of labor.
  const hasStopper = archs.some(a=>a.primary==='Defensive Stopper'||a.secondary==='Defensive Stopper');
  const hasShotCreator = archs.some(a=>a.primary==='Shot Creator');
  const complementBonus = (hasStopper && hasShotCreator) ? 0.25 : 0;

  const construction = dominanceClash + synergy + noCreatorPenalty + shootingGapPenalty + roleDiversityBonus + complementBonus;

  const effSpacingW = spacingGate ? w.spacing : FIT_BASE_WEIGHTS.spacing;

  const parts = {
    spacing: spacing*effSpacingW, creation: creation*w.creation,
    perimeterDefense: perimeterDefense*w.perimeterDefense, interiorDefense: interiorDefense*w.interiorDefense,
    rebounding: rebounding*w.rebounding, athleticism: athleticism*w.athleticism,
    basketballIQ: basketballIQ*w.basketballIQ, versatility: versatility*w.versatility,
    construction,
  };
  const raw = Object.values(parts).reduce((a,b)=>a+b,0);
  const total = Math.max(-4, Math.min(4, raw*1.6));

  return { total, breakdown: {
    spacing: parts.spacing*1.6, creation: parts.creation*1.6,
    defense: (parts.perimeterDefense+parts.interiorDefense)*1.6,
    rebounding: parts.rebounding*1.6, construction: parts.construction*1.6,
    // sub-details for anyone who wants the raw reasons behind "construction"
    detail: { dominanceClash, synergy, noCreatorPenalty, shootingGapPenalty, roleDiversityBonus, complementBonus, hasCreator, nonShooters, uniquePrimaries },
  }};
}
function computeTeamFit(st, coachKey){
  coachKey = coachKey || 'balanced';
  return st.length===5 ? fitScore(st, coachKey).total : 0; // fit isn't meaningful until the starting five is set
}
// Same computation as computeTeamFit but returns the full breakdown for the
// "why is my fit what it is" UI panel — Complex Mode only, needs a full five.
function teamFitDetail(st, coachKey){
  coachKey = coachKey || 'balanced';
  return st.length===5 ? fitScore(st, coachKey) : null;
}

// Live drafting signal (Complex Mode only): how well would this pick
// complement the starters already on the roster? Only applies to starting
// slots (bench fit isn't modeled), and scales up as more starters are set —
// the very first pick has no one to complement yet, so it's neutral. Uses
// this specific team's own coaching identity, not a shared global one.
function pickFitBonus(team, p, slot){
  if(typeof S==='undefined' || S.complexity!=='complex') return 0;
  if(!POS_LIST.includes(slot)) return 0; // RES: no fit signal
  const current = starters(team);
  const hypothetical = [...current, p];
  if(hypothetical.length<2) return 0;
  const confidence = hypothetical.length/5;
  return fitScore(hypothetical, team.coachStyle||'balanced').total * confidence * 1.5;
}

// Archetypes now feed a small, always-on Team Fit nudge (independent of
// coaching): stacking multiple floor-spacing archetypes reinforces the
// spacing category further; stacking multiple primary shot-creators/floor
// generals reinforces the same ball-dominance tension the raw stats already
// flag. Deliberately small (±0.3ish before the final 0.5 weight) since the
// raw sub-ratings already drive most of Team Fit — this just sharpens it.
function archetypeSynergy(list){
  const archs = list.map(p=>archetypesOf(p)).filter(Boolean);
  if(archs.length<2) return 0;
  const allTags = archs.flatMap(a=>[a.primary,a.secondary]);
  const spacers = allTags.filter(t=>t==='Movement Shooter'||t==='Stretch Big').length;
  const primaryCreators = archs.filter(a=>a.primary==='Shot Creator'||a.primary==='Floor General').length;
  let synergy = 0;
  if(spacers>=2) synergy += 0.3;
  if(primaryCreators>=2) synergy -= 0.3;
  return synergy;
}

// Archetypes (Phase 5 scouting label): derived from the same 9 sub-ratings,
// no new data needed. Shown in Complex Mode draft rows, and feeds a small
// synergy nudge into Team Fit via archetypeSynergy() above.
function archetypeScores(p){
  const a = p.adv; if(!a) return null;
  const isGuard = p.pos==='PG'||p.pos==='SG';
  const isWing = p.pos==='SF';
  const isBig = p.pos==='PF'||p.pos==='C';
  const twoWayLabel = isGuard ? "Two-Way Guard" : "Elite Two-Way Wing";
  return {
    "Shot Creator": a.sco*0.6 + a.ply*0.4,
    "Floor General": a.ply*0.85 + (isGuard?10:0),
    "Movement Shooter": a.sho*0.9 - a.ply*0.15,
    "Stretch Big": isBig ? a.sho*0.8+15 : a.sho*0.5,
    "Point Forward": (isWing||isBig) ? a.ply*0.75+10 : a.ply*0.4,
    "Interior Force": isBig ? (a.idef*0.5+a.reb*0.5)+10 : (a.idef*0.3+a.reb*0.3),
    "Defensive Stopper": Math.max(a.pdef,a.idef)*0.9,
    [twoWayLabel]: (isGuard||isWing) ? (a.sco*0.4+Math.max(a.pdef,a.idef)*0.5)+8 : (a.sco*0.3+Math.max(a.pdef,a.idef)*0.4),
  };
}
function archetypesOf(p){
  const scores = archetypeScores(p);
  if(!scores) return null;
  const ranked = Object.entries(scores).sort((a,b)=>b[1]-a[1]);
  return { primary: ranked[0][0], secondary: ranked[1][0] };
}
// Color bucket per archetype, so badges read as a family of distinct colors
// rather than one uniform tone — cyan for defense/two-way, purple for
// creation/playmaking, gold for shooting/skill.
const ARCH_COLOR = {
  "Defensive Stopper":"cyan", "Two-Way Guard":"cyan", "Elite Two-Way Wing":"cyan", "Interior Force":"cyan",
  "Shot Creator":"purple", "Floor General":"purple", "Point Forward":"purple",
  "Movement Shooter":"gold", "Stretch Big":"gold",
};
function archColor(name){ return ARCH_COLOR[name] || "gold"; }

// CPU personality traits: independent of coaching style, these nudge HOW a
// CPU team drafts (works in both Simple and Complex mode, since it's a pure
// decision-weighting change — never touches player ratings). User-controlled
// teams have no personality (personality===null) and always behave exactly
// as before (all multipliers below resolve to 1 via the 'balanced' fallback).
const PERSONALITY = {
  balanced:      { needWeight:1,    reachTolerance:1,   jitter:1,   talentChase:0,    athBonus:false },
  starChaser:    { needWeight:0.25, reachTolerance:1.6, jitter:1,   talentChase:0.8,  athBonus:false },
  steadyBuilder: { needWeight:1.6,  reachTolerance:0.5, jitter:0.7, talentChase:0,    athBonus:false },
  upsideHunter:  { needWeight:0.9,  reachTolerance:1.1, jitter:1.8, talentChase:0,    athBonus:true  },
};
const PERSONALITY_KEYS = Object.keys(PERSONALITY).filter(k=>k!=='balanced');

// Nicknames shown on team cards for flavor — Complex mode shows the coaching
// identity (since that's what's visibly driving Team Fit), Simple mode shows
// the personality identity (since coaching doesn't exist there).
const COACH_NICKNAMES = { balanced:'The Professionals', runAndGun:'The Fast Break', motion:'The Machine', defensive:'The Wall', insideOut:'The Bully Ball' };
const PERSONALITY_NICKNAMES = { balanced:'The Professionals', starChaser:'The Headliners', steadyBuilder:'The Architects', upsideHunter:'The Gamblers' };
function teamNickname(t){
  if(S.complexity==='complex' && S.coachingEnabled) return COACH_NICKNAMES[t.coachStyle||'balanced'];
  return t.personality ? PERSONALITY_NICKNAMES[t.personality] : '';
}
// Rating tier: gives elite/great/good players a visually distinct treatment
// instead of every OVR number looking the same regardless of talent level.
function ratingTierClass(r){
  if(r>=90) return 'tier-elite';
  if(r>=80) return 'tier-great';
  if(r>=70) return 'tier-good';
  return '';
}
// Computes a player's rating once and returns both the tier class and the
// formatted display number together — the common pattern throughout the
// UI was calling playerRating(p) twice in the same row (once for
// ratingTierClass, once for the displayed number), which is redundant
// since it's the exact same value both times.
function ratingBadge(p){
  const r = playerRating(p);
  return { tier: ratingTierClass(r), num: r.toFixed(0) };
}

function openSlots(team){
  const out=[]; ["PG","SG","SF","PF","C"].forEach(s=>{if(!team.slots[s])out.push(s);});
  const cap=team.resCap||0, filled=(team.slots.RES||[]).length;
  for(let i=filled;i<cap;i++) out.push("RES");
  return out;
}
function fittableStartSlots(team, player){ return player.elig.filter(pos=>!team.slots[pos]); }
function starters(t){ return ["PG","SG","SF","PF","C"].map(s=>t.slots[s]).filter(Boolean); }
function catVec(p){ return { scoring:p.pts, defense:p.stl*2+p.blk*2, playmaking:p.ast, rebounding:p.reb, shooting:p.tpm*3 }; }

function computeScarcity(available){
  const sc={};
  for(const pos of POS_LIST){
    const r=available.filter(p=>p.elig.includes(pos)).length;
    sc[pos]=Math.max(0, 5 - r*0.25);
  }
  return sc;
}

function situationalValue(t, p, scarcity, slot){
  const per = PERSONALITY[t.personality] || PERSONALITY.balanced;
  let v = playerRating(p);
  const emptyStart = ["PG","SG","SF","PF","C"].filter(s=>!t.slots[s]);
  const fitsStart = p.elig.filter(s=>emptyStart.includes(s));
  if(fitsStart.length>0){
    v += 9;
    const scarceBoost = fitsStart.reduce((mx,pos)=>Math.max(mx, scarcity[pos]||0), 0);
    v += scarceBoost;
  } else {
    const eliteness = Math.max(0, playerRating(p)-82);
    v = v - 12 + eliteness*1.5*per.reachTolerance;
  }
  const five = starters(t);
  if(five.length>0){
    const team={scoring:0,defense:0,playmaking:0,rebounding:0,shooting:0};
    five.forEach(pl=>{const c=catVec(pl);for(const k in c)team[k]+=c[k];});
    for(const k in team) team[k]/=five.length;
    const ideal={scoring:20,defense:5,playmaking:5,rebounding:8,shooting:1.2};
    let worstK=null,worstGap=0;
    for(const k in team){const g=(ideal[k]-team[k])/ideal[k]; if(g>worstGap){worstGap=g;worstK=k;}}
    if(worstK){
      const pc=catVec(p);
      const helps=pc[worstK]/ideal[worstK];
      v += Math.min(6, helps*worstGap*8*per.needWeight);
    }
    if(team.scoring>26 && p.pts>26) v -= 2;
  }
  // Star Chaser: extra pull toward the single best player on the board,
  // above and beyond what raw rating already provides.
  if(per.talentChase>0) v += Math.max(0, playerRating(p)-85)*per.talentChase;
  // Upside Hunter: willing to bet on physical tools even before results catch up.
  if(per.athBonus && p.adv) v += Math.max(0, p.adv.ath-70)*0.15;
  if(slot) v += pickFitBonus(t, p, slot);
  v += (Math.random()-0.5)*3*per.jitter;
  return v;
}

function aiPick(team, available){
  const scar = computeScarcity(available);
  const resOpen = (team.resCap||0) - (team.slots.RES||[]).length;
  let best=null, bestV=-1e9, bestSlot=null;
  for(const p of available){
    const emptyStart=["PG","SG","SF","PF","C"].filter(s=>!team.slots[s]);
    const fitsStart=p.elig.filter(s=>emptyStart.includes(s));
    let slot;
    if(fitsStart.length>0){
      slot = fitsStart.sort((a,b)=>(scar[b]||0)-(scar[a]||0))[0];
    } else {
      if(resOpen<=0) continue;
      slot="RES";
    }
    const v=situationalValue(team,p,scar,slot);
    if(v>bestV){ bestV=v; best=p; bestSlot=slot; }
  }
  return best ? { player:best, slot:bestSlot } : null;
}

function seedTeams(teams){ return [...teams].sort((a,b)=>b._rating-a._rating); }
function gameProb(rA,rB){
  const gap=rA-rB;
  const p=1/(1+Math.exp(-gap/4.2));
  return Math.max(0.16, Math.min(0.84, p));
}
// Season Mode uses its own, wider-range probability curve for individual
// games. The bracket's clamp (16%-84%) is deliberately humanizing for a
// single elimination series — "anyone can win a series" — but it's the
// wrong model for 82 individual regular-season games. Real teams cluster
// very tightly in rating (roughly 56-64 across all 30), so most realistic
// matchups — including a "worst possible" or "average" drafted team — only
// ever produce single-digit rating gaps; a steep curve turns those into
// blowout-record extremes that don't feel right. Divisor 10 keeps single-
// digit gaps in believable territory (a +8 gap is ~69%, not ~93%) while
// still letting a genuinely stacked legends team (~20-25 point gap) climb
// to a real, near-dominant advantage — high-70s expected wins, 82-0
// possible but genuinely rare, not a lock.
function seasonGameProb(rA,rB){
  const gap=rA-rB;
  const p=1/(1+Math.exp(-gap/10));
  return Math.max(0.05, Math.min(0.95, p));
}
function simSeries(A,B,rng,probFn){
  const p=(probFn||gameProb)(A._rating,B._rating);
  let wA=0,wB=0,log=[];
  while(wA<4&&wB<4){ if(rng()<p){wA++;log.push(A._id);}else{wB++;log.push(B._id);} }
  const winner=wA===4?A:B, loser=wA===4?B:A;
  return {winner,loser,wA,wB,p,log};
}
// Core single-elimination bracket logic, assuming `seeded` is ALREADY in the
// desired seed order (best to worst). Used directly for playoff seeding
// (which must follow win-loss standings, not raw rating) and via the
// runBracket() wrapper below for the main competitive draft (which seeds by
// rating, since there's no separate "record" to speak of there). probFn lets
// Season Mode's playoffs use the season-calibrated probability curve instead
// of the draft bracket's — see the call site in simSeasonWithPlayoffs for why.
function runSeededBracket(seeded, rng, probFn){
  const n=seeded.length; let size=1; while(size<n)size*=2;
  const field=seeded.slice(); while(field.length<size)field.push(null);
  let pairs=[]; for(let i=0;i<size/2;i++)pairs.push([field[i],field[size-1-i]]);
  const rounds=[]; let roundNum=1; let runnerUp=null;
  while(pairs.length>=1){
    const results=[],winners=[];
    for(const [a,b] of pairs){
      if(a&&!b){results.push({bye:true,winner:a});winners.push(a);}
      else if(b&&!a){results.push({bye:true,winner:b});winners.push(b);}
      else if(a&&b){const s=simSeries(a,b,rng,probFn);results.push({...s});winners.push(s.winner);
        if(pairs.length===1) runnerUp=s.loser;}
    }
    rounds.push({round:roundNum,results});
    if(winners.length===1) return {rounds,champion:winners[0],runnerUp};
    pairs=[]; for(let i=0;i<winners.length/2;i++)pairs.push([winners[i*2],winners[i*2+1]]);
    roundNum++;
  }
  return {rounds,champion:seeded[0],runnerUp};
}
function runBracket(teams,rng){
  return runSeededBracket(seedTeams(teams), rng);
}
// ---------- DYNASTY MODE: interactive year-by-year driver ----------
// Uses S.teams[0] directly as the persistent dynasty roster throughout —
// unlike every other mode, this team's slots keep changing year over year
// (rookies added, cuts made, trades applied, retirements), so there's no
// separate "final" team object; S.teams[0] simply *is* the dynasty.

function finishDynastyDraft(){
  const team = S.teams[0];
  team.name = (S.dynastyTeamName||'').trim() || 'Your Dynasty';
  team._rating = teamRating(team).rating;
  S.dynasty = initDynastyState(S.dynastyYears||10, team, S.theme==='modern'?'modern':'all', S.seasonConf);
  S.screen = 'dynastyYear';
  startDynastyYear();
}
function startDynastyYear(){
  S.dynastyYearLog = { yearIdx: S.dynasty.yearIdx, trades:[], draftPicks:[], cutsMade:[], retired:[] };
  S.dynastyPhase = 'preseasonTrade';
  advanceDynasty();
}
// Drives the year forward one step at a time, pausing (returning without
// recursing, after a render()) whenever human input is needed, and
// recursing straight through for steps that are pure computation. Mirrors
// the same pattern runAuctionStep() uses for the same reason.
function advanceDynasty(){
  const team = S.teams[0];
  const D = S.dynasty;

  if(S.dynastyPhase==='preseasonTrade' || S.dynastyPhase==='postseasonTrade'){
    if(Math.random()<0.4){
      const offer = generateTradeOffer(team, D.retiredPlayerIds, D);
      if(offer){ S.dynastyPendingOffer=offer; S.dynastyPendingOfferTiming=S.dynastyPhase; render(); return; }
    }
    S.dynastyPhase = S.dynastyPhase==='preseasonTrade' ? 'seasonSim' : 'aging';
    advanceDynasty();
    return;
  }
  if(S.dynastyPhase==='seasonSim'){
    team._rating = teamRating(team).rating;
    const ratingDelta = D.priorYearRating!=null ? team._rating - D.priorYearRating : null;
    D.priorYearRating = team._rating;
    const result = simSeasonWithPlayoffs(team, D.conf);
    D.currentSeasonResult = result;
    const mvp = [...dynastyFlatRoster(team)].sort((a,b)=>playerRating(b)-playerRating(a))[0];
    S.dynastyYearLog.seasonResult = { wins:result.wins, losses:result.losses, madePlayoffs:result.madePlayoffs,
      outcome: result.playoffs ? (result.playoffs.wonTitle?'CHAMPION':result.playoffs.wonConf?'LOST_FINALS':'ELIM_R'+result.playoffs.eliminatedRound) : 'MISSED' };
    S.dynastyYearLog.mvp = mvp ? {name:mvp.n, rating:playerRating(mvp)} : null;
    S.dynastyYearLog.ratingDelta = ratingDelta;
    S.dynastyPhase = 'seasonResult';
    render();
    return;
  }
  if(S.dynastyPhase==='aging'){
    const before = {};
    dynastyFlatRoster(team).forEach(p=>{ before[p.id] = playerRating(p); });
    const retired = ageDynastyRoster(team, D);
    S.dynastyYearLog.retired = retired.map(p=>{
      const finalRating = playerRating(p);
      let arc = null;
      if(isDynastyRookie(p)){
        const tierLabel = POTENTIAL_TIERS[p._potentialTier].label;
        if(finalRating >= p._peakPotential - 2) arc = `lived up to his "${tierLabel}" billing`;
        else if(finalRating >= p._peakPotential - 10) arc = `had a solid career, short of his "${tierLabel}" ceiling`;
        else arc = `never quite found it, a disappointing finish to his "${tierLabel}" promise`;
      }
      return { name:p.n, finalRating, arc };
    });
    const deltas = dynastyFlatRoster(team).map(p=>({name:p.n, delta: playerRating(p)-(before[p.id]||playerRating(p))}))
      .filter(d=>Math.abs(d.delta)>=2.5).sort((a,b)=>b.delta-a.delta);
    S.dynastyYearLog.riser = deltas.length && deltas[0].delta>0 ? deltas[0] : null;
    S.dynastyYearLog.decliner = deltas.length && deltas[deltas.length-1].delta<0 ? deltas[deltas.length-1] : null;
    S.dynastyPhase = 'agingReport';
    render();
    return;
  }
  if(S.dynastyPhase==='rookieDraftSetup'){
    if(D.yearIdx >= D.totalYears){ S.dynastyPhase='yearEndSummary'; advanceDynasty(); return; } // final year — no more drafting
    const winPct = D.currentSeasonResult.wins/(D.currentSeasonResult.wins+D.currentSeasonResult.losses);
    const queue = [];
    for(const round of [1,2]){
      const picks = dynastyRoundPickCounts(D, round);
      for(let i=0;i<picks;i++) queue.push({round, pos: dynastyDraftPosition(winPct, 14)});
    }
    S.dynastyPickQueue = queue;
    S.dynastyPhase = 'rookieDraftPick';
    advanceDynasty();
    return;
  }
  if(S.dynastyPhase==='rookieDraftPick'){
    if(!S.dynastyPickQueue.length){
      const cap = D.rosterCap;
      const overflow = dynastyRosterCount(team) - cap;
      if(overflow>0){ S.dynastyCutsNeeded=overflow; S.dynastyPhase='cutRequired'; advanceDynasty(); return; }
      S.dynastyPhase='yearEndSummary'; advanceDynasty(); return;
    }
    const next = S.dynastyPickQueue[0];
    S.dynastyPendingPool = generateProspectPool(next.round, next.pos, 12);
    S.dynastyPendingRound = next.round;
    render();
    return;
  }
  if(S.dynastyPhase==='cutRequired'){
    if(S.dynastyCutsNeeded<=0){ S.dynastyPhase='yearEndSummary'; advanceDynasty(); return; }
    render();
    return;
  }
  if(S.dynastyPhase==='yearEndSummary'){
    D.history.push(S.dynastyYearLog);
    render();
    return;
  }
}
function dynastyAdvanceToNextYearOrLegacy(){
  const D = S.dynasty;
  if(D.yearIdx >= D.totalYears){
    S.screen = 'dynastyLegacy';
    render();
    return;
  }
  D.yearIdx++;
  startDynastyYear();
}

      </div>` : '';
    const mvp = S.dynastyYearLog.mvp;
    const delta = S.dynastyYearLog.ratingDelta;
    const trendNote = delta!=null ? `<div class="season-supers">${delta>=0?'📈':'📉'} Team rating ${delta>=0?'+':''}${delta.toFixed(1)} from last year (now ${team._rating.toFixed(1)})</div>` : '';

      const oppBadge = teamBadgeHTML(g.opponent.abbr);
