        <div class="feed-main"><span class="feed-name">${g.userWon?'W':'L'} vs ${g.opponent.name} ${oppBadge}</span>
          <span class="feed-meta">${g.userScore}-${g.oppScore}</span></div>
      </div>`;
    }).join('');
    mainCard = `${won?confettiHTML():''}
    <div class="result-hero">
      <div class="champ-label">${yearLabel}</div>
      <div class="champ-name">${r.wins}-${r.losses}</div>
      <div class="champ-meta"><span class="champ-rating mono">${outcome} · ${seedNote}</span></div>
    </div>
    <div class="field">
      <label>Season Averages</label>
      <div class="season-stats-row">${statChips}</div>
      ${mvp ? `<div class="season-supers">🌟 Team MVP: <b>${mvp.name}</b> (${mvp.rating.toFixed(1)} ovr)</div>` : ''}
      ${trendNote}
    </div>
    <div class="field">
      <label>Game Log</label>
      <div class="hint">All 82 games, in play order.</div>
      <div class="feed-list">${logRows}</div>
    </div>
    ${bracketBlock}
    <button class="big-btn" id="dynContinueBtn">Continue</button>`;
  } else if(S.dynastyPhase==='agingReport'){
    const retired = S.dynastyYearLog.retired;
    const riser = S.dynastyYearLog.riser;
    const decliner = S.dynastyYearLog.decliner;
    const lines = [];
    if(riser) lines.push(`<div class="slot-row">📈 <span class="slot-name"><b>${riser.name}</b> took a real leap this offseason (+${riser.delta.toFixed(1)}).</span></div>`);
    if(decliner) lines.push(`<div class="slot-row">📉 <span class="slot-name"><b>${decliner.name}</b> is starting to show his age (${decliner.delta.toFixed(1)}).</span></div>`);
    retired.forEach(r=>lines.push(`<div class="slot-row">🎉 <span class="slot-name"><b>${r.name}</b> hangs it up (${r.finalRating.toFixed(0)} ovr)${r.arc?' — '+r.arc:''}.</span></div>`));
    mainCard = `<div class="field">
      <label>Offseason</label>
      ${lines.length ? lines.join('') : '<div class="hint">A quiet offseason — the whole roster returns unchanged.</div>'}
    </div>
    <button class="big-btn" id="dynContinueBtn">Continue</button>`;
  } else if(S.dynastyPhase==='rookieDraftPick' && S.dynastyPendingPool){
    const roundOrdinal = S.dynastyPendingRound===1?'Round 1':'Round 2';
    const rows = S.dynastyPendingPool.map(p=>{
      const tier = POTENTIAL_TIERS[p._potentialTier].label;
      // "Fits Need" compares against your actual current starter at a
      // matching position, not just whether the slot is literally empty —
      // the roster auto-reoptimizes after every change, so an open slot
      // almost never persists long enough to matter; a real upgrade over
      // your current starter is the meaningful signal.
      const fitsNeed = p.elig.some(s=>{ const cur=team.slots[s]; return !cur || playerRating(p) > playerRating(cur)-5; });
      const rb = ratingBadge(p);
      return `<div class="p-row" data-pickrookie="${p.id}">
        <span class="p-pos">${p.elig.join('/')}</span>
        <div class="p-main"><div class="p-name">${p.n}${fitsNeed?' <span class="team-tag" style="background:var(--win);color:#04150a;">Fits Need</span>':''}</div>
          <div class="p-yr mono">${tier} potential</div>
          <div class="p-scout">${scoutingBlurbFor(p)}</div></div>
        <div class="p-stats"><b>${p.pts}</b> pts · ${p.reb} reb<br>${p.ast} ast · <b class="ovr-num ${rb.tier}">${rb.num}</b> ovr</div>
      </div>`;
    }).join('');
    mainCard = `<div class="pick-panel">
      <h4>Rookie Draft — ${roundOrdinal}</h4>
      <div class="hint">Potential is a real signal, not a promise — even a Rare Talent can bust, even a Bust Risk guy can surprise you.</div>
      <div class="player-list">${rows}</div>
    </div>`;
  } else if(S.dynastyPhase==='cutRequired'){
    const starterIds = new Set(POS_LIST.map(pos=>team.slots[pos]?team.slots[pos].id:null).filter(Boolean));
    const roster = [...dynastyFlatRoster(team)].sort((a,b)=>playerRating(a)-playerRating(b));
    const rows = roster.map(p=>{
      const isStarter = starterIds.has(p.id);
      const rb = ratingBadge(p);
      return `<div class="p-row" data-cutplayer="${p.id}">
        <span class="p-pos">${p.elig.join('/')}</span>
        <div class="p-main"><div class="p-name">${p.n}${p.team?' '+teamBadgeHTML(p.team):''}${isStarter?' <span class="team-tag" style="background:var(--warn);color:#2a1a00;">Starter</span>':''}</div><div class="p-yr mono">${isDynastyRookie(p)?'age '+p._age:'legend'}</div></div>
        <div class="p-stats"><b class="ovr-num ${rb.tier}">${rb.num}</b> ovr</div>
      </div>`;
    }).join('');
    mainCard = `<div class="pick-panel">
      <h4>Roster Cut Needed</h4>
      <div class="hint">You're over the ${D.rosterCap}-player cap — choose someone to cut. ${S.dynastyCutsNeeded>1?S.dynastyCutsNeeded+' cuts remaining.':''} Sorted worst to best.</div>
      <div class="player-list">${rows}</div>
    </div>`;
  } else if(S.dynastyPhase==='yearEndSummary'){
    const log = S.dynastyYearLog;
    const isFinal = D.yearIdx>=D.totalYears;
    mainCard = `<div class="field">
      <label>${yearLabel} — Complete</label>

        const partner = t.offer.partnerName || 'a team';
        if(!t.accepted) return `<div class="slot-row"><span class="slot-name">❌ Passed on a trade with the ${partner}</span></div>`;
        const gave = t.offer.wantsFromYou.map(a=>a.type==='player'?a.player.n:(a.round+(a.round===1?'st':'nd')+' round pick')).join(', ');
        const got = t.offer.theyGiveYou.map(a=>a.type==='player'?a.player.n:(a.round+(a.round===1?'st':'nd')+' round pick')).join(', ');
        return `<div class="slot-row"><span class="slot-name">✅ Traded ${gave} to the ${partner} for ${got}</span></div>`;

    const p = team.slots[pos];
    if(!p) return `<div class="slot-row"><span class="slot-pos">${pos}</span><span class="slot-name" style="color:var(--chalk-dimmer);font-style:italic;">Vacant</span></div>`;
    const rb = ratingBadge(p);
    return `<div class="slot-row"><span class="slot-pos">${pos}</span>

  }).join('');
  const benchList = team.slots.RES||[];
  const benchRows = benchList.map((p,i)=>{
    const rb = ratingBadge(p);
    return `<div class="slot-row"><span class="slot-pos res">R${i+1}</span>
    <span class="slot-name">${p.n}${p.team?' '+teamBadgeHTML(p.team):''}<span class="mono" style="color:var(--chalk-dimmer);font-size:11px;margin-left:6px;">${isDynastyRookie(p)?'age '+p._age:'legend'}</span></span>
    <span class="mono ovr-num ${rb.tier}" style="margin-left:auto;">${rb.num}</span></div>`;
  }).join('');

  app.innerHTML = `
  <div class="topbar">
    <div class="logo"><div class="mark">🏀</div>
      <div><h1>All-Time Draft</h1><div class="sub">${team.name} — ${yearLabel}</div></div></div>
    <div class="topbar-btns">${D.history.length ? '<button class="ghost-btn" id="dynHistoryBtn">History</button>' : ''}${themeToggleHTML()}</div>
  </div>
  ${mainCard}
  <div class="field">
    <label>${team.name} <span class="mono" style="color:var(--chalk-dim);font-weight:400;">${dynastyRosterCount(team)}/${D.rosterCap} · rating ${team._rating.toFixed(1)}</span></label>
    ${starterRows}
    ${benchList.length ? `<div class="hint" style="margin-top:8px;">Bench</div>${benchRows}` : ''}
  </div>
  ${S.dynastyShowHistory ? dynastyHistoryModalHTML() : ''}`;

  const historyBtn = document.getElementById('dynHistoryBtn');
  if(historyBtn) historyBtn.onclick=()=>{ S.dynastyShowHistory=true; render(); };
  const closeHistory = document.getElementById('closeDynastyHistory');
  if(closeHistory) closeHistory.onclick=()=>{ S.dynastyShowHistory=false; render(); };

  const acceptBtn = document.getElementById('acceptTradeBtn');
  if(acceptBtn) acceptBtn.onclick=()=>{
    const res = applyTradeOffer(team, S.dynastyPendingOffer, D);
    S.dynastyYearLog.trades.push({offer:S.dynastyPendingOffer, accepted:true, timing:S.dynastyPendingOfferTiming});
    S.dynastyPendingOffer = null;
    if(res.overflow>0){ S.dynastyCutsNeeded=res.overflow; S.dynastyPhase='cutRequired'; render(); }
    else { S.dynastyPhase = S.dynastyPendingOfferTiming==='preseasonTrade' ? 'seasonSim' : 'aging'; advanceDynasty(); }
  };
  const declineBtn = document.getElementById('declineTradeBtn');
  if(declineBtn) declineBtn.onclick=()=>{
    S.dynastyYearLog.trades.push({offer:S.dynastyPendingOffer, accepted:false, timing:S.dynastyPendingOfferTiming});
    S.dynastyPendingOffer = null;
    S.dynastyPhase = S.dynastyPendingOfferTiming==='preseasonTrade' ? 'seasonSim' : 'aging';
    advanceDynasty();
  };
  const continueBtn = document.getElementById('dynContinueBtn');
  if(continueBtn) continueBtn.onclick=()=>{
    if(S.dynastyPhase==='seasonResult') S.dynastyPhase='postseasonTrade';
    else if(S.dynastyPhase==='agingReport') S.dynastyPhase='rookieDraftSetup';
    advanceDynasty();
  };
  app.querySelectorAll('[data-pickrookie]').forEach(el=>el.onclick=()=>{
    const chosen = S.dynastyPendingPool.find(p=>p.id===el.dataset.pickrookie);
    if(!chosen) return;
    const picked = S.dynastyPickQueue.shift();
    S.dynastyYearLog.draftPicks.push({round:picked.round, name:chosen.n});
    const overflow = addPlayersToDynastyRoster(team, [chosen], D.rosterCap);
    S.dynastyPendingPool = null;
    if(overflow>0){ S.dynastyCutsNeeded=overflow; S.dynastyPhase='cutRequired'; render(); }
    else advanceDynasty();
  });
  app.querySelectorAll('[data-cutplayer]').forEach(el=>el.onclick=()=>{
    const cutPlayer = dynastyFlatRoster(team).find(p=>p.id===el.dataset.cutplayer);
    removePlayerFromDynastyRoster(team, el.dataset.cutplayer);
    S.dynastyYearLog.cutsMade.push(cutPlayer?cutPlayer.n:el.dataset.cutplayer);
    S.dynastyCutsNeeded--;
    advanceDynasty();
  });
  const yearEndBtn = document.getElementById('dynYearEndBtn');
  if(yearEndBtn) yearEndBtn.onclick=()=>dynastyAdvanceToNextYearOrLegacy();
}

  <div class="field">

    ${yearRows}

  <div class="field">

    ${dynastyFlatRoster(team).map(p=>{
      const rb = ratingBadge(p);
      return `<div class="slot-row"><span class="slot-name">${p.n}</span>
      <span class="mono ovr-num ${rb.tier}" style="margin-left:auto;">${rb.num}</span></div>`;

// ---------- SEASON MODE ----------
// One human-built team plays an 82-game season against all 30 real Modern
// rosters (drafted players stay on their real teams — your team is an
// invented 31st franchise, not a replacement for an existing one). Schedule
// weights your chosen conference heavier, like the real NBA, but without
// faking real divisions/geography: 15 same-conference opponents get 3 games
// each (45), 15 opposite-conference opponents get 2 each (30), and 7
// randomly-chosen same-conference opponents get a 4th game, for 82 total.
function buildSeasonSchedule(conf){
  const sameConf = CONFERENCES[conf];
  const oppConf = CONFERENCES[conf==='East'?'West':'East'];
  let games = [];
  sameConf.forEach(ab=>{ for(let i=0;i<3;i++) games.push(ab); });
  oppConf.forEach(ab=>{ for(let i=0;i<2;i++) games.push(ab); });
  const shuffledConf = [...sameConf].sort(()=>Math.random()-0.5);
  shuffledConf.slice(0,7).forEach(ab=>games.push(ab));
  for(let i=games.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [games[i],games[j]]=[games[j],games[i]]; }
  return games; // array of 82 team abbreviations, in play order
}

// One game's result — win/loss comes from the same rating-gap probability
// model the playoff bracket uses (gameProb), so season and bracket odds stay
// consistent. The score itself is just plausible flavor built AFTER the
// winner is decided, always consistent with who actually won.
function simSeasonGame(userRating, oppTeam, rng){
  const p = seasonGameProb(userRating, oppTeam._rating);
  const userWon = rng() < p;
  const gap = Math.abs(userRating - oppTeam._rating);
  const margin = Math.round(3 + rng()*14 + gap*0.3);
  const loserScore = Math.round(96 + rng()*20);
  const winnerScore = loserScore + margin;
  return { opponent:oppTeam, userWon, userScore: userWon?winnerScore:loserScore, oppScore: userWon?loserScore:winnerScore };
}

// Full season: builds all 30 real rosters once, generates the schedule, and
// simulates every game. Returns record, full game log, and season stat
// averages (from the user's 5 starters' real per-game numbers — the season
// doesn't simulate individual box scores, the variance lives in the
// win/loss outcomes, same as the bracket).
function simSeason(userTeam, conf){
  const realTeams = {};
  CURRENT_TEAMS.forEach(ab=>{ const rt=realTeamRoster(ab); rt._rating=teamRating(rt).rating; realTeams[ab]=rt; });
  const schedule = buildSeasonSchedule(conf);
  let wins=0, losses=0;
  const log = schedule.map(ab=>{
    const result = simSeasonGame(userTeam._rating, realTeams[ab], Math.random);
    if(result.userWon) wins++; else losses++;
    return result;
  });
  const st = POS_LIST.map(pos=>userTeam.slots[pos]).filter(Boolean);
  const avg = key => st.length ? st.reduce((s,p)=>s+(p[key]||0),0)/st.length : 0;
  const statLine = { pts:avg('pts'), reb:avg('reb'), ast:avg('ast'), blk:avg('blk'), stl:avg('stl') };
  return { wins, losses, log, statLine, conf };
}

// Builds a plausible 82-game schedule for a REAL team (used only to
// generate standings for the other 29 teams, not shown as a detailed game
// log the way the user's own schedule is). Same weighting logic as
// buildSeasonSchedule, just accounting for the team being one of the 15 in
// its own conference (14 peers, not 15) rather than an added 16th team.
function buildRealTeamSchedule(teamAbbr){
  const myConf = CONFERENCES.East.includes(teamAbbr) ? 'East' : 'West';
  const sameConf = CONFERENCES[myConf].filter(ab=>ab!==teamAbbr); // 14 peers
  const oppConf = CONFERENCES[myConf==='East'?'West':'East']; // 15 opponents
  let games = [];
  sameConf.forEach(ab=>{ for(let i=0;i<3;i++) games.push(ab); }); // 42
  oppConf.forEach(ab=>{ for(let i=0;i<2;i++) games.push(ab); }); // 30
  const shuffled = [...sameConf].sort(()=>Math.random()-0.5);
  for(let i=0;i<10;i++) games.push(shuffled[i%shuffled.length]); // 10 more -> 82
  for(let i=games.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [games[i],games[j]]=[games[j],games[i]]; }
  return games;
}
// Simulates a plausible season for all 30 real teams against each other, so
// the OTHER teams in your conference (and the entire other conference) have
// real standings to seed the playoffs from — not just a rating-based guess.
function simLeagueStandings(realTeams){
  const standings = {};
  CURRENT_TEAMS.forEach(ab=>{
    const schedule = buildRealTeamSchedule(ab);
    let w=0,l=0;
    schedule.forEach(oppAb=>{
      if(Math.random() < seasonGameProb(realTeams[ab]._rating, realTeams[oppAb]._rating)) w++; else l++;
    });
    standings[ab] = { team:realTeams[ab], wins:w, losses:l };
  });
  return standings;
}
// Full Season Mode result: your 82-game record, league-wide standings (so
// your conference has real competition for playoff spots), and — if you
// finish top 8 in your conference — an actual seeded playoff run using the
// same best-of-7 engine as the main bracket. Missing the playoffs is a real,
// possible outcome, not a formality.
function simSeasonWithPlayoffs(userTeam, conf){
  const base = simSeason(userTeam, conf);
  const realTeams = {};
  CURRENT_TEAMS.forEach(ab=>{ const rt=realTeamRoster(ab); rt._rating=teamRating(rt).rating; realTeams[ab]=rt; });
  const standings = simLeagueStandings(realTeams);

  const otherConf = conf==='East' ? 'West' : 'East';
  const buildTable = (abbrs, includeUser) => {
    const table = abbrs.map(ab=>({ team:standings[ab].team, wins:standings[ab].wins, losses:standings[ab].losses, isUser:false }));
    if(includeUser) table.push({ team:userTeam, wins:base.wins, losses:base.losses, isUser:true });
    table.sort((a,b)=> b.wins-a.wins || b.team._rating-a.team._rating);
    return table;
  };
  const yourConfTable = buildTable(CONFERENCES[conf], true);
  const otherConfTable = buildTable(CONFERENCES[otherConf], false);
  const yourSeed = yourConfTable.findIndex(e=>e.isUser) + 1;
  const madePlayoffs = yourSeed <= 8;

  let playoffs = null;
  if(madePlayoffs){
    const yourBracketSeeded = yourConfTable.slice(0,8).map(e=>e.team);
    const otherBracketSeeded = otherConfTable.slice(0,8).map(e=>e.team);
    const yourConfResult = runSeededBracket(yourBracketSeeded, Math.random, seasonGameProb);
    const wonConf = yourConfResult.champion._id === userTeam._id;
    // Which round the user's team lost in (null = never lost, i.e. won the conference)
    let eliminatedRound = null;
    for(const rd of yourConfResult.rounds){
      for(const res of rd.results){ if(res.loser && res.loser._id===userTeam._id){ eliminatedRound=rd.round; } }
    }
    let finals = null, wonTitle = false;
    if(wonConf){
      const otherConfResult = runSeededBracket(otherBracketSeeded, Math.random, seasonGameProb);
      finals = simSeries(userTeam, otherConfResult.champion, Math.random, seasonGameProb);
      wonTitle = finals.winner._id === userTeam._id;
    }
    playoffs = { seed:yourSeed, conf, confBracket:yourConfResult, wonConf, eliminatedRound, finals, wonTitle };
  }

  return { ...base, yourConfTable, otherConfTable, yourSeed, madePlayoffs, playoffs };
}

// Re-simulate the playoffs N times; return {teamId: wins} and total.
function resimOdds(teams, runs){
  const wins={}; teams.forEach(t=>wins[t._id]=0);
  for(let i=0;i<runs;i++){
    const field=teams.map(t=>({...t}));
    const {champion}=runBracket(field, Math.random);
    wins[champion._id]=(wins[champion._id]||0)+1;
  }
  return { wins, runs };
}

// Cost 2..11, auto-derived from playerRating bands.
function costOf(p){
  const r = playerRating(p);
  if(r>=88) return 11;
  if(r>=85) return 10;
  if(r>=83) return 9;
  if(r>=81) return 8;
  if(r>=79) return 7;
  if(r>=77) return 6;
  if(r>=74) return 5;
  if(r>=71) return 4;
  if(r>=68) return 3;
  return 2;
}
const MIN_COST = 2; // cheapest tier in the full pool (fallback)

// Cheapest cost among a set of available players (for reservation math).
function cheapestCost(available){
  if(!available||!available.length) return MIN_COST;
  let min=Infinity;
  for(const p of available){ const c=costOf(p); if(c<min) min=c; }
  return min===Infinity?MIN_COST:min;
}

// Can this team afford player p right now, leaving enough to finish?
function canAfford(team, p, available){
  const remaining = team.budget - (team.spent||0);
  const openCount = openSlots(team).length;      // includes the slot we'd fill
  const floor = cheapestCost(available||[]);       // real cheapest available
  const reserve = (openCount-1) * floor;           // for the OTHER open slots
  return costOf(p) + reserve <= remaining;
}

// Cap-mode value. A real GM spends the cap on the best players it can fit,
// not the cheapest. So this is mostly raw situational value, with only a
// mild value-per-point tilt to break ties toward bargains — never enough
// to prefer a scrub over an affordable star.
function capValue(t, p, scarcity, budgetPressure, slot){
  const sv = situationalValue(t, p, scarcity, slot);
  const perPoint = (sv / costOf(p));
  const bargainWeight = 0.18 * (1 - budgetPressure);
  return sv + bargainWeight*perPoint*6;
}

// Cap-mode AI pick: best capValue among affordable, legal players.
function aiPickCap(team, available){
  const scar = computeScarcity(available);
  const resOpen = (team.resCap||0) - (team.slots.RES||[]).length;
  const floor = cheapestCost(available);

  // budget pressure: remaining budget spread over remaining slots, normalized.
  const remaining = team.budget - (team.spent||0);
  const openCount = openSlots(team).length;
  const perSlotBudget = openCount>0 ? remaining/openCount : floor;
  const budgetPressure = Math.max(0, Math.min(1, (perSlotBudget - floor)/7));

  let best=null, bestV=-1e9, bestSlot=null;
  for(const p of available){
    if(!canAfford(team, p, available)) continue;
    const emptyStart=["PG","SG","SF","PF","C"].filter(s=>!team.slots[s]);
    const fitsStart=p.elig.filter(s=>emptyStart.includes(s));
    let slot;
    if(fitsStart.length>0){
      slot = fitsStart.sort((a,b)=>(scar[b]||0)-(scar[a]||0))[0];
    } else {
      if(resOpen<=0) continue;
      slot="RES";
    }
    let v=capValue(team,p,scar,budgetPressure,slot);
    if(budgetPressure>0.4){
      const useRatio = Math.min(1, costOf(p)/Math.max(floor,perSlotBudget));
      v += useRatio * 6 * budgetPressure;
    }
    if(v>bestV){ bestV=v; best=p; bestSlot=slot; }
  }
  if(!best){
    for(const p of available){
      if(!canAfford(team,p,available)) continue;
      const fits=fittableStartSlots(team,p);
      if(fits.length>0){ best=p; bestSlot=fits[0]; break; }
      else if(resOpen>0){ best=p; bestSlot="RES"; break; }
    }
  }
  return best ? { player:best, slot:bestSlot } : null;
}

// Category profile of a full team (starters weighted full, reserves light)
function teamProfile(team){
  const st = ["PG","SG","SF","PF","C"].map(s=>team.slots[s]).filter(Boolean);
  const rs = (team.slots.RES||[]).filter(Boolean);
  const all = st.concat(rs);
  const prof = { scoring:0, rebounding:0, playmaking:0, defense:0, shooting:0, size:0 };
  st.forEach(p=>{
    prof.scoring    += p.pts;
    prof.rebounding += p.reb;
    prof.playmaking += p.ast;
    prof.defense    += (p.stl*2 + p.blk*2.2);
    prof.shooting   += p.tpm;
  });
  // depth = how much the bench adds
  let depth=0; rs.forEach(p=>depth+=playerRating(p));
  prof.depth = rs.length? depth/rs.length : 0;
  prof.starPower = Math.max(...st.map(playerRating));
  prof.floor = Math.min(...st.map(playerRating));
  return prof;
}

// Convert team rating into a letter grade (curved to the all-time pool).
function teamGrade(rating){
  // ratings for full teams cluster ~72-84. Map to letters.
  if(rating>=82) return 'A+';
  if(rating>=80.5) return 'A';
  if(rating>=79) return 'A-';
  if(rating>=77.5) return 'B+';
  if(rating>=76) return 'B';
  if(rating>=74.5) return 'B-';
  if(rating>=73) return 'C+';
  if(rating>=71.5) return 'C';
  return 'C-';
}
// Season Mode grade: same letter scale, different thresholds. A single
// Season team drafts from the whole pool with zero competition, so its
// rating runs meaningfully higher than a competitive-draft team's would —
// reusing teamGrade()'s thresholds meant a genuinely solid roster and the
// literal worst-possible one both landed on C-. Calibrated against the
// actual empirical range (worst ~57, a solid-but-not-optimal team ~70,
// best-possible ~87).
function seasonTeamGrade(rating){
  if(rating>=82) return 'A+';
  if(rating>=78) return 'A';
  if(rating>=75) return 'A-';
  if(rating>=72) return 'B+';
  if(rating>=69) return 'B';
  if(rating>=66) return 'B-';
  if(rating>=63) return 'C+';
  if(rating>=60) return 'C';
  return 'C-';
}

// One-line scouting report: name the team's biggest strength and weakness.
function scoutingReport(team){
  const prof = teamProfile(team);
  // Normalize each category against rough "balanced 5 starters" baselines.
  const base = { scoring:110, rebounding:42, playmaking:26, defense:38, shooting:6 };
  const ratios = {
    scoring: prof.scoring/base.scoring,
    rebounding: prof.rebounding/base.rebounding,
    playmaking: prof.playmaking/base.playmaking,
    defense: prof.defense/base.defense,
    shooting: prof.shooting/base.shooting,
  };
  const label = {
    scoring:'scoring', rebounding:'rebounding', playmaking:'playmaking',
    defense:'defense', shooting:'outside shooting'
  };
  const entries = Object.entries(ratios).sort((a,b)=>b[1]-a[1]);
  const best = entries[0], worst = entries[entries.length-1];
  const strongPhrase = ratios[best[0]]>1.15 ? `elite ${label[best[0]]}` : `solid ${label[best[0]]}`;
  const weakPhrase = ratios[worst[0]]<0.8 ? `little ${label[worst[0]]}` : `thinner ${label[worst[0]]}`;

  // bench note
  const benchNote = prof.depth>=78 ? 'Strong bench.' : prof.depth>0 ? 'Shallow bench.' : 'No reserves.';
  return { strength:best[0], weakness:worst[0], text:`${cap1(strongPhrase)}, ${weakPhrase}. ${benchNote}`, ratios };
}
function cap1(s){ return s.charAt(0).toUpperCase()+s.slice(1); }

// Tournament MVP: best player on the champion (by rating).
function tournamentMVP(champion){
  const st = ["PG","SG","SF","PF","C"].map(s=>champion.slots[s]).filter(Boolean);
  let best=st[0], bestR=playerRating(st[0]);
  st.forEach(p=>{ const r=playerRating(p); if(r>bestR){bestR=r;best=p;} });
  return best;
}

// Narrative for why the champion won, comparing to runner-up if available.
function championStory(champion, runnerUp){
  const scout = scoutingReport(champion);
  const label = { scoring:'scoring', rebounding:'rebounding', playmaking:'playmaking',
    defense:'defense', shooting:'shooting' };
  const mvp = tournamentMVP(champion);
  // Identity: prefer defense or scoring as the headline if they're genuinely strong,
  // since they read as a team's calling card better than rebounding/playmaking.
  let identity = scout.strength;
  if(scout.ratios.defense>=1.1 && scout.strength!=='defense' && scout.ratios.defense>=scout.ratios[scout.strength]*0.9) identity='defense';
  else if(scout.ratios.scoring>=1.15 && scout.strength!=='scoring') identity='scoring';
  const identPhrase = identity==='defense' ? 'a smothering defense'
    : identity==='scoring' ? 'relentless scoring'
    : identity==='shooting' ? 'elite outside shooting'
    : identity==='playmaking' ? 'unselfish playmaking'
    : 'dominant rebounding';
  // Stable seed from the matchup itself — same champion/MVP/runner-up always
  // reads the same way, but different games naturally land on different phrasing.
  let seed = 0;
  const seedSrc = champion.name + mvp.n + (runnerUp?runnerUp.name:'');
  for(let i=0;i<seedSrc.length;i++) seed = (seed*31 + seedSrc.charCodeAt(i)) >>> 0;
  const pick = (offset, arr) => arr[(seed+offset) % arr.length];
  let s = pick(0, [
    `${champion.name} took the title behind ${identPhrase}, led by ${mvp.n}.`,
    `${identPhrase.charAt(0).toUpperCase()+identPhrase.slice(1)} carried ${champion.name} to the championship, with ${mvp.n} leading the way.`,
    `${mvp.n} powered ${champion.name} to the title behind ${identPhrase}.`,
    `${champion.name} claimed the crown on the strength of ${identPhrase}, led by ${mvp.n}.`,
  ]);
  if(runnerUp){
    const rScout = scoutingReport(runnerUp);
    if(rScout.weakness===identity || rScout.weakness===scout.strength){
      s += ' ' + pick(1, [
        `${runnerUp.name} couldn't keep pace — their ${label[rScout.weakness]} was the difference in the Final.`,
        `${runnerUp.name} had no answer — their ${label[rScout.weakness]} gave it away in the end.`,
        `${runnerUp.name} put up a fight, but their ${label[rScout.weakness]} proved fatal.`,
      ]);
    } else {
      s += ' ' + pick(2, [
        `${runnerUp.name} pushed them to the brink but fell just short.`,
        `${runnerUp.name} made them work for every bit of it before falling short.`,
        `It took everything ${champion.name} had to hold off ${runnerUp.name}.`,
      ]);
    }
  }
  return s;
}

// Best value pick and biggest reach across the whole draft.
// Requires a pick log: [{teamName, player, round, overall, cost(optional)}]
function draftSuperlatives(pickLog, isCap){
  if(!pickLog||!pickLog.length) return null;
  // "value": high player rating taken late (low overall pick number)
  // Expected slot ~ rank by rating; if taken much later than rank, it's a steal.
  const byRating = [...pickLog].sort((a,b)=>playerRating(b.player)-playerRating(a.player));
  const rankMap = new Map(); byRating.forEach((pk,i)=>rankMap.set(pk.player.n,i+1));

  let bestSteal=null, stealGap=-1, biggestReach=null, reachGap=-1;
  pickLog.forEach(pk=>{
    const expectedRank = rankMap.get(pk.player.n);
    const actualPick = pk.overall; // 1-based overall pick number
    const gap = actualPick - expectedRank; // positive = taken later than deserved = steal
    if(gap>stealGap){ stealGap=gap; bestSteal=pk; }
    if(-gap>reachGap){ reachGap=-gap; biggestReach=pk; }
  });
  return { steal:bestSteal, stealGap, reach:biggestReach, reachGap };
}

// League-wide Best Offense / Best Defense awards — reuses the same per-team
// category totals teamRating() already computes for the balance bonus, so
// there's no new data model, just a comparison across the finished league.
function leagueAwards(teams){
  if(!teams || teams.length<2) return null;
  const withCats = teams.map(t => ({ team:t, cats: teamRating(t).cats }));
  const offenseScore = c => c.scoring + c.shooting*4;
  const defenseScore = c => c.defense*3 + c.reb*0.4;
  let bestOff=withCats[0], bestOffVal=-Infinity, bestDef=withCats[0], bestDefVal=-Infinity;
  withCats.forEach(x=>{
    const ov=offenseScore(x.cats), dv=defenseScore(x.cats);
    if(ov>bestOffVal){bestOffVal=ov;bestOff=x;}
    if(dv>bestDefVal){bestDefVal=dv;bestDef=x;}
  });
  return { bestOffense: bestOff.team, bestDefense: bestDef.team };
}

//  DRAFT THEMES — constraints that filter the draftable pool
// ============================================================
// Each theme has a test(p) -> bool. Player year strings look like "1990-91".
const THEMES = [
  { id:'all',      name:'All-Time',        desc:'The greatest players in NBA history, at their peak.',
    isCurrent:false },
  { id:'modern',   name:'Modern',          desc:'Current NBA — 8 players from every team, 2025-26 season.',
    isCurrent:true },
];
function themeById(id){ return THEMES.find(t=>t.id===id) || THEMES[0]; }
// Return the player pool for an era. All-Time = historical POOL;
// Modern = the real 2025-26 Current NBA rosters (CURRENT_ACTIVE).
function poolForTheme(themeId){
  const t = themeById(themeId);
  if(t.isCurrent && typeof CURRENT_ACTIVE !== 'undefined') return CURRENT_ACTIVE.slice();
  return POOL.slice();
}
// Validate an era can fill a draft: needs enough players per required position.
function themeFeasible(themeId, numTeams, rosterSize){
  const pool = poolForTheme(themeId);
  const needPerPos = numTeams; // each team needs 1 starter per position minimum
  for(const pos of POS_LIST){
    const avail = pool.filter(p=>p.elig.includes(pos)).length;
    if(avail < needPerPos) return { ok:false, pos, avail, need:needPerPos };
  }
  // total players needed
  if(pool.length < numTeams*rosterSize) return { ok:false, total:pool.length, need:numTeams*rosterSize };
  return { ok:true, poolSize:pool.length };
}

// Cap-feasibility: can a budget afford the cheapest legal roster from a pool?
// Returns {ok, minCost} — minCost is the cheapest full-roster spend possible.
function capFeasible(themeId, rosterSize, budget){
  const pool = poolForTheme(themeId);
  // Cheapest legal roster: fill each starting position with the cheapest
  // eligible player, then cheapest remaining for reserves. Greedy lower bound.
  const used=new Set();
  let total=0;
  const slots=["PG","SG","SF","PF","C"];
  for(const pos of slots){
    const cands=pool.filter(p=>p.elig.includes(pos) && !used.has(p.n))
      .sort((a,b)=>costOf(a)-costOf(b));
    if(!cands.length) return { ok:false, reason:'position', pos };
    used.add(cands[0].n); total+=costOf(cands[0]);
  }
  const reserves=rosterSize-5;
  const rest=pool.filter(p=>!used.has(p.n)).sort((a,b)=>costOf(a)-costOf(b));
  for(let i=0;i<reserves;i++){
    if(!rest[i]) return { ok:false, reason:'count' };
    total+=costOf(rest[i]);
  }
  return { ok: budget>=total, minCost: total, budget };
}

// Track a "run" on a position: how many of the last K picks were the same slot.
function recentRun(){
  const recent = S.pickLog.slice(-4);
  if(recent.length<3) return null;
  const counts={};
  recent.forEach(pk=>{ const pos=pk.slot==='RES'?null:pk.slot; if(pos) counts[pos]=(counts[pos]||0)+1; });
  for(const pos in counts){ if(counts[pos]>=3) return pos; }
  return null;
}

// Budget helpers: total budget = per-player rate * rosterSize.

// fixed total), so a 10-man roster feels exactly as tight/generous as a
// 6-man one at the same slider position.
const BUDGET_PP_MIN=4, BUDGET_PP_MAX=50/6, BUDGET_PP_DEFAULT=5;
function budgetLabel(total, rosterSize){
  const pp = total / (rosterSize||6);
  if(pp<=4.5) return 'Brutal';
  if(pp<=34/6) return 'Normal';
  if(pp<=7) return 'Comfortable';
  return 'Superteam';
}

// build teams
function initTeams(){
  S.teams = [];

  for(let i=0;i<S.numTeams;i++){
    const isUser=S.userTeams.includes(i);

      _id:'t'+i,

      spent:0,

      personality: isUser ? null : PERSONALITY_KEYS[Math.floor(Math.random()*PERSONALITY_KEYS.length)],

// pick order: straight repeating cycle OR snake
function buildOrder(){
  const rounds = S.rosterSize;
  const n = S.numTeams;
  const order=[];
  for(let r=0;r<rounds;r++){
    const base=[...Array(n).keys()];
    if(S.snake && r%2===1) base.reverse();
    order.push(...base);
  }
  S.order=order;
  S.pickIdx=0;
}

// place a player on a team in a slot
function place(team, player, slot, priceOverride){
  // snapshot for undo BEFORE mutating
  S.history.push({
    pickIdx:S.pickIdx,
    teams:JSON.stringify(S.teams.map(t=>({...t, slots:{
      PG:t.slots.PG?{n:t.slots.PG.n}:null, SG:t.slots.SG?{n:t.slots.SG.n}:null,
      SF:t.slots.SF?{n:t.slots.SF.n}:null, PF:t.slots.PF?{n:t.slots.PF.n}:null,
      C:t.slots.C?{n:t.slots.C.n}:null, RES:t.slots.RES.map(p=>({n:p.n}))
    }}))),
    available:S.available.map(p=>p.n),
    pickLog:JSON.stringify(S.pickLog.map(pk=>({...pk, player:{n:pk.player.n}}))),
    lastPick:S.lastPick?JSON.stringify({...S.lastPick, player:{n:S.lastPick.player.n}}):null,
  });
  if(S.history.length>60) S.history.shift();

  const price = priceOverride!=null ? priceOverride : costOf(player);
  if(slot==='RES'){ team.slots.RES.push(player); }
  else { team.slots[slot]=player; }
  if(S.mode==='cap'){ team.spent = (team.spent||0) + price; }
  S.available = S.available.filter(p=>p.n!==player.n);
  const roundNum=Math.floor(S.pickIdx/S.numTeams)+1;
  S.lastPick={ team:team.name, player, slot, by:team.isUser?'you':'cpu', cost:S.mode==='cap'?price:null };
  S.pickLog.push({ teamName:team.name, teamId:team._id, player, slot, round:roundNum,
    overall:S.pickIdx+1, cost:S.mode==='cap'?price:null, by:team.isUser?'you':'cpu' });
  team._rating = teamRating(team).rating;
  S.pickIdx++;
  S.selected=null;
  S.search='';
}

// Undo the most recent pick (restores full state by re-linking players by name).
function undoPick(){
  if(!S.history.length) return;
  const snap=S.history.pop();
  S.pickIdx=snap.pickIdx;
  const eraPool=poolForTheme(S.theme);
  const names=new Set(snap.available);
  S.available=eraPool.filter(p=>names.has(p.n));
  const relink=name=>name?eraPool.find(p=>p.n===name):null;
  S.pickLog=JSON.parse(snap.pickLog).map(pk=>({...pk, player:relink(pk.player.n)}));
  S.lastPick=snap.lastPick?(()=>{const lp=JSON.parse(snap.lastPick);return {...lp, player:relink(lp.player.n)};})():null;
  const raw=JSON.parse(snap.teams);
  S.teams=raw.map(t=>{
    const slots={PG:null,SG:null,SF:null,PF:null,C:null,RES:[]};
    ['PG','SG','SF','PF','C'].forEach(s=>{ slots[s]=t.slots[s]?relink(t.slots[s].n):null; });
    slots.RES=(t.slots.RES||[]).map(p=>relink(p.n));
    const nt={...t, slots};
    nt._rating=teamRating(nt).rating;
    return nt;
  });
  S.selected=null;
  S.cpuBusy=false;
  render();
}

// ---------- AUCTION MODE ----------
// Everyone shares one pool. Teams take turns nominating a player (reusing
// the exact same S.order/S.pickIdx turn-tracking the normal draft uses —
// nomination order IS pick order here), then every team that has room for
// that player can bid, cycling turn by turn until only one bidder remains.
// If nobody ever bids, the nominating team is forced to take them at the
// floor price — a standard real-auction rule that prevents deadlock on
// fringe players nobody wants. Once every roster is full, this feeds
// straight into the existing finishDraft() → bracket/results pipeline,
// completely unchanged, since a finished auction roster is shaped
// identically to a finished normal draft roster.
function initAuction(){
  S.auction = {
    nominee:null, nominatorIdx:null, currentBid:0, leaderIdx:null,
    activeBidders:[], bidCursor:0, phase:'idle', nominateOptions:null, floorExcludingNominee:null,
    nominatorCursor:0, pendingNominatorIdx:null,
  };
}
// Resets ONLY the current nominee/bidding state between rounds — NOT
// nominatorCursor. That cursor has to persist and keep advancing across the
// whole auction; resetting it after every single player resolution (as
// initAuction() does, correctly, for a brand-new auction) meant nomination
// turn order snapped back to the start every time, so whichever team came
// first with open roster room got picked again and again.
function resetBiddingRound(){
  S.auction.nominee=null; S.auction.nominatorIdx=null; S.auction.currentBid=0; S.auction.leaderIdx=null;
  S.auction.activeBidders=[]; S.auction.bidCursor=0; S.auction.phase='idle';
  S.auction.floorExcludingNominee=null; S.auction.eligibleAtStart=null;
}
// The first open starting slot this player fits, else RES if there's room,
// else null (this team genuinely can't use them — excluded from bidding).
function bestSlotFor(team, player){
  for(const pos of POS_LIST){ if(player.elig.includes(pos) && !team.slots[pos]) return pos; }
  const resOpen = (team.resCap||0) - (team.slots.RES||[]).length;
  return resOpen>0 ? 'RES' : null;
}
// A team can never bid (or be forced to take a player) beyond what would
// leave it unable to afford minimum-cost players for its OTHER open slots —
// same reservation principle as canAfford(), just phrased for a bid amount
// rather than a fixed cost.
function canAffordBid(team, bidAmount, player){
  const remaining = team.budget - (team.spent||0);
  const otherOpen = openSlots(team).length - 1; // slots other than the one this player fills
  const floor = S.auction && S.auction.nominee===player ? S.auction.floorExcludingNominee : cheapestCost(S.available.filter(p=>p.id!==player.id));
  const reserve = Math.max(0, otherOpen) * (floor||2);
  return bidAmount + reserve <= remaining;
}
// CPU nomination strategy. Early in the auction, strongly favors putting up
// the single best remaining player — mirrors real behavior, since everyone
// wants a shot at the marquee names while budgets are still full, and it's
// a reasonable way to get the best talent onto the board before money runs
// dry. As the auction progresses, mixes in nominating a player who fills
// the NOMINATOR's own biggest need instead — a real, recognizable auction
// tactic ("I need a center and there are only two good ones left, better
// put one up now") even though anyone at the table can still win it.
// Personality shifts the balance: Star Chasers keep chasing star power
// later into the auction; Steady Builders pivot to need-based nomination
// sooner, matching how each personality already behaves in a normal draft.
function cpuNominate(nominatorTeam, available){
  const usable = available.filter(p=>S.teams.some(t=>bestSlotFor(t,p)!==null));
  if(!usable.length) return null;
  const byRating = [...usable].sort((a,b)=>playerRating(b)-playerRating(a));
  if(usable.length<=3) return byRating[0]; // endgame — no point being clever with the last few names

  const progress = S.order.length ? S.pickIdx/S.order.length : 0; // 0 at start, ~1 near the end
  const per = PERSONALITY[nominatorTeam.personality] || PERSONALITY.balanced;
  const personalityNudge = per.talentChase>0 ? 0.35 : (per.needWeight>1.1 ? -0.15 : 0);
  const nominateBestChance = Math.max(0.15, 0.85 - progress*0.6 + personalityNudge);

  if(Math.random() < nominateBestChance) return byRating[0];

  const openStart = POS_LIST.filter(s=>!nominatorTeam.slots[s]);
  const resOpen = (nominatorTeam.resCap||0) - (nominatorTeam.slots.RES||[]).length;
  let needCandidates = openStart.length ? usable.filter(p=>p.elig.some(s=>openStart.includes(s))) : [];
  if(!needCandidates.length && resOpen>0) needCandidates = usable;
  return needCandidates.length ? needCandidates.sort((a,b)=>playerRating(b)-playerRating(a))[0] : byRating[0];
}
// How much this specific CPU would pay for this specific player: the
// player's static cost, adjusted up or down by the same situational-value
// signal the turn-based CPU already uses to judge fit/need — including
// positional scarcity among what's left, so a team facing a thin market at
// a position it needs will reasonably pay a premium — then hard-capped by
// what the team can actually afford once its other open slots are reserved
// for.
function auctionCeiling(team, player){
  const slot = bestSlotFor(team, player);
  if(!slot) return 0;
  const base = costOf(player);
  const scarcity = S.auction && S.auction.nominee===player ? S.auction.scarcityAtNomination : computeScarcity(S.available);
  const sv = situationalValue(team, player, scarcity||{}, slot);
  const baseline = playerRating(player);
  const multiplier = Math.max(0.55, Math.min(1.6, 1 + (sv-baseline)/40));
  let ceiling = Math.round(base*multiplier);
  const remaining = team.budget - (team.spent||0);
  const otherOpen = openSlots(team).length - 1;
  const floor = S.auction && S.auction.nominee===player ? S.auction.floorExcludingNominee : cheapestCost(S.available.filter(p=>p.id!==player.id));
  const reserve = Math.max(0, otherOpen) * (floor||2);
  return Math.max(0, Math.min(ceiling, remaining-reserve));
}
function startBidding(nominee, nominatorIdx){
  const eligible = S.teams.map((t,i)=>i).filter(i=>bestSlotFor(S.teams[i], nominee)!==null);
  S.auction.nominee = nominee;
  S.auction.nominatorIdx = nominatorIdx;
  S.auction.currentBid = 0;
  S.auction.leaderIdx = null;
  S.auction.eligibleAtStart = eligible; // preserved separately — activeBidders shrinks as teams pass
  S.auction.activeBidders = eligible;
  S.auction.bidCursor = 0;
  S.auction.scarcityAtNomination = computeScarcity(S.available); // cached once per nominee, same reasoning as floorExcludingNominee below
  // Cached once per nominee rather than recomputed (full pool scan) on every
  // single bid decision — this value can't change until the current auction
  // actually resolves and S.available updates, so recomputing it dozens of
  // times per player during a contested bidding war was pure waste.
  S.auction.floorExcludingNominee = cheapestCost(S.available.filter(p=>p.id!==nominee.id));
}
// Next team (scanning forward from bidCursor) that's still active and isn't
// already the leader — the leader never needs to bid against themselves.
function nextBidderIdx(){
  const n = S.teams.length;
  for(let i=0;i<n;i++){
    const idx=(S.auction.bidCursor+i)%n;
    if(S.auction.activeBidders.includes(idx) && idx!==S.auction.leaderIdx) return idx;
  }
  return null;
}
// Next team (scanning forward from nominatorCursor) that still has open
// roster room. A team with a full roster can never win another player —
// they have nothing to gain from nominating and are skipped entirely,
// rather than wasting a turn that inevitably dumps a player on whoever's
// left. Deliberately independent of S.order/S.pickIdx, which only tracks
// how many total picks remain across the whole league — a team's own
// roster can fill up (from winning OTHER teams' nominations) well before
// or after their "scheduled" turn in that shared sequence comes up.
function nextNominatorIdx(){
  const n = S.teams.length;
  for(let i=0;i<n;i++){
    const idx=(S.auction.nominatorCursor+i)%n;
    if(openSlots(S.teams[idx]).length>0) return idx;
  }
  return null;
}
function resolveAuction(){
  const nominee = S.auction.nominee;
  let winnerIdx, price;
  if(S.auction.leaderIdx!=null){
    winnerIdx = S.auction.leaderIdx; price = S.auction.currentBid;
  } else {
    // Nobody ever bid. Real-auction rule: force a take rather than deadlock
    // forever — but only ever onto a team that can actually use this player.
    // Defaults to the nominator if they qualified, else the first team from
    // the ORIGINAL eligible list (not the live activeBidders, which may have
    // shrunk to nothing if every eligible team passed).
    const fallbackPool = S.auction.eligibleAtStart;
    if(!fallbackPool.length){
      // Nobody anywhere can use them (shouldn't happen — both nomination
      // paths pre-filter for this) — remove from the pool rather than
      // leaving state unchanged, so a retry can't re-nominate the same
      // player and loop forever.
      S.available = S.available.filter(p=>p.id!==nominee.id);
      resetBiddingRound();
      return;
    }
    winnerIdx = fallbackPool.includes(S.auction.nominatorIdx) ? S.auction.nominatorIdx : fallbackPool[0];
    price = 1;
  }
  const winner = S.teams[winnerIdx];
  const slot = bestSlotFor(winner, nominee);
  place(winner, nominee, slot, price);
  resetBiddingRound();
}
// Main driver — same setTimeout-recursion pattern as runCpuPicks(), pausing
// (returning without recursing) whenever it's the human's turn to nominate
// or bid, resuming when their button click calls this again.
function runAuctionStep(){
  if(draftDone()){ finishDraft(); return; }
  if(!S.auction.nominee){
    const nominatorIdx = nextNominatorIdx();
    if(nominatorIdx===null){ finishDraft(); return; } // safety: no one has room left (shouldn't happen if draftDone() was false)
    const nominator = S.teams[nominatorIdx];
    if(nominator.isUser){ S.auction.phase='nominate_wait_human'; S.auction.pendingNominatorIdx=nominatorIdx; render(); return; }
    S.auction.phase='nominating'; render();
    setTimeout(()=>{
      const pick = cpuNominate(nominator, S.available);
      if(!pick){ S.pickIdx++; runAuctionStep(); return; } // safety: nothing left anyone can use
      startBidding(pick, nominatorIdx);
      S.auction.nominatorCursor = nominatorIdx+1;
      runAuctionStep();
    }, 750);
    return;
  }
  if(S.auction.activeBidders.length<=1){ resolveAuction(); runAuctionStep(); return; }
  const bidderIdx = nextBidderIdx();
  if(bidderIdx===null){ resolveAuction(); runAuctionStep(); return; }
  const bidder = S.teams[bidderIdx];
  // If this bidder literally cannot afford the next increment, there's no
  // real decision to make — skip them automatically (no prompt, not even
  // for the human) instead of showing a dead-end Bid/Pass choice.
  if(!canAffordBid(bidder, S.auction.currentBid+1, S.auction.nominee)){
    S.auction.activeBidders = S.auction.activeBidders.filter(i=>i!==bidderIdx);
    runAuctionStep();
    return;
  }
  if(bidder.isUser){ S.auction.phase='bid_wait_human'; render(); return; }
  S.auction.phase='bidding'; render();
  setTimeout(()=>{
    const ceiling = auctionCeiling(bidder, S.auction.nominee);
    // Cover a fraction of the remaining gap each round — converges in a
    // small, bounded number of rounds regardless of how large the total gap
    // is. The fraction itself scales with personality: Star Chasers bid
    // decisively (bigger jumps toward their ceiling), Steady Builders raise
    // more cautiously and incrementally — same reachTolerance signal that
    // already shapes how each personality drafts normally.
    const per = PERSONALITY[bidder.personality] || PERSONALITY.balanced;
    const raisePct = Math.max(0.25, Math.min(0.7, 0.45*per.reachTolerance));
    const headroom = ceiling - S.auction.currentBid;
    const raise = Math.max(1, Math.ceil(headroom*raisePct));
    const nextBid = S.auction.currentBid + raise;
    if(headroom>=1 && canAffordBid(bidder, nextBid, S.auction.nominee)){
      S.auction.currentBid=nextBid; S.auction.leaderIdx=bidderIdx; S.auction.bidCursor=bidderIdx+1;
    } else {
      S.auction.activeBidders = S.auction.activeBidders.filter(i=>i!==bidderIdx);
    }
    runAuctionStep();
  }, 650);
}

// advance through any CPU picks
function runCpuPicks(){
  if(draftDone()){ finishDraft(); return; }
  const t=currentTeam();
  if(t.isUser){ render(); return; }
  S.cpuBusy=true; render();
  setTimeout(()=>{
    const pick = S.mode==='cap' ? aiPickCap(t, S.available) : aiPick(t, S.available);
    if(pick){ place(t, pick.player, pick.slot); }
    else { S.pickIdx++; } // safety: skip if somehow stuck
    S.cpuBusy=false;
    runCpuPicks();
  }, 750);
}

function finishDraft(){
  if(S.gameMode==='season'){ finishSeasonDraft(); return; }
  if(S.gameMode==='dynasty'){ finishDynastyDraft(); return; }
  S.teams.forEach(t=>{ t._rating=teamRating(t).rating; });
  const field=S.teams.map(t=>({...t})); // shallow copy — already carries the _rating just computed above
  S.bracket=runBracket(field, Math.random);
  S.screen='results';
  S._playConfetti=true; // fires once on the results screen's first render, not on every re-render within it
  render();
}

// Season Mode: draft is done, so simulate the full 82-game season now.
function finishSeasonDraft(){
  const userTeam = {...S.teams[0]};
  userTeam._rating = teamRating(userTeam).rating;
  S.seasonResults = simSeasonWithPlayoffs(userTeam, S.seasonConf);
  S.screen = 'seasonResults';
  S._playConfetti = S.seasonResults.wins > S.seasonResults.losses; // celebrate a winning season, not a losing one
  render();
}

// Confetti burst for the champion reveal — plays once (see S._playConfetti),
// pure CSS animation, no library needed.
function confettiHTML(){
  const colors = ['var(--wood)','var(--gold)','var(--cyan)','var(--purple)','var(--win)'];
  let pieces = '';
  for(let i=0;i<40;i++){
    const left = (Math.random()*100).toFixed(1);
    const delay = (Math.random()*0.35).toFixed(2);
    const duration = (1.6+Math.random()*1.1).toFixed(2);
    const color = colors[Math.floor(Math.random()*colors.length)];
    const rot = Math.floor(Math.random()*360)+180;
    const drift = Math.floor(Math.random()*80-40);
    pieces += `<span class="confetti-piece" style="left:${left}%;background:${color};animation-delay:${delay}s;animation-duration:${duration}s;--rot:${rot}deg;--drift:${drift}px;"></span>`;
  }
  return `<div class="confetti-container">${pieces}</div>`;
}

// ---------- RENDERERS ----------
function render(){
  applyAppearance();
  if(S.screen==='modepick') renderModePick();
  else if(S.screen==='setup') renderSetup();
  else if(S.screen==='seasonSetup') renderSeasonSetup();
  else if(S.screen==='dynastySetup') renderDynastySetup();
  else if(S.screen==='careerCreate') renderCareerCreate();
  else if(S.screen==='careerDraftResult') renderCareerDraftResult();
  else if(S.screen==='careerSeasonResult') renderCareerSeasonResult();
  else if(S.screen==='careerOffseason') renderCareerOffseason();
  else if(S.screen==='careerLegacy') renderCareerLegacy();
  else if(S.screen==='careerEvent') renderCareerEvent();
  else if(S.screen==='careerReleased') renderCareerReleased();
  else if(S.screen==='draft') renderDraft();
  else if(S.screen==='auction') renderAuction();
  else if(S.screen==='results') renderResults();
  else if(S.screen==='seasonResults') renderSeasonResults();
  else if(S.screen==='dynastyYear') renderDynastyYear();
  else if(S.screen==='dynastyLegacy') renderDynastyLegacy();
  const tt=document.getElementById('themeToggle');
  if(tt) tt.onclick=()=>{ S.appearance = S.appearance==='light'?'dark':'light'; render(); };
  // Logo click returns to the mode menu from anywhere, like a normal site
  // logo — but this is a single-page app, so leaving a screen with real
  // progress on it (a draft/auction in motion, or a finished result) would
  // actually lose that progress, unlike a real website. Confirm first in
  // those cases; setup screens and the mode menu itself have nothing to
  // lose, so no confirmation needed there.
  const logoEl = document.querySelector('.logo');
  if(logoEl){
    logoEl.style.cursor = S.screen==='modepick' ? 'default' : 'pointer';
    logoEl.onclick = ()=>{
      if(S.screen==='modepick') return;
      const hasProgress = ['draft','auction','results','seasonResults','dynastyYear','dynastyLegacy'].includes(S.screen);
      if(hasProgress && !confirm('Return to the mode menu? Current progress will be lost.')) return;
      S.screen='modepick';
      render();
    };
  }
}

// Light/dark appearance: applied as a data-theme attribute the CSS keys off
// of (see [data-theme="light"] overrides in style.css). Persisted so the
// choice survives a reload; falls back gracefully if storage is unavailable.
function applyAppearance(){
  const theme = S.appearance==='light'?'light':'dark';
  if(document.documentElement.getAttribute('data-theme')!==theme) document.documentElement.setAttribute('data-theme', theme);
  try{ localStorage.setItem('atd_appearance', S.appearance); }catch(e){}
  // Mode accent: each mode gets its own accent color carried through its
  // actual gameplay screens (setup/draft/results), not just the index card —
  // Classic stays the default orange identity, Cap goes cyan, Season goes
  // purple, Auction goes gold. Matches the mode-card icon colors already
  // established on the index. Only touches the DOM when the value actually
  // changes — this attribute cascades to dozens of elements via --accent,
  // so mutating it on every single render (even to the same value) forced
  // an unnecessary style recalculation on every click.
  let modeAccent = null;
  if(S.gameMode==='season') modeAccent='season';
  else if(S.gameMode==='auction') modeAccent='auction';
  else if(S.gameMode==='dynasty') modeAccent='dynasty';
  else if(S.gameMode==='career') modeAccent='career';
  else if(S.gameMode==='draft' && S.mode==='cap') modeAccent='cap';
  const current = document.documentElement.getAttribute('data-mode-accent');
  if(modeAccent && current!==modeAccent) document.documentElement.setAttribute('data-mode-accent', modeAccent);
  else if(!modeAccent && current!==null) document.documentElement.removeAttribute('data-mode-accent');
}
function themeToggleHTML(){
  return `<button class="theme-toggle" id="themeToggle" title="Switch to ${S.appearance==='light'?'dark':'light'} mode">${S.appearance==='light'?'☀️':'🌙'}</button>`;
}

    else { S.gameMode='draft'; S.mode='classic'; S.screen='setup'; }
    render();
  });
}

function careerTeamConf(teamAbbr){ return CONFERENCES.East.includes(teamAbbr) ? 'East' : 'West'; }
// Drives one season: folds the character into their real team, generates
// their season stat line based on the role they actually won, runs the
// same team simulation every other mode uses, builds a personal game log
// around that season, and checks for awards — then stores it all on the
// career for both this screen and (later) the legacy view to use.
// Real NBA milestone culture — crossing 1,000 points, 10,000 points, and
// so on are moments careers actually get remembered by. Computed from the
// real cumulative game-log totals, not a flat average×games estimate.
const CAREER_MILESTONES = {
  pts: [1000,5000,10000,15000,20000,25000,30000,35000,40000],
  reb: [1000,2500,5000,7500,10000,12500,15000],
  ast: [1000,2500,5000,7500,10000,12500],
};
function careerCumulativeTotal(history, statKey){
  return history.reduce((sum,y)=>sum+y.gameLog.reduce((s,g)=>s+g[statKey],0), 0);
}
function careerMilestonesCrossed(beforeHistory, afterHistory){
  const crossed = [];
  Object.entries(CAREER_MILESTONES).forEach(([key,thresholds])=>{
    const before = careerCumulativeTotal(beforeHistory, key);
    const after = careerCumulativeTotal(afterHistory, key);
    thresholds.forEach(t=>{ if(before<t && after>=t) crossed.push({stat:key, threshold:t}); });
  });
  return crossed;
}
function playCareerSeason(){
  const C = S.career;
  const fold = careerFoldIntoRoster(C.player, C.teamAbbr);
  const investment = careerTeamInvestment(fold.team, fold.role, playerRating(C.player));
  const seasonStats = careerSeasonStats(C.player, fold.role);
  const conf = careerTeamConf(C.teamAbbr);
  const seasonResult = simSeasonWithPlayoffs(fold.team, conf);
  const gameLog = careerGameLog(seasonStats, seasonResult.log);
  const highResult = markCareerHighs(gameLog, C.careerBestGameScore || 0, C.careerGameCount || 0);
  C.careerBestGameScore = highResult.best;
  C.careerGameCount = highResult.count;
  const rating = playerRating(C.player);
  const beforeHistory = C.history || [];
  const priorRating = beforeHistory.length ? beforeHistory[beforeHistory.length-1].rating : rating;
  const awards = careerAwardsThisYear(C.player, fold.role, seasonStats, seasonResult.wins, seasonResult.madePlayoffs, C.yearIdx, priorRating);
  const thisSeason = { yearIdx: C.yearIdx, role: fold.role, seasonStats, seasonResult, gameLog, awards, rating, investment };
  const milestones = careerMilestonesCrossed(beforeHistory, [...beforeHistory, thisSeason]);
  thisSeason.milestones = milestones;
  C.lastSeason = thisSeason;
  C.history = [...beforeHistory, thisSeason];
  C.consecutiveBenchYears = fold.role==='bench' ? (C.consecutiveBenchYears||0)+1 : 0;
  S.screen = 'careerSeasonResult';
  S._playConfetti = !!(seasonResult.playoffs && seasonResult.playoffs.wonTitle);
  render();
}

  const roleLabel = { star:'Star', starter:'Starter', rotation:'Rotation Piece', bench:'Bench' }[L.role];
  const statChips = [['PTS',L.seasonStats.pts],['REB',L.seasonStats.reb],['AST',L.seasonStats.ast],['STL',L.seasonStats.stl],['BLK',L.seasonStats.blk],['3PM',L.seasonStats.tpm]]

function startCareerOffseason(skipCutCheck){
  const C = S.career;
  const L = C.lastSeason;
  if(!skipCutCheck && Math.random() < careerCutRisk(L.role, C.consecutiveBenchYears)){
    S.screen = 'careerReleased';
    render();
    return;
  }
  const earned = careerPointsEarned(L.role, L.awards, L.seasonResult.wins);
  S.careerYearlyPointsPool = earned;
  S.careerYearlyAlloc = newCareerYearlyAllocation(C.player);
  S.careerEventOutcome = null;
  if(Math.random() < 0.7){
    C.seenEventIds = C.seenEventIds || [];
    S.careerPendingEvent = pickCareerEvent(C.seenEventIds);
    C.seenEventIds.push(S.careerPendingEvent.id);
    S.screen = 'careerEvent';
  } else {
    S.screen = 'careerOffseason';
  }
  render();
}

function renderCareerLegacy(){
  const C = S.career;
  const p = C.player;
  const history = C.history || [];
  const yearsPlayed = history.length;
  const totalWins = history.reduce((s,y)=>s+y.seasonResult.wins,0);
  const totalLosses = history.reduce((s,y)=>s+y.seasonResult.losses,0);
  const titles = history.filter(y=>y.seasonResult.playoffs && y.seasonResult.playoffs.wonTitle).length;
  const allAwards = history.flatMap(y=>y.awards);
  const mvps = allAwards.filter(a=>a==='MVP').length;
  const allStars = allAwards.filter(a=>a==='All-Star').length;
  const allNba = allAwards.filter(a=>a.startsWith('All-NBA')).length;
  const allNbaFirst = allAwards.filter(a=>a==='All-NBA First Team').length;
  const dpoys = allAwards.filter(a=>a==='Defensive Player of the Year').length;
  const sixthMans = allAwards.filter(a=>a==='Sixth Man of the Year').length;
  const roys = allAwards.filter(a=>a==='Rookie of the Year').length;
  const mips = allAwards.filter(a=>a==='Most Improved Player').length;
  const clutches = allAwards.filter(a=>a==='Clutch Player of the Year').length;
  const careerAvg = k => yearsPlayed ? (history.reduce((s,y)=>s+y.seasonStats[k],0)/yearsPlayed) : 0;
  const bestSeason = history.reduce((best,y)=>!best||y.rating>best.rating?y:best, null);
  const peakRating = bestSeason ? bestSeason.rating : C.rating;
  const isHOF = mvps>=1 || allStars>=5 || allNba>=3 || titles>=2 || dpoys>=2;
  const subtitle = C.forcedRetirement ? 'Career Ended — Nobody Called' : 'Career Complete';

  // Exact career totals — same real-game-log summation already built for
  // milestone tracking, reused here rather than estimating from averages.
  const totalPts = Math.round(careerCumulativeTotal(history, 'pts'));
  const totalReb = Math.round(careerCumulativeTotal(history, 'reb'));
  const totalAst = Math.round(careerCumulativeTotal(history, 'ast'));
  const totalStl = Math.round(careerCumulativeTotal(history, 'stl'));
  const totalBlk = Math.round(careerCumulativeTotal(history, 'blk'));

  // All-time legacy ranking — a single score blending peak brilliance with
  // sustained accumulation (real GOAT debates weigh both), loosely
  // calibrated against real NBA history: a multi-MVP, multi-title, 30,000+
  // point career lands in genuine GOAT-conversation territory, while a
  // short or modest career reads as exactly that.
  const legacyScore = mvps*14 + titles*9 + allNbaFirst*5 + allStars*1.3 + dpoys*4 + (totalPts/1000)*0.5 + peakRating*0.15;
  const hasRealAccolade = mvps>0 || titles>0 || allNba>0 || allStars>0 || dpoys>0;
  let legacyTier, legacyDesc;
  if(legacyScore>=220 && mvps>=3){ legacyTier='GOAT Contention'; legacyDesc='Mentioned in the same breath as the greatest to ever play.'; }
  else if(legacyScore>=170 && (mvps>=1 || titles>=3)){ legacyTier='Top 5 All-Time'; legacyDesc='One of the five best careers the game has ever seen.'; }
  else if(legacyScore>=120){ legacyTier='Top 10 All-Time'; legacyDesc='A career that belongs in any all-time top-ten conversation.'; }
  else if(legacyScore>=80){ legacyTier='Top 20 All-Time'; legacyDesc='A genuine all-time great, no argument needed.'; }
  else if(legacyScore>=45){ legacyTier='Hall of Fame Caliber'; legacyDesc='A career that gets a real look for enshrinement.'; }
  else if(legacyScore>=20 && hasRealAccolade){ legacyTier='Perennial All-Star'; legacyDesc='A name fans around the league knew and respected.'; }
  else if(legacyScore>=8){ legacyTier='Solid NBA Starter'; legacyDesc='A dependable pro who did real winning basketball things.'; }
  else { legacyTier='Journeyman'; legacyDesc='Made it. Stuck around. Not every career is a legendary one — most are not, and that is alright.'; }

  const yearRows = history.map(y=>`<div class="slot-row"><span class="slot-name">Year ${y.yearIdx} (age ${21+y.yearIdx}): ${y.seasonResult.wins}-${y.seasonResult.losses}, ${y.seasonStats.pts} ppg${y.awards.length?' · '+y.awards.join(', '):''}</span></div>`).join('');

  app.innerHTML = `
  <div class="topbar">
    <div class="logo"><div class="mark">🏀</div>
      <div><h1>All-Time Draft</h1><div class="sub">${p.n} — ${subtitle}</div></div></div>
    <div class="topbar-btns">${themeToggleHTML()}<button class="ghost-btn" id="newCareerBtn">New Career</button></div>
  </div>
  ${C.forcedRetirement ? `<div class="hint">After getting released, no team was willing to sign you. Sometimes that's just how it ends — the league moves on faster than any one career.</div>` : ''}
  <div class="result-hero">
    <div class="champ-label" style="font-size:15px;">${yearsPlayed}-Year Career${isHOF?' 🏛️ HALL OF FAME':''}</div>
    <div class="champ-name">${peakRating.toFixed(1)} Peak OVR</div>
    <div class="champ-meta"><span class="champ-rating mono">${totalWins}-${totalLosses} team record · ${titles} title${titles===1?'':'s'}</span></div>
  </div>
  <div class="field" style="background:linear-gradient(135deg,rgba(234,179,8,.14),rgba(234,179,8,.03));border-color:rgba(234,179,8,.4);">
    <label style="color:var(--gold);">All-Time Legacy</label>
    <div style="font-size:26px;font-weight:800;color:var(--gold);margin:4px 0 2px;">${legacyTier}</div>
    <div style="font-size:13.5px;color:var(--chalk-dim);">${legacyDesc}</div>
  </div>
  <div class="field">
    <label>Career Stats</label>
    <div class="season-stats-row">
      <div class="season-stat"><b>${careerAvg('pts').toFixed(1)}</b><i>PTS</i><span class="stat-total">${totalPts.toLocaleString()} total</span></div>
      <div class="season-stat"><b>${careerAvg('reb').toFixed(1)}</b><i>REB</i><span class="stat-total">${totalReb.toLocaleString()} total</span></div>
      <div class="season-stat"><b>${careerAvg('ast').toFixed(1)}</b><i>AST</i><span class="stat-total">${totalAst.toLocaleString()} total</span></div>
      <div class="season-stat"><b>${careerAvg('stl').toFixed(1)}</b><i>STL</i><span class="stat-total">${totalStl.toLocaleString()} total</span></div>
      <div class="season-stat"><b>${careerAvg('blk').toFixed(1)}</b><i>BLK</i><span class="stat-total">${totalBlk.toLocaleString()} total</span></div>
      <div class="season-stat"><b>${careerAvg('tpm').toFixed(1)}</b><i>3PM</i></div>
    </div>
  </div>
  <div class="field">
    <label>Trophy Case</label>
    <div class="trophy-grid">
      <div class="trophy-item"><span class="trophy-icon">👑</span><b>${mvps}</b><i>MVP</i></div>
      <div class="trophy-item"><span class="trophy-icon">⭐</span><b>${allStars}</b><i>All-Star</i></div>
      <div class="trophy-item"><span class="trophy-icon">🏅</span><b>${allNba}</b><i>All-NBA</i></div>
      <div class="trophy-item"><span class="trophy-icon">🏆</span><b>${titles}</b><i>Title${titles===1?'':'s'}</i></div>
      ${dpoys ? `<div class="trophy-item"><span class="trophy-icon">🛡️</span><b>${dpoys}</b><i>DPOY</i></div>` : ''}
      ${sixthMans ? `<div class="trophy-item"><span class="trophy-icon">🎯</span><b>${sixthMans}</b><i>6th Man</i></div>` : ''}
      ${roys ? `<div class="trophy-item"><span class="trophy-icon">🌟</span><b>${roys}</b><i>ROY</i></div>` : ''}
      ${mips ? `<div class="trophy-item"><span class="trophy-icon">📈</span><b>${mips}</b><i>MIP</i></div>` : ''}
      ${clutches ? `<div class="trophy-item"><span class="trophy-icon">🔥</span><b>${clutches}</b><i>Clutch</i></div>` : ''}
    </div>
  </div>
  <div class="field">
    <label>Year by Year</label>
    ${yearRows}
  </div>`;
  document.getElementById('newCareerBtn').onclick=()=>{ S.screen='modepick'; S.career=null; S.careerAlloc=null; render(); };
}

function renderCareerOffseason(){
  const C = S.career;
  const p = C.player;
  const pool = S.careerYearlyPointsPool;
  const used = careerYearlyPointsUsed(S.careerYearlyAlloc, p);
  const remaining = pool - used;
  const previewAdv = S.careerYearlyAlloc;
  const previewStats = statsFromAdv(previewAdv, ROOKIE_STAT_CAPS);
  const previewRating = playerRating({...previewStats, intg:p.intg});
  const myCeiling = Math.min(CAREER_YEARLY_CEILING, p._potentialCeiling || CAREER_YEARLY_CEILING);
  const plateaued = remaining>0 && CAREER_SUBSTATS.every(k=>S.careerYearlyAlloc[k]>=myCeiling);

  const statRows = CAREER_SUBSTATS.map(k=>{
    const val = S.careerYearlyAlloc[k];
    const pct = Math.round(val/myCeiling*100);
    const grew = val > p.adv[k];
    return `<div class="stat-alloc-row">
      <span class="stat-alloc-label">${CAREER_STAT_LABELS[k]}</span>
      <div class="stat-alloc-bar"><div class="stat-alloc-fill" style="width:${pct}%"></div></div>
      <span class="stat-alloc-val mono" style="${grew?'color:var(--win);':''}">${val}</span>
      <div class="stepper stepper-sm"><button class="wide" data-ystatdec10="${k}" ${val<=p.adv[k]?'disabled':''}>−10</button><button data-ystatdec="${k}" ${val<=p.adv[k]?'disabled':''}>–</button><button data-ystatinc="${k}" ${val>=myCeiling||remaining<=0?'disabled':''}>+</button><button class="wide" data-ystatinc10="${k}" ${val>=myCeiling||remaining<=0?'disabled':''}>+10</button></div>
    </div>`;
  }).join('');

  const canDemand = C.lastSeason && !S.careerJustTraded && careerCanDemandTrade(C.lastSeason.role, C.lastSeason.seasonResult.wins);
  const tradeSection = S.careerJustTraded ? `<div class="event-recap"><div class="event-recap-choice">🔄 Trade Approved</div><div class="event-recap-outcome">You're headed to the ${TEAM_NAMES[C.teamAbbr]} ${teamBadgeHTML(C.teamAbbr)}. New team, new chance to win.</div></div>` : canDemand ? `<div class="field">
    <label>Frustrated with Losing?</label>
    <div class="hint">You're a ${C.lastSeason.role} on a team that went ${C.lastSeason.seasonResult.wins}-${C.lastSeason.seasonResult.losses}. You could demand a trade somewhere with a real chance to win — though you might have to accept a smaller role to get it.</div>
    ${S.careerShowTradeConfirm ? `
      <div class="warn">This is permanent for this career — you'll leave the ${TEAM_NAMES[C.teamAbbr]} for good. Sure?</div>
      <div class="auc-actions">
        <button class="big-btn" id="confirmTradeBtn" style="background:linear-gradient(135deg,var(--loss),#7a1a1a);">Yes, Demand the Trade</button>
        <button class="ghost-btn" id="cancelTradeBtn">Never Mind</button>
      </div>` : `<button class="ghost-btn" id="demandTradeBtn" style="width:100%;">Demand a Trade</button>`}
  </div>` : '';

  app.innerHTML = `
  <div class="topbar">
    <div class="logo"><div class="mark">🏀</div>
      <div><h1>All-Time Draft</h1><div class="sub">${p.n} — Off-Season</div></div></div>
    <div class="topbar-btns">${themeToggleHTML()}</div>
  </div>
  <p class="hero-sub">A season in the books. Put in the work — spend every point you earned to keep developing.</p>
  ${S.careerJustSigned ? `<div class="event-recap"><div class="event-recap-choice">✍️ Signed by the ${S.careerJustSigned}</div><div class="event-recap-outcome">A fresh start. Make it count.</div></div>` : ''}
  ${S.careerEventOutcome ? `<div class="event-recap">
    <div class="event-recap-cat">${S.careerEventOutcome.category} — Your Call</div>
    <div class="event-recap-choice">"${S.careerEventOutcome.chosenLabel}"</div>
    <div class="event-recap-outcome">${S.careerEventOutcome.outcome}</div>
    ${S.careerEventOutcome.effectLabel ? `<div class="event-recap-effect" style="${S.careerEventOutcome.effectGood?'':'color:var(--loss);'}">${S.careerEventOutcome.effectGood?'📈':'📉'} ${S.careerEventOutcome.effectLabel}</div>` : `<div class="event-recap-effect" style="color:var(--chalk-dimmer);">No mechanical effect — just how this season goes down.</div>`}
  </div>` : ''}
  <div class="field">
    <label>Skills <span class="mono" style="color:${remaining===0||plateaued?'var(--win)':'var(--accent)'};font-weight:700;">${plateaued?'Maxed out':remaining+' points left'}</span></label>
    <div class="hint">${plateaued ? `You've hit your ceiling in every skill — there's nothing left to develop. The extra points go to waste, but that's the cost of a career that's plateaued.` : `Earned ${pool} points this off-season based on your role, awards, and team success. Must spend them all.`}</div>
    ${statRows}
  </div>
  <div class="field">
    <label>Projected Next Season</label>
    <div class="career-preview-row">
      <div class="career-preview-stat"><b>${previewStats.pts}</b><i>PTS</i></div>
      <div class="career-preview-stat"><b>${previewStats.reb}</b><i>REB</i></div>
      <div class="career-preview-stat"><b>${previewStats.ast}</b><i>AST</i></div>
      <div class="career-preview-stat"><b class="${ratingTierClass(previewRating)}">${previewRating.toFixed(1)}</b><i>OVR</i></div>
    </div>
  </div>
  ${tradeSection}
  ${C.age>=41 ? `<div class="hint">At ${C.age}, the league doesn't have another season in you. Time to call it a career.</div>
  <button class="big-btn" id="retireBtn">Retire</button>` : `
  <button class="big-btn" id="confirmOffseasonBtn" ${(remaining!==0 && !plateaued)?'disabled':''}>Start Season ${C.yearIdx+1}</button>
  ${C.yearIdx>=2 ? `<button class="ghost-btn" id="retireBtn" style="width:100%;margin-top:10px;">Retire Instead</button>` : ''}`}`;

  app.querySelectorAll('[data-ystatinc]').forEach(b=>b.onclick=()=>{ if(adjustCareerYearlyStat(S.careerYearlyAlloc, p, b.dataset.ystatinc, 1, pool)) render(); });
  app.querySelectorAll('[data-ystatdec]').forEach(b=>b.onclick=()=>{ if(adjustCareerYearlyStat(S.careerYearlyAlloc, p, b.dataset.ystatdec, -1, pool)) render(); });
  app.querySelectorAll('[data-ystatinc10]').forEach(b=>b.onclick=()=>{ if(adjustCareerYearlyStat(S.careerYearlyAlloc, p, b.dataset.ystatinc10, 10, pool)) render(); });
  app.querySelectorAll('[data-ystatdec10]').forEach(b=>b.onclick=()=>{ if(adjustCareerYearlyStat(S.careerYearlyAlloc, p, b.dataset.ystatdec10, -10, pool)) render(); });
  const confirmBtn = document.getElementById('confirmOffseasonBtn');
  if(confirmBtn) confirmBtn.onclick=()=>{
    applyCareerYearlyAllocation(p, S.careerYearlyAlloc);
    C.age = C.age + 1;
    careerAgeDecline(p, C.age);
    C.yearIdx++;
    C.rating = playerRating(p);
    S.careerYearlyAlloc = null;
    S.careerJustTraded = false;
    S.careerJustSigned = null;
    if(plateaued){
      const raise = careerBreakthroughCheck(p);
      S.careerBreakthrough = raise>0 ? raise : null;
    } else {
      S.careerBreakthrough = null;
    }
    playCareerSeason();
  };
  const retireBtn = document.getElementById('retireBtn');
  if(retireBtn) retireBtn.onclick=()=>{ S.screen='careerLegacy'; render(); };
  const demandBtn = document.getElementById('demandTradeBtn');
  if(demandBtn) demandBtn.onclick=()=>{ S.careerShowTradeConfirm=true; render(); };
  const cancelTradeBtn = document.getElementById('cancelTradeBtn');
  if(cancelTradeBtn) cancelTradeBtn.onclick=()=>{ S.careerShowTradeConfirm=false; render(); };
  const confirmTradeBtn = document.getElementById('confirmTradeBtn');
  if(confirmTradeBtn) confirmTradeBtn.onclick=()=>{
    const newTeam = careerTradeDemandTeam(C.teamAbbr);
    C.teamAbbr = newTeam;
    S.careerShowTradeConfirm = false;
    S.careerJustTraded = true;
    render();
  };
}

// Coaching Style selector (Complex Mode only): opt-in, not forced. Off by
// default — every team plays balanced with zero coaching influence. Turning
// it on lets you set your own team's philosophy and gives every CPU team its
// own random identity too, so the league isn't all playing the same style.
// Everything else in Complex Mode (sub-ratings, archetypes, Team Fit,

function coachingFieldHTML(){
  const colorKey = {balanced:'neutral', runAndGun:'gold', motion:'purple', defensive:'cyan', insideOut:'wood'};
  const buttons = Object.entries(COACH_STYLES).map(([key,st])=>
    `<button class="coach-btn-${colorKey[key]||'neutral'} ${S.coachStyle===key?'on':''}" data-coach="${key}">${st.emoji} ${st.name}</button>`
  ).join('');
  const picker = S.coachingEnabled ? `
    <div class="seg coach-seg">${buttons}</div>

  return `<div class="field">

    <div class="seg">

      <button class="${S.coachingEnabled?'on':''}" data-coaching="1">On</button>

}
function coachCardHTML(key){
  const st = COACH_STYLES[key] || COACH_STYLES.balanced;
  const strengths = st.strengths.length ? `<div class="coach-str"><b>Strengths</b>${st.strengths.map(s=>`<span>✓ ${s}</span>`).join('')}</div>` : '';

// Team Fit breakdown panel — the "why is my fit what it is" view. Five
// bidirectional bars (Spacing/Creation/Defense/Rebounding/Construction)
// plus plain-language notes explaining what's driving Construction
// specifically, since that's the "pairing over pure stats" signal.
// Takes an ALREADY-COMPUTED fit detail (from fitScore/teamFitDetail) rather
// than recomputing it — the caller (teamCardHTML) needs the same fit result
// for both the numeric tag and this breakdown, so computing it once and
// passing it in avoids running the whole fitScore() calculation twice per
// team on every single render.
function fitBreakdownHTML(st, detail){
  if(!detail) return '';
  const b = detail.breakdown;
  const rows = [['Spacing',b.spacing],['Creation',b.creation],['Defense',b.defense],
    ['Rebounding',b.rebounding],['Construction',b.construction]];
  const maxRange = 2;
  const bars = rows.map(([label,val])=>{
    const pct = Math.min(100, Math.abs(val)/maxRange*100);
    const posW = val>0 ? pct : 0, negW = val<0 ? pct : 0;
    const cls = val>=0 ? 'pos' : 'neg';
    return `<div class="fit-row">
      <span class="fit-label">${label}</span>
      <div class="fit-bar">
        <div class="fit-bar-half fit-bar-neg"><div class="fit-bar-fill neg" style="width:${negW}%"></div></div>
        <div class="fit-bar-center"></div>
        <div class="fit-bar-half fit-bar-pos"><div class="fit-bar-fill pos" style="width:${posW}%"></div></div>
      </div>
      <span class="fit-val ${cls}">${val>=0?'+':''}${val.toFixed(1)}</span>
    </div>`;
  }).join('');
  const d = b.detail;
  // Stable per-roster seed — the SAME team always shows the same phrasing on
  // repeated renders (no flicker while browsing), but different rosters
  // naturally land on different wording. Derived from starter names, not
  // randomness, so it's fully deterministic.
  let seed = 0;
  for(const p of st) for(let i=0;i<p.n.length;i++) seed = (seed*31 + p.n.charCodeAt(i)) >>> 0;
  const pick = (offset, arr) => arr[(seed+offset) % arr.length];
  const notes = [];
  if(!d.hasCreator) notes.push(pick(0, [
    'No real playmaker on the floor',
    "Nobody here is built to set up everybody else",
    'This roster lacks a true table-setter',
    "No one's wired to create shots for teammates",
  ]));
  if(d.nonShooters>=2) notes.push(pick(1, [
    `${d.nonShooters} non-shooting starters clog the paint`,
    `${d.nonShooters} starters give defenses no reason to respect the arc`,
    `The floor's crowded — ${d.nonShooters} starters can't stretch it`,
    `${d.nonShooters} non-shooters make spacing a real problem`,
  ]));
  if(d.dominanceClash<0) notes.push(pick(2, [
    'Too many ball-dominant scorers stepping on each other',
    'More shot-hunters here than shots to go around',
    "Everybody wants the ball — that's a real problem",
    'Too many players who need heavy volume to be effective',
  ]));
  if(d.roleDiversityBonus>0.1) notes.push(pick(3, [
    'Five distinct roles on the floor',
    'Every starter brings something different',
    'No redundancy here — five real archetypes',
    'This lineup covers all its bases',
  ]));
  if(d.complementBonus>0) notes.push(pick(4, [
    'A lockdown defender is freeing up your shot creator',
    "Someone's handling the dirty work so your scorer doesn't have to",
    'Defense and offense are cleanly split here',
    'Your stopper is buying minutes for your shot creator',
  ]));
  const noteHTML = notes.length ? `<div class="fit-notes">${notes.map(n=>`<div>${n}</div>`).join('')}</div>` : '';
  return `<div class="fit-breakdown">${bars}${noteHTML}</div>`;
}
