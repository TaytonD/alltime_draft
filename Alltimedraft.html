    const costTag = (cap_&&p)?`<span class="cost-pill mono">${costOf(p)}</span>`:'';
    return `<div class="slot-row"><span class="slot-pos">${pos}</span>
      ${p?`<span class="slot-name">${p.n}${p.team?' '+teamBadgeHTML(p.team):''}</span>${costTag}<span class="slot-yr mono">${p.yr}</span>`
         :`<span class="slot-name vacant">Vacant</span>`}</div>`;
  }).join('');
  let resRows='';
  const cap=t.resCap;
  for(let i=0;i<cap;i++){
    const p=t.slots.RES[i];
    const costTag = (cap_&&p)?`<span class="cost-pill mono">${costOf(p)}</span>`:'';
    resRows+=`<div class="slot-row"><span class="slot-pos res">R${cap>1?i+1:''}</span>
      ${p?`<span class="slot-name">${p.n}${p.team?' '+teamBadgeHTML(p.team):''}</span>${costTag}<span class="slot-yr mono">${p.yr}</span>`
         :`<span class="slot-name vacant">Vacant</span>`}</div>`;
  }
  const ratingTxt = t._rating>0 ? t._rating.toFixed(1) : '—';
  let fitTag='', fitBreakdown='';
  if(S.complexity==='complex'){
    const st=['PG','SG','SF','PF','C'].map(s=>t.slots[s]).filter(Boolean);
    if(st.length===5){
      const detail = teamFitDetail(st, t.coachStyle);
      fitTag=`<span class="fit-tag mono">${detail.total>=0?'+':''}${detail.total.toFixed(1)} fit</span>`;
      fitBreakdown = fitBreakdownHTML(st, detail);
    }
  }
  const nickname = teamNickname(t);
  const nicknameTag = nickname ? `<div class="team-nickname">${nickname}</div>` : '';
  const budgetLine = cap_
    ? `<div class="team-budget mono">Spent <b>${t.spent||0}</b> / ${t.budget} · <span class="${(t.budget-(t.spent||0))<=4?'low':''}">${t.budget-(t.spent||0)} left</span></div>`
    : '';
  return `<div class="team-card ${isActive?'active':''} ${t.isUser?'you':''}">
    <h3>${t.name}<span class="team-tag ${t.isUser?'tag-you':'tag-cpu'}">${t.isUser?'You':'CPU'}</span></h3>
    ${nicknameTag}
    <div class="team-rating mono">Rating ${ratingTxt}${fitTag}</div>
    ${budgetLine}
    ${rows}${resRows}
    ${fitBreakdown}
  </div>`;
}

// Auction Mode screen. Three states depending on S.auction.phase:
// choosing a nominee (your turn), watching/reacting to a live bid (yours or
// a CPU's), or waiting through a brief CPU "thinking" pause — same pacing
// pattern as the normal draft's CPU turns.
function renderAuction(){
  const done = draftDone();
  const roundNum = Math.floor(S.pickIdx/S.numTeams)+1;
  const totalRounds = S.rosterSize;
  const a = S.auction;

  const budgetStrip = S.teams.map((t,i)=>{
    const remaining = t.budget - (t.spent||0);
    return `<div class="auc-budget-chip ${a && a.nominee && a.activeBidders.includes(i) && i!==a.leaderIdx ? 'auc-inbid':''} ${a && a.leaderIdx===i?'auc-leading':''}">
      <span class="auc-budget-name">${t.name}${t.isUser?' (You)':''}</span>
      <span class="mono">${remaining}</span>
    </div>`;
  }).join('');

  let mainCard = '';
  if(done){
    mainCard = `<div class="pick-panel"><div class="cpu-thinking">Auction complete.</div></div>`;
  } else if(!a || !a.nominee){
    const nominatorIdx = a ? nextNominatorIdx() : null;
    const nominator = nominatorIdx!=null ? S.teams[nominatorIdx] : null;
    if(a && a.phase==='nominate_wait_human'){
      const usable = S.available.filter(p=>S.teams.some(t=>bestSlotFor(t,p)!==null));
      const rows = filteredPlayerRows(usable, true);
      mainCard = `<div class="pick-panel">
        <h4>Your Turn — Nominate a Player</h4>
        <div class="hint">Anyone can bid once they're up, including you. Nominate a name you want, or bait the field with someone else's target.</div>
        <div class="pos-filter">${posFilterButtonsHTML()}</div>
        <input class="search" id="searchBox" placeholder="Search players…" value="${S.search}">
        <div class="player-list">${rows}</div>
      </div>`;
    } else {
      mainCard = `<div class="pick-panel"><div class="cpu-thinking"><span class="spin"></span>${nominator?nominator.name:'A team'} is choosing a player to nominate…</div></div>`;
    }
  } else {
    const nominee = a.nominee;
    const leader = a.leaderIdx!=null ? S.teams[a.leaderIdx] : null;
    const badge = nominee.team ? ' '+teamBadgeHTML(nominee.team) : '';
    const isHumanTurn = a.phase==='bid_wait_human';
    const userTeam = S.teams.find(t=>t.isUser);
    const nextBidAmt = (a.currentBid||0)+1;
    const canBid = isHumanTurn && userTeam && canAffordBid(userTeam, nextBidAmt, nominee);
    const affordWarnHTML = S.affordWarn ? `<div class="afford-warn">${S.affordWarn}</div>` : '';
    mainCard = `<div class="pick-panel auc-live">
      <div class="auc-nominee">
        <div class="auc-nominee-name">${nominee.n}${badge}</div>
        <div class="auc-nominee-meta">${nominee.yr||''} · ${nominee.elig.join('/')} · OVR <span class="ovr-num ${ratingTierClass(playerRating(nominee))}">${playerRating(nominee).toFixed(0)}</span></div>
      </div>
      <div class="auc-bid-display">
        <div class="auc-bid-amount mono">${a.currentBid||0}</div>
        <div class="auc-bid-leader">${leader ? (leader.isUser?'You lead':leader.name+' leads') : 'No bids yet'}</div>
      </div>
      ${affordWarnHTML}
      ${isHumanTurn ? `
        <div class="auc-actions">
          <button class="big-btn" id="bidBtn" ${canBid?'':'disabled'}>${canBid?'Bid '+nextBidAmt:"Can't afford "+nextBidAmt}</button>
          <button class="ghost-btn" id="passBtn">Pass</button>
        </div>` : `<div class="cpu-thinking"><span class="spin"></span>Waiting on other bidders…</div>`}
    </div>`;
  }

  const feedGrew = S.pickLog.length !== S._lastFeedLen;
  const feedRows = [...S.pickLog].reverse().slice(0,40).map((pk,idx)=>{
    const costTag = pk.cost!=null?`<span class="feed-cost mono">${pk.cost}</span>`:'';
    const isNew = idx===0 && feedGrew;
    return `<div class="feed-row ${pk.by==='you'?'feed-you':''} ${isNew?'feed-new':''}">
      <span class="feed-pick mono">${pk.overall}</span>
      <div class="feed-main"><span class="feed-name">${pk.player.n}</span>
        <span class="feed-meta">${pk.teamName} · ${slotLabel(pk.slot)}</span></div>
      ${costTag}
    </div>`;
  }).join('') || `<div class="feed-empty">Won players will appear here as the auction unfolds.</div>`;
  S._lastFeedLen = S.pickLog.length;

  app.innerHTML=`
  <div class="topbar">
    <div class="logo"><div class="mark">🏀</div>
      <div><h1>All-Time Draft</h1><div class="sub">${themeById(S.theme).name} · Auction · Round ${Math.min(roundNum,totalRounds)}/${totalRounds}</div></div></div>
    <div class="topbar-btns">${themeToggleHTML()}<button class="ghost-btn" id="restartBtn">Restart</button></div>
  </div>
  <div class="auc-budget-strip">${budgetStrip}</div>
  ${mainCard}
  <div class="field">
    <label>Auction Log</label>
    <div class="hint">Every player won so far, and for how much.</div>
    <div class="feed-list">${feedRows}</div>
  </div>
  <div class="team-grid">${S.teams.map(t=>teamCardHTML(t, false)).join('')}</div>`;

  const rb=document.getElementById('restartBtn');
  if(rb) rb.onclick=()=>{ if(confirm('Restart the auction? Current progress will be lost.')){ S.screen='setup'; render(); } };

  app.querySelectorAll('[data-pf]').forEach(b=>b.onclick=()=>{ S.posFilter=b.dataset.pf; renderAuction(); });
  const sb=document.getElementById('searchBox');
  if(sb){ sb.oninput=()=>{ S.search=sb.value; renderAuction(); }; sb.focus(); sb.selectionStart=sb.selectionEnd=sb.value.length; }
  app.querySelectorAll('[data-nominate]').forEach(b=>b.onclick=()=>{
    const p = S.available.find(x=>x.n===b.dataset.nominate);
    if(!p) return;
    const nominatorIdx = S.auction.pendingNominatorIdx;
    startBidding(p, nominatorIdx);
    S.auction.nominatorCursor = nominatorIdx+1;
    renderAuction();
    runAuctionStep();
  });
  const bidBtn=document.getElementById('bidBtn');
  if(bidBtn) bidBtn.onclick=()=>{
    const idx = S.teams.findIndex(t=>t.isUser);
    const nextBid = (S.auction.currentBid||0)+1;
    if(!canAffordBid(S.teams[idx], nextBid, S.auction.nominee)){
      S.affordWarn="Can't afford to go that high — you need to leave enough for your other open slots.";
      renderAuction();
      return;
    }
    S.affordWarn=null;
    S.auction.currentBid=nextBid; S.auction.leaderIdx=idx; S.auction.bidCursor=idx+1;
    renderAuction();
    runAuctionStep();
  };
  const passBtn=document.getElementById('passBtn');
  if(passBtn) passBtn.onclick=()=>{
    const idx = S.teams.findIndex(t=>t.isUser);
    S.auction.activeBidders = S.auction.activeBidders.filter(i=>i!==idx);
    renderAuction();
    runAuctionStep();
  };
}

function renderDraft(){
  const t=currentTeam();
  const done=draftDone();
  const roundNum=Math.floor(S.pickIdx/S.numTeams)+1;
  const totalRounds=S.rosterSize;

  let panel='';
  if(S.cpuBusy){
    panel=`<div class="pick-panel"><div class="cpu-thinking"><span class="spin"></span>${t.name} is on the clock…</div></div>`;
  } else if(!done && t.isUser){
    panel=renderPickPanel(t);
  }

  // run banner
  const run=recentRun();
  const runHTML = run ? `<div class="run-banner">🔥 <b>${run}</b> run — ${S.pickLog.slice(-4).filter(p=>p.slot===run).length} taken recently. They're drying up.</div>` : '';

  // pick feed (most recent first)
  const feedGrew = S.pickLog.length !== S._lastFeedLen;
  const feedRows = [...S.pickLog].reverse().slice(0,40).map((pk,idx)=>{
    const costTag = pk.cost!=null?`<span class="feed-cost mono">${pk.cost}</span>`:'';
    const isNew = idx===0 && feedGrew;
    return `<div class="feed-row ${pk.by==='you'?'feed-you':''} ${isNew?'feed-new':''}">
      <span class="feed-pick mono">${pk.overall}</span>
      <div class="feed-main"><span class="feed-name">${pk.player.n}</span>
        <span class="feed-meta">${pk.teamName} · ${slotLabel(pk.slot)}</span></div>
      ${costTag}
    </div>`;
  }).join('') || `<div class="feed-empty">Picks will appear here as the draft unfolds.</div>`;
  S._lastFeedLen = S.pickLog.length;

  const canUndo = S.history.length>0 && !S.cpuBusy && !done;

  app.innerHTML=`
  <div class="topbar">
    <div class="logo"><div class="mark">🏀</div>
      <div><h1>All-Time Draft</h1><div class="sub">${themeById(S.theme).name} · Round ${Math.min(roundNum,totalRounds)}/${totalRounds}</div></div></div>
    <div class="topbar-btns">
      ${themeToggleHTML()}
      ${canUndo?'<button class="ghost-btn" id="undoBtn">↶ Undo</button>':''}
      <button class="ghost-btn" id="restartBtn">Restart</button>
    </div>
  </div>
  <div class="clock-bar">
    <div class="clock-left">
      <div class="onclock"><span class="dot"></span>On the Clock</div>
      <div class="clock-team">${done?'Draft Complete':t.name}<div class="who">${done?'':(t.isUser?'Your pick':'Computer')}</div></div>
    </div>
    <div class="clock-right mono">Pick <b>${Math.min(S.pickIdx+1,S.order.length)}</b> / ${S.order.length}<br>${S.available.length} available</div>
  </div>
  ${runHTML}
  ${panel}
  <div class="draft-layout">
    <div class="board">${S.teams.map(tm=>teamCardHTML(tm, tm===t && !done)).join('')}</div>
    <div class="feed-panel">
      <div class="feed-header">Draft Feed</div>
      <div class="feed-list">${feedRows}</div>
    </div>
  </div>
  <div class="footer-note">Positions are enforced — players can only be slotted where they actually played.</div>`;

  const rb=document.getElementById('restartBtn');
  if(rb) rb.onclick=()=>{ if(confirm('Restart the draft? Current progress will be lost.')){ S.screen='setup'; render(); } };
  const ub=document.getElementById('undoBtn');
  if(ub) ub.onclick=()=>undoPick();
  attachPickHandlers(t);
}

// Auction Mode's nomination list — same visual language as the draft's
// player rows (p-row/p-pos/p-stats/ovr-num), but simpler: nominating a
// player costs nothing itself, so there's no cost column or affordability
// dimming here — that all happens once bidding actually starts.
function posFilterButtonsHTML(){
  return ['ALL',...POS_LIST].map(p=>`<button class="${S.posFilter===p?'on':''}" data-pf="${p}">${p}</button>`).join('');
}
function filteredPlayerRows(pool, forNominate){
  let list = pool.filter(p=>{
    if(S.posFilter!=='ALL' && !p.elig.includes(S.posFilter)) return false;
    if(S.search && !p.n.toLowerCase().includes(S.search.toLowerCase())) return false;
    return true;
  });
  list = list.map(p=>({p,r:playerRating(p)})).sort((a,b)=>b.r-a.r).map(x=>x.p).slice(0,60);
  return list.map(p=>{
    const elig = p.elig.join('/');
    const rb = ratingBadge(p);
    return `<div class="p-row" ${forNominate?`data-nominate="${p.n}"`:''}>
      <span class="p-pos">${elig}</span>
      <div class="p-main"><div class="p-name">${p.n}${p.team?' '+teamBadgeHTML(p.team):''}</div><div class="p-yr mono">${p.yr}</div></div>
      <div class="p-stats"><b>${p.pts}</b> pts · ${p.reb} reb<br>${p.ast} ast · <b class="ovr-num ${rb.tier}">${rb.num}</b> ovr</div>
    </div>`;
  }).join('') || `<div class="cpu-thinking">No available players match this filter.</div>`;
}

function renderPickPanel(t){
  const cap_=(S.mode==='cap');
  const openStart=['PG','SG','SF','PF','C'].filter(s=>!t.slots[s]);
  const resOpen=t.resCap-(t.slots.RES.length);
  const openList=[...openStart]; for(let i=0;i<resOpen;i++) openList.push('RES');
  const slotOverview = ['PG','SG','SF','PF','C'].map(pos=>{
    const p = t.slots[pos];
    if(p) return `<span class="slot-chip slot-filled" title="${p.n}">✓ ${pos}</span>`;
    return `<span class="slot-chip slot-open">${pos}</span>`;
  }).join('') + (resOpen>0 ? `<span class="slot-chip slot-res">+${resOpen} RES</span>` : '');
  const remaining = cap_ ? t.budget-(t.spent||0) : Infinity;

  // filter available by position eligibility + search
  let list=S.available.filter(p=>{
    if(S.posFilter!=='ALL' && !p.elig.includes(S.posFilter)) return false;
    if(S.search && !p.n.toLowerCase().includes(S.search.toLowerCase())) return false;
    return true;
  });
  // sort by overall rating desc for convenience
  list=list.map(p=>({p,r:playerRating(p)})).sort((a,b)=>b.r-a.r).map(x=>x.p).slice(0,60);

  const filterBtns=['ALL',...POS_LIST].map(p=>
    `<button class="${S.posFilter===p?'on':''}" data-pf="${p}">${p}</button>`).join('');

  let selBlock='';
  if(S.selected){
    const p=S.selected;
    const fitStart=p.elig.filter(s=>!t.slots[s]);
    const canRes=resOpen>0;
    const opts=[...fitStart.map(s=>`<button data-place="${s}">${s}</button>`)];
    if(canRes) opts.push(`<button data-place="RES">Reserve</button>`);
    const flagMsg = fitStart.length===0 && !canRes
      ? `<div class="flag">${p.n} plays ${p.elig.join('/')}, but those starting spots are filled and no reserve slot is open. Pick another player.</div>` : '';
    const costNote = cap_?` · costs <b>${costOf(p)}</b>`:'';
    selBlock=`<div class="last-pick" style="border-color:var(--wood)">
      <b>${p.n}</b> — plays ${p.elig.join('/')}${costNote}. Choose a slot:
      <div class="slot-choice">${opts.join('')}<button class="cancel" data-place="cancel">Cancel</button></div>
      ${flagMsg}</div>`;
  }

  // affordability: must leave enough for each OTHER open slot at the cheapest
  // player actually still available (not a hardcoded minimum).
  const floorCost = cap_ ? cheapestCost(S.available) : 0;
  function affordable(p){
    if(!cap_) return true;
    const otherOpen = openList.length - 1;
    return costOf(p) + otherOpen*floorCost <= remaining;
  }

  const complex_ = S.complexity==='complex';
  const rows=list.map(p=>{
    const elig=p.elig.join('/');
    const aff=affordable(p);
    const costCol = cap_
      ? `<div class="p-cost mono ${aff?'':'unaff'}">${costOf(p)}<span class="p-cost-lbl">cost</span></div>`
      : '';
    const arch = complex_ ? archetypesOf(p) : null;
    const archRow = arch ? `<div class="p-arch">
        <span class="arch-tag primary ${archColor(arch.primary)}">${arch.primary}</span><span class="arch-tag secondary ${archColor(arch.secondary)}">${arch.secondary}</span>
      </div>` : '';
    const advRow = complex_ && p.adv ? `<div class="p-adv">
        <span class="stat-chip" title="Scoring"><b>${p.adv.sco}</b><i>SCO</i></span>
        <span class="stat-chip" title="Shooting"><b>${p.adv.sho}</b><i>SHO</i></span>
        <span class="stat-chip" title="Playmaking"><b>${p.adv.ply}</b><i>PLY</i></span>
        <span class="stat-chip" title="Perimeter Defense"><b>${p.adv.pdef}</b><i>PDEF</i></span>
        <span class="stat-chip" title="Interior Defense"><b>${p.adv.idef}</b><i>IDEF</i></span>
        <span class="stat-chip" title="Rebounding"><b>${p.adv.reb}</b><i>REB</i></span>
        <span class="stat-chip" title="Athleticism"><b>${p.adv.ath}</b><i>ATH</i></span>
        <span class="stat-chip" title="Basketball IQ"><b>${p.adv.iq}</b><i>IQ</i></span>
        <span class="stat-chip" title="Versatility"><b>${p.adv.vers}</b><i>VERS</i></span>
      </div>` : '';
    const rb = ratingBadge(p);
    return `<div class="p-row ${aff?'':'disabled'}" ${aff?`data-pick="${p.n}"`:''}>
      <span class="p-pos">${elig}</span>
      <div class="p-main"><div class="p-name">${p.n}${p.team?' '+teamBadgeHTML(p.team):''}</div><div class="p-yr mono">${p.yr}</div>${archRow}${advRow}</div>
      <div class="p-stats"><b>${p.pts}</b> pts · ${p.reb} reb<br>${p.ast} ast · <b class="ovr-num ${rb.tier}">${rb.num}</b> ovr</div>
      ${costCol}
    </div>`;
  }).join('') || `<div class="cpu-thinking">No available players match this filter.</div>`;

  const budgetHeader = cap_
    ? `<div class="budget-header mono">Budget remaining: <b class="${remaining<=floorCost*2?'low':''}">${remaining}</b> / ${t.budget}
        <span class="bh-hint">· keep ${Math.max(0,(openList.length-1))}×${floorCost} for your ${openList.length-1} other slot${openList.length-1===1?'':'s'}</span></div>`
    : '';

  const affordWarnHTML = (cap_ && S.affordWarn) ? `<div class="afford-warn">${S.affordWarn}</div>` : '';

  return `<div class="pick-panel">
    <h4>${t.name} — Make Your Pick</h4>
    <div class="slot-overview">${slotOverview}</div>
    ${budgetHeader}
    ${affordWarnHTML}
    ${selBlock}
    <div class="pos-filter">${filterBtns}</div>
    <input class="search" id="searchBox" placeholder="Search players…" value="${S.search}">
    <div class="player-list">${rows}</div>
  </div>`;
}

function attachPickHandlers(t){
  app.querySelectorAll('[data-pf]').forEach(b=>b.onclick=()=>{ S.posFilter=b.dataset.pf; renderDraft(); });
  const sb=document.getElementById('searchBox');
  if(sb){ sb.oninput=()=>{ S.search=sb.value; const pos=sb.selectionStart;
    renderDraft(); const nb=document.getElementById('searchBox'); if(nb){nb.focus(); nb.setSelectionRange(pos,pos);} }; }
  app.querySelectorAll('[data-pick]').forEach(b=>b.onclick=()=>{
    const p=S.available.find(x=>x.n===b.dataset.pick);
    if(!p) return;
    if(S.mode==='cap' && !canAfford(t, p, S.available)){
      S.affordWarn = "Can't afford this — you need to leave enough for your other open slots.";
      renderDraft();
      return;
    }
    S.affordWarn = null;
    const fitStart=p.elig.filter(s=>!t.slots[s]);
    const resOpen=t.resCap-(t.slots.RES.length);
    // auto-place if only one legal option
    if(fitStart.length===1 && resOpen<=0){ place(t,p,fitStart[0]); render(); runCpuPicks(); return; }
    if(fitStart.length===0 && resOpen>0){ place(t,p,'RES'); render(); runCpuPicks(); return; }
    S.selected=p; renderDraft();
  });
  app.querySelectorAll('[data-place]').forEach(b=>b.onclick=()=>{
    const v=b.dataset.place;
    if(v==='cancel'){ S.selected=null; renderDraft(); return; }
    if(S.mode==='cap' && S.selected && !canAfford(t, S.selected, S.available)){
      S.affordWarn = "Can't afford this — you need to leave enough for your other open slots.";
      renderDraft();
      return;
    }
    S.affordWarn = null;
    place(t, S.selected, v); render(); runCpuPicks();
  });
}

function roundName(idx, total){
  const fromEnd=total-idx;
  if(fromEnd===1) return 'Final';
  if(fromEnd===2) return 'Semifinals';
  if(fromEnd===3) return 'Quarterfinals';
  return 'Round '+(idx+1);
}

// Renders the visual bracket columns (one per round + a champion column) for
// any {rounds, champion} bracket object — shared by the main competitive
// bracket and Season Mode's conference playoff bracket, which produce the
// exact same shape via runSeededBracket().
function bracketColumnsHTML(bracket){
  const champ = bracket.champion;
  const totalRounds=bracket.rounds.length;
  const championId = champ._id;
  const columns = bracket.rounds.map((rd,idx)=>{
    const matchups = rd.results.map(r=>{
      if(r.bye){
        const w=r.winner;
        return `<div class="bkt-match bye-match">
          <div class="bkt-team ${w._id===championId?'champ':'adv'}">
            <span class="bkt-name">${w.name}</span><span class="bkt-seed mono">${w.isUser?'You':''}</span>
          </div>
          <div class="bkt-team bkt-bye"><span class="bkt-name">Bye</span></div>
        </div>`;
      }
      const A=r.winner, B=r.loser;
      const aScore=Math.max(r.wA,r.wB), bScore=Math.min(r.wA,r.wB);
      return `<div class="bkt-match">
        <div class="bkt-team win ${A._id===championId?'champ':''}">
          <span class="bkt-name">${A.name}${A.isUser?' <em>You</em>':''}</span><span class="bkt-score mono">${aScore}</span>
        </div>
        <div class="bkt-team lose">
          <span class="bkt-name">${B.name}${B.isUser?' <em>You</em>':''}</span><span class="bkt-score mono">${bScore}</span>
        </div>
      </div>`;
    }).join('');
    return `<div class="bkt-col" data-round="${idx}">
      <div class="bkt-round-label">${roundName(idx,totalRounds)}</div>
      <div class="bkt-matches">${matchups}</div>
    </div>`;
  }).join('');

  const champCol = `<div class="bkt-col bkt-champ-col">
    <div class="bkt-round-label">Champion</div>
    <div class="bkt-matches"><div class="bkt-trophy">
      <div class="trophy-ico">🏆</div>
      <div class="trophy-name">${champ.name}</div>
      ${champ.isUser?'<div class="trophy-you">Your team</div>':''}
    </div></div>
  </div>`;
  return columns + champCol;
}

function renderResults(){
  const b=S.bracket;
  const champ=b.champion;
  const cap_=(S.mode==='cap');
  const confettiOnce = S._playConfetti ? confettiHTML() : '';
  S._playConfetti = false;
  const standings=[...S.teams].sort((a,b)=>b._rating-a._rating);
  const maxR=Math.max(...standings.map(t=>t._rating));
  const minR=Math.min(...standings.map(t=>t._rating));

  const standHTML=standings.map((t,i)=>{
    const pct=maxR===minR?100:((t._rating-minR)/(maxR-minR))*100;
    const budgetTag = cap_?`<span class="stand-budget mono">${t.spent}/${t.budget}</span>`:'';
    const grade=teamGrade(t._rating);
    return `<div class="stand-row"><span class="seed">${i+1}</span>
      <span class="stand-grade grade-${grade[0]}">${grade}</span>
      <span class="stand-name">${t.name} ${t.isUser?'<span class="team-tag tag-you" style="margin-left:6px">You</span>':''}</span>
      ${budgetTag}
      <div class="bar-wrap"><div class="bar-fill" style="width:${20+pct*0.8}%"></div></div>
      <span class="stand-rating mono">${t._rating.toFixed(1)}</span></div>`;
  }).join('');

  // Analysis pieces
  const mvp = tournamentMVP(champ);
  const story = championStory(champ, b.runnerUp);
  const supers = draftSuperlatives(S.pickLog, cap_);
  const champScout = scoutingReport(champ);
  const champGrade = teamGrade(champ._rating);

  // Superlatives HTML
  const awards = leagueAwards(S.teams);
  let superHTML='';
  if((supers && (supers.stealGap>0 || supers.reachGap>0)) || awards){
    const steal=supers&&supers.steal, reach=supers&&supers.reach;
    superHTML=`<div class="supers">
      ${supers&&supers.stealGap>=2?`<div class="super-card steal"><div class="super-label">💎 Steal of the Draft</div>
        <div class="super-name">${steal.player.n}</div>
        <div class="super-detail">${steal.teamName} · round ${steal.round}${cap_?` · cost ${steal.cost}`:''}</div></div>`:''}
      ${supers&&supers.reachGap>=3?`<div class="super-card reach"><div class="super-label">📈 Biggest Reach</div>
        <div class="super-name">${reach.player.n}</div>
        <div class="super-detail">${reach.teamName} · round ${reach.round}</div></div>`:''}
      ${awards?`<div class="super-card offense"><div class="super-label">🔥 Best Offense</div>
        <div class="super-name">${awards.bestOffense.name}</div>
        <div class="super-detail">${awards.bestOffense.isUser?'Your team':'League leader'}</div></div>`:''}
      ${awards?`<div class="super-card defense"><div class="super-label">🧱 Best Defense</div>
        <div class="super-name">${awards.bestDefense.name}</div>
        <div class="super-detail">${awards.bestDefense.isUser?'Your team':'League leader'}</div></div>`:''}
    </div>`;
  }

  // Re-sim HTML
  let resimHTML='';
  if(S.resim){
    const rows=standings.map(t=>{
      const w=S.resim.wins[t._id]||0;
      const pct=Math.round(w/S.resim.runs*100);
      return `<div class="odds-row"><span class="odds-name">${t.name}${t.isUser?' (You)':''}</span>
        <div class="odds-bar"><div class="odds-fill" style="width:${pct}%"></div></div>
        <span class="odds-pct mono">${pct}%</span></div>`;
    }).join('');
    resimHTML=`<div class="resim-results"><div class="resim-title">Title odds over ${S.resim.runs} simulations</div>${rows}</div>`;
  }

  app.innerHTML=`
  <div class="topbar">
    <div class="logo"><div class="mark">🏀</div>
      <div><h1>All-Time Draft</h1><div class="sub">Championship Result</div></div></div>
    <div class="topbar-btns">${themeToggleHTML()}<button class="ghost-btn" id="againBtn">New Draft</button></div>
  </div>
  ${confettiOnce}
  <div class="result-hero">
    <div class="hero-glow"></div>
    <div class="champ-trophy-ico">🏆</div>
    <div class="champ-label">League Champion</div>
    <div class="champ-name">${champ.name}</div>
    <div class="champ-meta">
      <span class="champ-grade-badge grade-${champGrade[0]}">${champGrade}</span>
      <span class="champ-rating mono">Rating ${champ._rating.toFixed(1)}${cap_?' · spent '+champ.spent+'/'+champ.budget:''}${champ.isUser?' · Your team':''}</span>
    </div>
  </div>
  <div class="story-card">
    <div class="story-text">${story}</div>
    <div class="mvp-line"><span class="mvp-badge">Finals MVP</span> ${mvp.n} <span class="mvp-yr mono">${mvp.yr}</span></div>
  </div>
  ${superHTML}
  <div class="bracket-wrap">
    <h4 class="section-h">Playoff Bracket</h4>
    <div class="bracket-scroll"><div class="bracket-tree">${bracketColumnsHTML(b)}</div></div>
  </div>
  <div class="result-actions">
    <button class="action-btn" id="resimBtn">🎲 Re-sim Playoffs (odds)</button>
    <button class="action-btn alt" id="recapBtn">📸 Share Recap</button>
  </div>
  ${resimHTML}
  <div class="standings"><h4 class="section-h">Power Rankings</h4>${standHTML}</div>
  <div class="board">${S.teams.map(t=>teamCardHTML(t,false)).join('')}</div>
  <div class="footer-note">Ratings blend peak production with hand-set intangibles, plus a balance bonus for all-around teams. Series are best-of-seven; upsets are possible but the better-rated team is favored.</div>
  ${S.showRecap?recapModalHTML():''}`;

  document.getElementById('againBtn').onclick=()=>{ S.screen='modepick'; S.teams=[]; render(); };
  document.getElementById('resimBtn').onclick=()=>{
    const field=S.teams.map(t=>({...t})); // already carries the correct _rating set at finishDraft() time
    S.resim=resimOdds(field, 100);
    render();
  };
  document.getElementById('recapBtn').onclick=()=>{ S.showRecap=true; render(); };
  const closeRecap=document.getElementById('closeRecap');
  if(closeRecap) closeRecap.onclick=()=>{ S.showRecap=false; render(); };
}

// Season Mode results: final record, season stat line, and the full 82-game
// log. Playoffs deliberately not built yet — the season stands on its own.
function renderSeasonResults(){
  const r = S.seasonResults;
  const confettiOnce = S._playConfetti ? confettiHTML() : '';
  S._playConfetti = false;
  const winPct = (r.wins/(r.wins+r.losses)*100).toFixed(1);
  const record = `${r.wins}-${r.losses}`;
  const sl = r.statLine;
  const statChips = [
    ['PTS', sl.pts], ['REB', sl.reb], ['AST', sl.ast], ['BLK', sl.blk], ['STL', sl.stl],
  ].map(([label,val])=>`<div class="season-stat"><b>${val.toFixed(1)}</b><i>${label}</i></div>`).join('');
  const logRows = r.log.map((g,i)=>{
    const oppBadge = teamBadgeHTML(g.opponent.abbr);
    return `<div class="feed-row ${g.userWon?'feed-you':''}">
      <span class="feed-pick mono">${i+1}</span>
      <div class="feed-main"><span class="feed-name">${g.userWon?'W':'L'} vs ${g.opponent.name} ${oppBadge}</span>
        <span class="feed-meta">${g.userScore}-${g.oppScore}</span></div>
    </div>`;
  }).join('');

  // Hero status: real outcome now that playoffs actually exist — champion,
  // lost the Finals, eliminated in a specific round, or missed the cut
  // entirely (a real, common outcome, not a formality).
  let heroIcon='📅', heroLabel='Missed the Playoffs', heroDetail=`Finished #${r.yourSeed} in the ${r.conf}`;
  if(r.playoffs){
    if(r.playoffs.wonTitle){ heroIcon='🏆'; heroLabel='NBA CHAMPION'; heroDetail=`#${r.playoffs.seed} seed · beat the ${r.playoffs.finals.loser.name} in the Finals`; }
    else if(r.playoffs.wonConf){ heroIcon='🥈'; heroLabel='Lost the NBA Finals'; heroDetail=`#${r.playoffs.seed} seed · fell to the ${r.playoffs.finals.winner.name}`; }
    else {
      const roundLabel = roundName(r.playoffs.eliminatedRound-1, r.playoffs.confBracket.rounds.length);
      heroIcon='🏀'; heroLabel=`Eliminated — ${roundLabel}`; heroDetail=`#${r.playoffs.seed} seed in the ${r.conf}`;
    }
  }

  // Standings: your conference table, playoff cutoff line after 8th place
  const standingsRows = r.yourConfTable.map((e,i)=>{
    const made = i<8;
    return `<div class="stand-row ${e.isUser?'stand-you':''} ${made?'':'stand-out'}">
      <span class="seed">${i+1}</span>
      <span class="stand-name">${e.team.name}${e.isUser?' <span class="team-tag tag-you" style="margin-left:6px">You</span>':''}</span>
      <span class="mono">${e.wins}-${e.losses}</span>
    </div>${i===7?'<div class="playoff-cutoff">— playoff cutoff —</div>':''}`;
  }).join('');

  const playoffBracketHTML = r.playoffs ? `
    <div class="field">
      <label>Playoff Bracket — ${r.conf}ern Conference</label>
      <div class="hint">Seeded by your conference standings, best-of-seven each round.</div>
      <div class="bracket-scroll"><div class="bracket-tree">${bracketColumnsHTML(r.playoffs.confBracket)}</div></div>
      ${r.playoffs.finals ? `<div class="season-supers">🏆 NBA Finals: ${r.playoffs.wonTitle?'You':r.playoffs.finals.winner.name} defeated ${r.playoffs.wonTitle?r.playoffs.finals.loser.name:'you'} ${Math.max(r.playoffs.finals.wA,r.playoffs.finals.wB)}-${Math.min(r.playoffs.finals.wA,r.playoffs.finals.wB)}</div>` : ''}
    </div>` : '';

  // Recap: your actual roster, with each pick's rating (color-tiered, same as
  // the draft board) plus the same steal/reach pick-quality read the
  // competitive draft's recap card uses — reused as-is, since Season Mode's
  // pickLog is built by the exact same place() calls.
  const userTeam = S.teams[0];
  const userRating = userTeam._rating || teamRating(userTeam).rating;
  const grade = seasonTeamGrade(userRating);
  const rosterHTML = [...POS_LIST, ...('RES' in userTeam.slots ? Array((userTeam.slots.RES||[]).length).fill('RES') : [])]
    .map((slotKey,i)=>{
      const p = slotKey==='RES' ? (userTeam.slots.RES||[])[i-POS_LIST.length] : userTeam.slots[slotKey];
      if(!p) return '';
      const badge = p.team ? ' '+teamBadgeHTML(p.team) : '';
      const label = slotKey==='RES' ? 'R' : slotKey;
      const rb = ratingBadge(p);
      return `<div class="slot-row"><span class="slot-pos ${slotKey==='RES'?'res':''}">${label}</span>
        <span class="slot-name">${p.n}${badge}</span>
        <span class="mono ovr-num ${rb.tier}" style="margin-left:auto;">${rb.num}</span>
      </div>`;
    }).join('');
  const supers = draftSuperlatives(S.pickLog, S.mode==='cap');
  const superLines = [];
  if(supers && supers.steal) superLines.push(`💎 Best value: <b>${supers.steal.player.n}</b> — pick ${supers.steal.overall}, way outperformed the slot`);
  if(supers && supers.reach && supers.reach.player.n !== (supers.steal&&supers.steal.player.n))
    superLines.push(`📈 Biggest reach: <b>${supers.reach.player.n}</b> — pick ${supers.reach.overall}, taken earlier than the rating justified`);
  const superHTML = superLines.length ? `<div class="season-supers">${superLines.map(s=>`<div>${s}</div>`).join('')}</div>` : '';

  app.innerHTML = `
  <div class="topbar">
    <div class="logo"><div class="mark">🏀</div>
      <div><h1>All-Time Draft</h1><div class="sub">Season Result — ${r.conf}ern Conference</div></div></div>
    <div class="topbar-btns">${themeToggleHTML()}<button class="ghost-btn" id="againBtn">New Season</button></div>
  </div>
  ${confettiOnce}
  <div class="result-hero">
    <div class="hero-glow"></div>
    <div class="champ-trophy-ico">${heroIcon}</div>
    <div class="champ-label">${heroLabel}</div>
    <div class="champ-name">${record}</div>
    <div class="champ-meta">
      <span class="champ-rating mono">${winPct}% · ${heroDetail}</span>
    </div>
  </div>
  ${playoffBracketHTML}
  <div class="field">
    <label>${r.conf}ern Conference Standings</label>
    <div class="hint">Top 8 make the playoffs.</div>
    ${standingsRows}
  </div>
  <div class="field">
    <label>Your Team <span class="champ-grade-badge grade-${grade[0]}" style="margin-left:8px;font-size:14px;">${grade}</span></label>
    <div class="hint">The roster you built, and how the picks graded out.</div>
    ${rosterHTML}
    ${superHTML}
  </div>
  <div class="field">
    <label>Season Averages</label>
    <div class="hint">From your five starters' real per-game numbers.</div>
    <div class="season-stats-row">${statChips}</div>
  </div>
  <div class="field">
    <label>Game Log</label>
    <div class="hint">All 82 games, in play order.</div>
    <div class="feed-list">${logRows}</div>
  </div>
  <div class="footer-note">Other teams' standings are simulated the same way your season is — a plausible proxy, not a fully cross-consistent league.</div>`;
  document.getElementById('againBtn').onclick=()=>{ S.screen='modepick'; S.teams=[]; S.seasonResults=null; render(); };
}

// Screenshot-friendly recap card (modal overlay).
function recapModalHTML(){
  const b=S.bracket, champ=b.champion, cap_=(S.mode==='cap');
  const mvp=tournamentMVP(champ);
  // Show the user's best team if they have one, else the champion.
  const userTeams=S.teams.filter(t=>t.isUser);
  const showTeam = userTeams.length? userTeams.sort((a,b)=>b._rating-a._rating)[0] : champ;
  const grade=teamGrade(showTeam._rating);
  const scout=scoutingReport(showTeam);
  const rows=['PG','SG','SF','PF','C'].map(pos=>{
    const p=showTeam.slots[pos];
    const c=cap_&&p?`<span class="rc-cost mono">${costOf(p)}</span>`:'';
    return `<div class="rc-row"><span class="rc-pos">${pos}</span><span class="rc-name">${p?p.n:'—'}</span>${c}</div>`;
  }).join('');
  const resRows=showTeam.slots.RES.map(p=>{
    const c=cap_?`<span class="rc-cost mono">${costOf(p)}</span>`:'';
    return `<div class="rc-row res"><span class="rc-pos">R</span><span class="rc-name">${p.n}</span>${c}</div>`;
  }).join('');
  const won = showTeam._id===champ._id;
  return `<div class="recap-overlay" id="recapOverlay">
    <div class="recap-card">
      <div class="rc-header">
        <div class="rc-logo"><div class="rc-mark">AT</div><div><div class="rc-title">All-Time Draft</div>
          <div class="rc-sub">${themeById(S.theme).name}${cap_?' · Cap '+showTeam.budget:''}</div></div></div>
        <div class="rc-grade grade-${grade[0]}">${grade}</div>
      </div>
      <div class="rc-teamname">${showTeam.name}${won?' 🏆':''}</div>
      <div class="rc-roster">${rows}${resRows}</div>
      <div class="rc-scout">${scout.text}</div>
      <div class="rc-footer">
        <span>${won?'LEAGUE CHAMPION':'Rating '+showTeam._rating.toFixed(1)}</span>
        <span class="mono">MVP: ${champ._id===showTeam._id?mvp.n:champ.name+' won'}</span>
      </div>
    </div>
    <button class="recap-close" id="closeRecap">Close · screenshot to share</button>
  </div>`;
}render();
</script>
